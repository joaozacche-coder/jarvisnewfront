  const expense = filtered.filter(t => t.content && t.content.transaction_type === 'despesa').reduce((s,t) => s + parseFloat(t.content.amount||0), 0);
  const balance = income - expense;
  const periodLabel = period === 'week' ? 'esta semana' : period === 'year' ? 'este ano' : 'este mês';

  const chartData = Array.from({length:6}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - 5 + i, 1);
    const m = d.getMonth(), y = d.getFullYear();
    const mt = txns.filter(t => { const td = new Date(t.date||t.created_at); return td.getMonth()===m && td.getFullYear()===y; });
    return {
      label:   MONTH_SHORT[m],
      income:  mt.filter(t => t.content && t.content.transaction_type==='receita').reduce((s,t)=>s+parseFloat(t.content.amount||0),0),
      expense: mt.filter(t => t.content && t.content.transaction_type==='despesa').reduce((s,t)=>s+parseFloat(t.content.amount||0),0),
    };
  });
  const maxVal = Math.max(8, ...chartData.flatMap(m => [m.income, m.expense]));
  const BAR_MAX = 80;

  const fmtCur   = n => n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtShort = n => 'R$ '+Math.round(n).toLocaleString('pt-BR');
  const fmtDate  = iso => {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  };
  const fmtAmt = (isIncome, n) => (isIncome ? '+' : '−') + 'R$ ' + fmtCur(n);

  const todayD     = new Date(); todayD.setHours(0,0,0,0);
  const yesterdayD = new Date(todayD); yesterdayD.setDate(yesterdayD.getDate()-1);
  const weekAgoD   = new Date(todayD); weekAgoD.setDate(weekAgoD.getDate()-7);
  const getGroup   = iso => {
    if (!iso) return 'Mais antigas';
    const d = new Date(iso); d.setHours(0,0,0,0);
    if (d >= todayD)     return 'Hoje';
    if (d >= yesterdayD) return 'Ontem';
    if (d >  weekAgoD)   return 'Esta semana';
    return 'Mais antigas';
  };
  const groups = {};
  filtered.forEach(t => {
    const g = getGroup(t.date || t.created_at);
    if (!groups[g]) groups[g] = [];
    groups[g].push(t);
  });
  const GROUP_ORDER = ['Hoje','Ontem','Esta semana','Mais antigas'];

  const allItems = GROUP_ORDER.filter(g => groups[g] && groups[g].length > 0).flatMap(g => groups[g]);
  const paginated = allItems.slice(0, pageSize);

  const fireConfetti = () => {
    const cols = ['#7C6AF7','#1D9E75','#f87171'];
    const dots = cols.map((color, i) => ({
      id: Date.now()+i, color,
      cx: (Math.random()*70-35)+'px',
      cy: -(Math.random()*55+25)+'px',
      x: Math.round(window.innerWidth/2), y: 180,
    }));
    setConfetti(prev => [...prev, ...dots]);
    setTimeout(() => {
      const ids = new Set(dots.map(d => d.id));
      setConfetti(prev => prev.filter(d => !ids.has(d.id)));
    }, 900);
  };

  const closeModal = () => {
    setShowModal(false); setEditId(null);
    setModalAmount(''); setModalDesc(''); setModalCat('Outros'); setModalType('despesa');
  };

  const openEdit = t => {
    const cat = getCat((t.content && t.content.category) || '').label;
    setEditId(t.id);
    setModalType((t.content && t.content.transaction_type) || 'despesa');
    setModalAmount(String(parseFloat((t.content && t.content.amount) || 0)));
    setModalCat(cat);
    setModalDesc((t.content && t.content.description) || t.title || '');
    setShowModal(true);
  };

  const submitTx = () => {
    const amt = parseFloat(modalAmount);
    if (!modalAmount || amt <= 0) return;
    const isInc = modalType === 'receita';
    if (editId) {
      const orig = txns.find(t => t.id === editId);
      if (!orig) { closeModal(); return; }
      const updated = {
        ...orig,
        title: modalDesc.trim() || orig.title || (isInc ? 'Receita' : 'Despesa'),
        content: { amount: amt, transaction_type: modalType, category: modalCat },
      };
      setTxns(prev => prev.map(t => t.id === editId ? updated : t));
      closeModal();
      fetch('/api/transactions/' + editId, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ title: updated.title, amount: amt, transaction_type: modalType, category: modalCat }),
      }).catch(() => {});
      return;
    }
    const tempId = '_tmp_' + Date.now();
    const optimistic = {
      id: tempId,
      title: modalDesc.trim() || (isInc ? 'Receita' : 'Despesa'),
      date: new Date().toISOString(),
      created_at: new Date().toISOString(),
      content: { amount: amt, transaction_type: modalType, category: modalCat },
    };
    setTxns(prev => [optimistic, ...prev]);
    setNewIds(prev => { const s = new Set(prev); s.add(tempId); return s; });
    closeModal();
    setBalFlash(isInc ? 'pos' : 'neg');
    setTimeout(() => setBalFlash(null), 600);
    setTimeout(() => setNewIds(prev => { const s = new Set(prev); s.delete(tempId); return s; }), 700);
    fireConfetti();
    fetch('/api/transactions', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title: optimistic.title, amount: amt, transaction_type: modalType, category: modalCat }),
    })
    .then(r => r.ok ? r.json() : null)
    .then(real => {
      if (!real) return;
      setTxns(prev => prev.map(t => t.id === tempId ? {...real, id: real.id || tempId} : t));
    })
    .catch(() => { setTxns(prev => prev.filter(t => t.id !== tempId)); });
  };

  const deleteTx = id => {
    setDyingIds(prev => { const s = new Set(prev); s.add(id); return s; });
    setDeleteId(null);
    setTimeout(() => {
      setTxns(prev => prev.filter(t => t.id !== id));
      setDyingIds(prev => { const s = new Set(prev); s.delete(id); return s; });
    }, 320);
    if (!id.startsWith('_tmp_')) {
      fetch('/api/transactions/' + id, { method:'DELETE' }).catch(() => {});
    }
  };

  /* ── Skeleton ── */
  const skelCards = ce('div', {className:'fin-cards'},
    [0,1,2].map(i => ce('div', {key:i, className:'fin-card', style:{borderTop:'2px solid rgba(255,255,255,0.05)',animation:'none'}},
      ce('div', {className:'fin-skel', style:{width:'48px',height:'8px'}}),
      ce('div', {className:'fin-skel', style:{width:'68%',height:'20px',marginTop:'5px'}}),
      ce('div', {className:'fin-skel', style:{width:'46%',height:'7px',marginTop:'3px'}})
    ))
  );
  const skelList = ce('div', {className:'fin-list', style:{marginTop:'4px'}},
    [0,1,2,3].map(i => ce('div', {key:i, className:'fin-tx-item', style:{animation:'none'}},
      ce('div', {className:'fin-skel', style:{width:'34px',height:'34px',borderRadius:'9px',flexShrink:0}}),
      ce('div', {style:{flex:1}},
        ce('div', {className:'fin-skel', style:{width:'52%',height:'12px',marginBottom:'5px'}}),
        ce('div', {className:'fin-skel', style:{width:'32%',height:'9px'}})
      ),
      ce('div', {className:'fin-skel', style:{width:'58px',height:'13px'}})
    ))
  );

  /* ── Cards ── */
  const cards = ce('div', {className:'fin-cards'},
    ce('div', {className:'fin-card fin-card--income', style:{'--ci':0}},
      ce('div', {className:'fin-card-label'}, '↑  RECEITAS'),
      ce('div', {className:'fin-card-num'}, 'R$ ', ce(CountUp, {end:Math.round(income), duration:700, locale:'pt-BR'})),
      ce('div', {className:'fin-card-sub'}, periodLabel)
    ),
    ce('div', {className:'fin-card fin-card--expense', style:{'--ci':1}},
      ce('div', {className:'fin-card-label'}, '↓  DESPESAS'),
      ce('div', {className:'fin-card-num'}, 'R$ ', ce(CountUp, {end:Math.round(expense), duration:700, locale:'pt-BR'})),
      ce('div', {className:'fin-card-sub'}, periodLabel)
    ),
    ce('div', {className:'fin-card fin-card--balance' + (balFlash ? ' fin-card--flash-'+balFlash : ''), style:{'--ci':2}},
      ce('div', {className:'fin-card-label'}, balance >= 0 ? '≡  SALDO' : '↘  SALDO'),
      ce('div', {className:'fin-card-num'}, balance >= 0 ? '+R$ ' : '−R$ ', ce(CountUp, {end:Math.round(Math.abs(balance)), duration:700, locale:'pt-BR'})),
      ce('div', {className:'fin-card-sub'}, 'líquido')
    )
  );

  /* ── Chart ── */
  const chart = ce('div', {className:'fin-chart-wrap'},
    ce('div', {className:'fin-chart-title'}, 'Histórico — últimos 6 meses'),
    ce('div', {
      className: 'fin-chart' + (chartVisible ? ' fin-chart--visible' : ''),
      ref: chartRef,
    },
      chartData.map((m,i) => {
        const incH = Math.max(6, Math.round((m.income / maxVal) * BAR_MAX));
        const expH = Math.max(6, Math.round((m.expense / maxVal) * BAR_MAX));
        return ce('div', {key:i, className:'fin-month'},
          ce('div', {className:'fin-bars'},
            ce('div', {className:'fin-bar-wrap'},
              ce('div', {className:'fin-bar fin-bar--income', style:{'--fh':incH+'px','--bi':i*2}}),
              ce('span', {className:'fin-bar-tooltip'}, 'Receita: '+fmtShort(m.income))
            ),
            ce('div', {className:'fin-bar-wrap'},
              ce('div', {className:'fin-bar fin-bar--expense', style:{'--fh':expH+'px','--bi':i*2+1}}),
              ce('span', {className:'fin-bar-tooltip'}, 'Despesa: '+fmtShort(m.expense))
            )
          ),
          ce('div', {className:'fin-month-label'}, m.label)
        );
      })
    )
  );

  /* ── List ── */
  var txIdx = 0;
  const listBody = filtered.length === 0
    ? ce('div', {className:'fin-empty'},
        ce('div', {className:'fin-empty-icon'}, '💸'),
        ce('p', {className:'fin-empty-title'}, 'Nenhuma transação em ' + (period==='week'?'esta semana':period==='year'?'este ano':curMonthName)),
        ce('p', {className:'fin-empty-sub'},   'Registre receitas e despesas para ver seu saldo'),
        ce('button', {className:'fin-empty-btn', onClick:()=>setShowModal(true)}, 'Registrar primeira →')
      )
    : ce('div', {className:'fin-list'},
        ...GROUP_ORDER.filter(g => groups[g] && groups[g].length > 0).flatMap(g => {
          const items = groups[g].map(t => {
            if (!paginated.includes(t)) return null;
            const i = txIdx++;
            const isIncome = t.content && t.content.transaction_type === 'receita';
            const catInfo = getCat((t.content && t.content.category) || '');
            const amt = parseFloat((t.content && t.content.amount) || 0);
            const displayTitle = (t.content && t.content.description) || t.title || '—';
            const isNew  = newIds.has(t.id);
            const isDying = dyingIds.has(t.id);
            const isConfirming = deleteId === t.id;
            return ce('div', {
              key: t.id || i,
              className: 'fin-tx-item'+(isNew?' fin-tx-item--new':'')+(isDying?' fin-tx-item--dying':''),
              style: {'--i': i},
            },
              ce('div', {className:'fin-tx-icon', style:{background: catInfo.bg}}, catInfo.icon),
              ce('div', {className:'fin-tx-info'},
                ce('div', {className:'fin-tx-title'}, displayTitle),
                ce('div', {className:'fin-tx-meta'},
                  ce('span', {className:'fin-cat-pill'}, catInfo.label),
                  ce('span', {className:'fin-tx-date'}, fmtDate(t.date || t.created_at))
                )
              ),
              ce('div', {className:'fin-tx-amount fin-tx-amount--'+(isIncome?'income':'expense')},
                fmtAmt(isIncome, amt)
              ),
              isConfirming
                ? ce('div', {className:'fin-tx-confirm'},
                    ce('span', {className:'fin-tx-confirm-lbl'}, 'Deletar?'),
                    ce('button', {className:'fin-tx-confirm-yes', onClick:()=>deleteTx(t.id)}, 'sim'),
                    ce('button', {className:'fin-tx-confirm-no',  onClick:()=>setDeleteId(null)}, 'não')
                  )
                : ce('div', {className:'fin-tx-actions'},
                    ce('button', {className:'fin-tx-edit',   onClick: e => { e.stopPropagation(); openEdit(t); },       title:'Editar'},  ce('i', {className:'ti ti-pencil'})),
                    ce('button', {className:'fin-tx-delete', onClick: e => { e.stopPropagation(); setDeleteId(t.id); }, title:'Deletar'}, ce('i', {className:'ti ti-trash'}))
                  )
            );
          }).filter(Boolean);
          if (items.length === 0) return [];
          return [
            ce('div', {key:'hd-'+g, className:'fin-group-hd'},
              ce('span', {className:'fin-group-lbl'}, g),
              ce('div', {className:'fin-group-line'})
            ),
            ...items,
          ];
        }),
        pageSize < allItems.length
          ? ce('div', {className:'fin-ver-mais'},
              ce('button', {className:'fin-ver-mais-btn', onClick:()=>setPageSize(prev => prev + 20)}, 'Ver mais')
            )
          : null,
        ce('div', {className:'fin-total-row'},
          ce('span', null,
            ce('span', {className:'fin-total-income'}, '↑ R$ '+fmtCur(income)),
            '  ·  ',
            ce('span', {className:'fin-total-expense'}, '↓ R$ '+fmtCur(expense))
          ),
          ce('span', null, 'total do período')
        )
      );

  const list = ce('div', {className:'fin-list-wrap' + (listVisible ? '' : ' fin-list-wrap--hidden')}, listBody);

  /* ── Modal ── */
  const modal = showModal ? ce('div', {
    className:'fin-modal-overlay',
    onClick: e => { if(e.target===e.currentTarget) closeModal(); },
  },
    ce('div', {className:'fin-modal'},
      ce('div', {className:'fin-modal-hd'},
        ce('div', {className:'fin-modal-title'}, editId ? 'Editar Transação' : 'Nova Transação'),
        ce('button', {className:'fin-modal-x', onClick: closeModal}, '×')
      ),
      ce('div', {className:'fin-toggle-wrap'},
        ce('div', {className:'fin-toggle-slider fin-toggle-slider--'+modalType}),
        ce('button', {className:'fin-toggle-btn', style:{color:modalType==='receita'?'#1D9E75':'var(--text-3)'}, onClick:()=>setModalType('receita')}, '↑  Receita'),
        ce('button', {className:'fin-toggle-btn', style:{color:modalType==='despesa'?'#f87171':'var(--text-3)'}, onClick:()=>setModalType('despesa')}, '↓  Despesa')
      ),
      ce('div', {className:'fin-amount-wrap'},
        ce('div', {className:'fin-amount-row'},
          ce('span', {className:'fin-amount-prefix'}, 'R$'),
          ce('input', {
            className:'fin-amount-input', type:'text', inputMode:'decimal', placeholder:'0,00',
            value:modalAmount, autoFocus:true,
            onChange: e => setModalAmount(e.target.value.replace(',','.')),
            onKeyDown: e => { if(e.key==='Enter') submitTx(); if(e.key==='Escape') closeModal(); },
          })
        )
      ),
      ce('div', {className:'fin-modal-cats'},
        CATS.map(c => ce('button', {
          key:c,
          className:'fin-modal-cat'+(modalCat===c?' fin-modal-cat--sel':''),
          onClick:()=>setModalCat(c),
        },
          ce('span', {className:'fin-modal-cat-icon'}, CAT_ICONS[c] || '📌'),
          c
        ))
      ),
      ce('input', {
        className:'fin-modal-desc', type:'text', placeholder:'Descrição (opcional)',
        value:modalDesc,
        onChange: e => setModalDesc(e.target.value),
        onKeyDown: e => { if(e.key==='Enter') submitTx(); if(e.key==='Escape') closeModal(); },
      }),
      ce('div', {className:'fin-modal-actions'},
        ce('button', {className:'fin-modal-cancel', onClick: closeModal}, 'Cancelar'),
        ce('button', {
          className:'fin-modal-confirm fin-modal-confirm--'+modalType,
          onClick: submitTx,
          disabled: !modalAmount || parseFloat(modalAmount) <= 0,
        }, editId ? 'Salvar' : (modalType==='receita' ? 'Registrar receita' : 'Registrar despesa'))
      )
    )
  ) : null;

  return ce('div', {className:'fin-view'},
    modal,
    ...confetti.map(d => ce('div', {
      key:d.id, className:'fin-confetti-dot',
      style:{background:d.color, left:d.x+'px', top:d.y+'px', '--cx':d.cx, '--cy':d.cy},
    })),
    ce('div', {className:'fin-header'},
      ce('div', null,
        ce('h2', {className:'fin-title'}, 'Finanças'),
        ce('span', {className:'fin-sub'}, loading ? 'carregando…' : curMonthName + ' ' + now.getFullYear())
      ),
      ce('div', {className:'fin-period-pills'},
        ce('div', {className:'fin-period-slider', style:{left:sliderLeft, width:sliderWidth}}),
        PERIODS.map(p => ce('button', {
          key:p.k,
          className:'fin-period-btn '+(period===p.k?'fin-period-btn--active':'fin-period-btn--inactive'),
          onClick:()=>changePeriod(p.k),
        }, p.l))
      )
    ),
    loading ? skelCards : cards,
    loading ? null      : chart,
    loading ? skelList  : list,
    ce('button', {className:'fin-fab', onClick:()=>setShowModal(true)},
      ce('span', {className:'fin-fab-plus'}, '+')
    )
  );
}

function AgendaView({onChat}={}) {
  const ce = React.createElement;

  const HOUR_START = 6, HOUR_END = 23, ROW_H = 60;
  const COLORS = ['#534AB7','#3b82f6','#10b981','#f87171','#f59e0b','#e879f9'];
  const COLOR_LABELS = ['Roxo','Azul','Verde','Vermelho','Amber','Rosa'];
  const DAY_SHORT  = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  const DAY_LONG   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const MONTH_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const MONTH_SHORT= ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  /* utils */
  const fmtDate = d => {
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  };
  const sameDay  = (a,b) => fmtDate(a) === fmtDate(b);
  const addDays  = (d,n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
  const addMonths= (d,n) => { const r = new Date(d); r.setMonth(r.getMonth()+n); r.setDate(1); return r; };
  const getMonday= d => { const r=new Date(d); const day=r.getDay(); r.setDate(r.getDate()+(day===0?-6:1-day)); r.setHours(0,0,0,0); return r; };
  const parseTime= t => { if(!t) return null; const [h,m]=(t+'').split(':').map(Number); if(isNaN(h)) return null; return {h,m:m||0,total:h+(m||0)/60}; };
  const padTime  = (h,m=0) => `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const hexAlpha = (hex,a) => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };
  const capFirst = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
  const evColor  = ev => (ev.content && ev.content.color) || ev.color || '#534AB7';
  const evDate   = ev => ((ev.content && ev.content.date) || ev.date || ev.created_at || '').slice(0,10);
  const evStart  = ev => (ev.content && ev.content.start_time) || ev.start_time || '';
  const evEnd    = ev => (ev.content && ev.content.end_time)   || ev.end_time   || '';

  /* state */
  const now0 = new Date();
  const todayStr = fmtDate(now0);
  const [view, setView]         = React.useState('semana');
  const [curDate, setCurDate]   = React.useState(new Date(now0.getFullYear(),now0.getMonth(),now0.getDate()));
  const [weekStart, setWeekStart]= React.useState(getMonday(now0));
  const [curMonth, setCurMonth] = React.useState(new Date(now0.getFullYear(),now0.getMonth(),1));
  const [selDay,  setSelDay]    = React.useState(null);
  const [events,  setEvents]    = React.useState([]);
  const [loading, setLoading]   = React.useState(true);
  const [slideDir,setSlideDir]  = React.useState('');
  const [viewFade,setViewFade]  = React.useState(false);
  const [prevView,setPrevView]  = React.useState('semana');
  const [showModal,setShowModal]= React.useState(false);
  const [editId,  setEditId]    = React.useState(null);
  const [mTitle,  setMTitle]    = React.useState('');
  const [mDate,   setMDate]     = React.useState(todayStr);
  const [mStart,  setMStart]    = React.useState('09:00');
  const [mEnd,    setMEnd]      = React.useState('10:00');
  const [mColor,  setMColor]    = React.useState(COLORS[0]);
  const [mDesc,   setMDesc]     = React.useState('');
  const [saving,  setSaving]    = React.useState(false);
  const [newIds,  setNewIds]    = React.useState(new Set());
  const [dying,   setDying]     = React.useState(new Set());
  const [nowStr,  setNowStr]    = React.useState(padTime(now0.getHours(),now0.getMinutes()));
  const [briefText, setBriefText] = React.useState('');
  const [briefDisp, setBriefDisp] = React.useState('');
  const [briefLoad, setBriefLoad] = React.useState(false);
  const [briefOpen, setBriefOpen] = React.useState(false);
  const [briefUpdatedAt, setBriefUpdatedAt] = React.useState('');
  const gridRef  = React.useRef(null);
  const swipeRef = React.useRef({x:0,y:0,active:false});

  /* load events */
  React.useEffect(() => {
    fetch('/api/events').then(r=>r.json()).then(d=>{ setEvents(d.events||[]); setLoading(false); }).catch(()=>setLoading(false));
  }, []);

  /* clock tick */
  React.useEffect(() => {
    const id = setInterval(()=>{ const n=new Date(); setNowStr(padTime(n.getHours(),n.getMinutes())); },60000);
    return ()=>clearInterval(id);
  }, []);

  /* scroll to now */
  React.useEffect(() => {
    if ((view==='semana'||view==='dia') && gridRef.current) {
      const p=parseTime(nowStr);
      if(p) gridRef.current.scrollTop = Math.max(0,(p.total-HOUR_START)*ROW_H-140);
    }
  }, [view, loading]);

  /* briefing fetch */
  const fetchBriefing=()=>{
    const ds=fmtDate(curDate);
    const todayEvs=events.filter(ev=>evDate(ev)===ds);
    const evsStr=todayEvs.length>0?todayEvs.map(ev=>`${evStart(ev)} ${ev.title||''}`.trim()).join(', '):'Nenhum';
    setBriefLoad(true); setBriefText(''); setBriefDisp(''); setBriefOpen(true);
    fetch('/api/chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:`Responda EXATAMENTE neste formato, sem varia\u00e7\u00f5es:\nEVENTOS: [lista eventos de hoje com hor\u00e1rio, ou 'Nenhum']\nTAREFAS: [m\u00e1x 3 tarefas mais urgentes separadas por \u00b7 ]\nFOCO: [1 cliente ou projeto que precisa de aten\u00e7\u00e3o agora, em 1 frase]\n\nContexto: eventos de hoje s\u00e3o: ${evsStr}`})
    }).then(r=>r.json()).then(d=>{
      const txt=d.response||d.message||'';
      setBriefText(txt); setBriefLoad(false);
      const n=new Date(); setBriefUpdatedAt(padTime(n.getHours(),n.getMinutes()));
    }).catch(()=>{setBriefText('N\u00e3o foi poss\u00edvel carregar o briefing.');setBriefLoad(false);});
  };
  React.useEffect(()=>{ if(view==='dia') fetchBriefing(); },[view]);
  React.useEffect(()=>{
    if(!briefText) return;
    setBriefDisp(''); let i=0;
    const id=setInterval(()=>{ i++; setBriefDisp(briefText.slice(0,i)); if(i>=briefText.length) clearInterval(id); },18);
    return ()=>clearInterval(id);
  },[briefText]);

  /* derived now position */
  const nowTop = React.useMemo(()=>{
    const p=parseTime(nowStr);
    if(!p||p.total<HOUR_START||p.total>HOUR_END) return null;
    return (p.total-HOUR_START)*ROW_H;
  },[nowStr]);

  const evTop= t=>{ const p=parseTime(t); if(!p) return 0; return Math.max(0,(p.total-HOUR_START)*ROW_H); };
  const evH  = (s,e)=>{ const sp=parseTime(s),ep=parseTime(e); if(!sp||!ep) return ROW_H; return Math.max(28,(ep.total-sp.total)*ROW_H); };

  /* navigation */
  const slideNav=(dir,fn)=>{ setSlideDir(dir); fn(); setTimeout(()=>setSlideDir(''),300); };
  const goBack=()=>{
    if(view==='dia'){ const nd=addDays(curDate,-1); slideNav('r',()=>setCurDate(nd)); }
    else if(view==='semana'){ const nw=addDays(weekStart,-7); slideNav('r',()=>setWeekStart(nw)); }
    else { const nm=addMonths(curMonth,-1); slideNav('r',()=>{ setCurMonth(nm); setSelDay(null); }); }
  };
  const goNext=()=>{
    if(view==='dia'){ const nd=addDays(curDate,1); slideNav('l',()=>setCurDate(nd)); }
    else if(view==='semana'){ const nw=addDays(weekStart,7); slideNav('l',()=>setWeekStart(nw)); }
    else { const nm=addMonths(curMonth,1); slideNav('l',()=>{ setCurMonth(nm); setSelDay(null); }); }
  };
  const goToday=()=>{ const t=new Date(); const td=new Date(t.getFullYear(),t.getMonth(),t.getDate()); const tw=getMonday(t); const tm=new Date(t.getFullYear(),t.getMonth(),1); setCurDate(td); setWeekStart(tw); setCurMonth(tm); setSelDay(null); };
  const switchView=v=>{ if(v===view) return; if(v==='dia') setPrevView(view); setViewFade(true); setTimeout(()=>{ setView(v); setViewFade(false); },150); };

  /* header title */
  const headerTitle=()=>{
    if(view==='mes') return `${MONTH_FULL[curMonth.getMonth()]} ${curMonth.getFullYear()}`;
    if(view==='semana'){
      const end=addDays(weekStart,6);
      const sm=MONTH_SHORT[weekStart.getMonth()],em=MONTH_SHORT[end.getMonth()];
      if(sm===em) return `${weekStart.getDate()} – ${end.getDate()} ${capFirst(sm)} ${weekStart.getFullYear()}`;
      return `${weekStart.getDate()} ${capFirst(sm)} – ${end.getDate()} ${capFirst(em)} ${weekStart.getFullYear()}`;
    }
    const d=curDate; return `${DAY_LONG[d.getDay()]}, ${d.getDate()} ${capFirst(MONTH_SHORT[d.getMonth()])} ${d.getFullYear()}`;
  };

  /* modal helpers */
  const openCreate=(date,startH)=>{ setEditId(null); setMTitle(''); setMDate(date||todayStr); setMStart(startH!=null?padTime(startH):'09:00'); setMEnd(startH!=null?padTime(startH+1):'10:00'); setMColor(COLORS[0]); setMDesc(''); setShowModal(true); };
  const openEdit  =ev=>{ setEditId(ev.id); setMTitle(ev.title||''); setMDate(evDate(ev)); setMStart(evStart(ev)); setMEnd(evEnd(ev)); setMColor(evColor(ev)); setMDesc((ev.content&&ev.content.description)||''); setShowModal(true); };
  const closeModal=()=>{ setShowModal(false); setEditId(null); };

  const submitEvent=async()=>{
    if(!mTitle.trim()) return;
    setSaving(true);
    const body={title:mTitle.trim(),date:mDate,start_time:mStart,end_time:mEnd,color:mColor,description:mDesc};
    try{
      if(editId){
        setEvents(evs=>evs.map(e=>e.id===editId?{...e,title:body.title,content:{...(e.content||{}),...body}}:e));
        await fetch(`/api/events/${editId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const r=await fetch('/api/events').then(x=>x.json()); setEvents(r.events||[]);
      } else {
        const tid=`_tmp_${Date.now()}`;
        setEvents(evs=>[{id:tid,title:body.title,content:body},...evs]);
        setNewIds(s=>new Set([...s,tid]));
        const r=await fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const data=await r.json();
        setEvents(evs=>evs.map(e=>e.id===tid?(data.event||e):e));
        setNewIds(s=>{ const n=new Set(s); n.delete(tid); return n; });
      }
    }catch(e){}
    setSaving(false); closeModal();
  };

  const deleteEvent=async id=>{
    setDying(s=>new Set([...s,id]));
    setTimeout(()=>{ setEvents(evs=>evs.filter(e=>e.id!==id)); setDying(s=>{ const n=new Set(s); n.delete(id); return n; }); },350);
    await fetch(`/api/events/${id}`,{method:'DELETE'});
  };

  /* ── Month view ─────────────────────────────────────────────── */
  const renderMonth=()=>{
    const year=curMonth.getFullYear(), month=curMonth.getMonth();
    const firstDay=new Date(year,month,1), lastDay=new Date(year,month+1,0);
    const startOffset=firstDay.getDay();
    const totalCells=Math.ceil((startOffset+lastDay.getDate())/7)*7;
    const cells=Array.from({length:totalCells},(_,i)=>new Date(year,month,1-startOffset+i));
    const dayEvs=d=>events.filter(e=>evDate(e)===fmtDate(d));
    const isToday=d=>fmtDate(d)===todayStr;
    const isCurMonth=d=>d.getMonth()===month;



    return ce('div',{className:'ag-month-wrap'},
      ce('div',{className:'ag-month-headers'}, ...DAY_SHORT.map((d,i)=>ce('div',{key:i,className:'ag-month-hd'},d))),
      ce('div',{className:`ag-month-grid${slideDir==='l'?' ag-slide-l':slideDir==='r'?' ag-slide-r':''}`},
        ...cells.map((d,i)=>{
          const evs=dayEvs(d), dots=evs.slice(0,3), extra=evs.length-3;
          const inMonth = isCurMonth(d);
          return ce('div',{key:i,
            className:`ag-month-cell${!inMonth?' ag-month-cell--other':''}${isToday(d)?' ag-month-cell--today':''}`,
            style:{'--ci':inMonth?i:0},
            onClick: inMonth ? ()=>{ const nd=new Date(d); setCurDate(nd); setSelDay(nd); switchView('dia'); } : undefined,
          },
            inMonth && ce('span',{className:'ag-month-num'},d.getDate()),
            inMonth && evs.length>0 && ce('div',{className:'ag-month-dots'},
              ...dots.map((ev,j)=>ce('span',{key:j,className:'ag-month-dot',style:{background:evColor(ev)}})),
              extra>0&&ce('span',{className:'ag-month-more'},`+${extra}`)
            )
          );
        })
      ),
      null
    );
  };

  /* ── Week view ──────────────────────────────────────────────── */
  const renderWeek=()=>{
    const days=Array.from({length:7},(_,i)=>addDays(weekStart,i));
    const NHOURS=HOUR_END-HOUR_START+1, totalH=NHOURS*ROW_H;
    return ce('div',{className:'ag-week-outer'},
      ce('div',{className:'ag-week-hd-row'},
        ...days.map((d,i)=>ce('div',{key:i,
          className:`ag-week-hd-cell${sameDay(d,new Date())?' ag-week-hd-cell--today':''}`,
          onClick:()=>{ setCurDate(d); switchView('dia'); },
        },
          ce('span',{className:'ag-week-hd-name'},DAY_LONG[d.getDay()]),
          ce('span',{className:'ag-week-hd-num'},d.getDate())
        ))
      ),
      ce('div',{
        className:`ag-grid-wrap${slideDir==='l'?' ag-slide-l':slideDir==='r'?' ag-slide-r':''}`,
        ref:gridRef,
      },
        ce('div',{className:'ag-week-grid',style:{height:totalH+'px',position:'relative'}},
          ...Array.from({length:NHOURS},(_,hi)=>{
            const h=HOUR_START+hi;
            return ce('div',{key:h,className:'ag-hour-row',style:{top:hi*ROW_H+'px',height:ROW_H+'px'}},
              ce('div',{className:'ag-hour-label'},`${h}h`),
              ...days.map((d,di)=>ce('div',{key:di,className:'ag-week-slot',onClick:()=>openCreate(fmtDate(d),h)},
                ce('div',{className:'ag-week-slot-line'}),
                ce('div',{className:'ag-week-half-line'})
              ))
            );
          }),
          nowTop!==null&&days.some(d=>sameDay(d,new Date()))&&ce('div',{className:'ag-now-line',style:{top:nowTop+'px',left:'48px'}},
            ce('div',{className:'ag-now-dot'}), ce('div',{className:'ag-now-track'})
          ),
          ...events.filter(ev=>days.some(d=>fmtDate(d)===evDate(ev))).map((ev,idx)=>{
            const colIdx=days.findIndex(d=>fmtDate(d)===evDate(ev));
            if(colIdx<0) return null;
            const col=evColor(ev);
            return ce('div',{key:ev.id,
              className:`ag-event${newIds.has(ev.id)?' ag-event--new':''}${dying.has(ev.id)?' ag-event--dying':''}`,
              style:{
                top:evTop(evStart(ev))+'px', height:evH(evStart(ev),evEnd(ev))+'px',
                left:`calc(48px + ${colIdx}*(100% - 48px)/7 + 3px)`,
                width:`calc((100% - 48px)/7 - 6px)`,
                '--ev-color':col,'--ev-bg':hexAlpha(col,0.15),'--ev-border':hexAlpha(col,0.3),'--ev-shadow':hexAlpha(col,0.25),
                animationDelay:`${idx*25}ms`
              },
              onClick:()=>openEdit(ev),
            },
              ce('div',{className:'ag-event-bar'}),
              ce('div',{className:'ag-event-body'},
                ce('div',{className:'ag-event-title'},ev.title),
                evStart(ev)&&ce('div',{className:'ag-event-time'},`${evStart(ev)}${evEnd(ev)?`–${evEnd(ev)}`:''}`)
              )
            );
          })
        )
      )
    );
  };

  /* ── Briefing card ────────────────────────────────────────────── */
  const renderBriefing=()=>{
    const pev=briefText.match(/EVENTOS:\s*(.+?)(?=\nTAREFAS:|\nFOCO:|$)/s);
    const ptk=briefText.match(/TAREFAS:\s*(.+?)(?=\nEVENTOS:|\nFOCO:|$)/s);
    const pfo=briefText.match(/FOCO:\s*(.+?)(?=\nEVENTOS:|\nTAREFAS:|$)/s);
    const isStr=!!(pev&&ptk&&pfo);
    const preview=pev?pev[1].trim().slice(0,52):(briefDisp||briefText).replace(/\n/g,' ').slice(0,52);
    const hasMore=!isStr&&briefDisp.length>0&&briefDisp.length<briefText.length;
    return ce('div',{className:'ag-briefing ag-briefing--'+(briefOpen?'open':'closed')},
      ce('div',{
        className:'ag-briefing-hd',
        onClick:()=>setBriefOpen(o=>!o),
      },
        ce('div',{className:'ag-briefing-left'},
          ce('div',{className:'ag-briefing-orb'}),
          ce('span',{className:'ag-briefing-label'},'Jarvis'),
          !briefOpen&&briefLoad&&ce('span',{className:'ag-briefing-preview'},'carregando…'),
          !briefOpen&&!briefLoad&&preview&&ce('span',{className:'ag-briefing-preview'},preview+(hasMore?'…':'')),
        ),
        ce('div',{className:'ag-briefing-right'},
          !briefOpen&&briefUpdatedAt&&ce('span',{className:'ag-briefing-time'},briefUpdatedAt),
          ce('span',{className:'ag-briefing-chevron'},'⌄'),
        )
      ),
      ce('div',{className:'ag-briefing-body'},
        briefLoad
          ?ce('div',{className:'ag-briefing-skel'},...[0,1,2].map(i=>ce('div',{key:i,className:'ag-briefing-skel-line',style:{width:i===2?'60%':'100%','--si':i}})))
          :isStr
            ?ce('div',{className:'ag-brief-rows'},
                ce('div',{className:'ag-brief-row'},
                  ce('i',{className:'ti ti-calendar ag-brief-icon',style:{color:'rgba(124,106,247,0.8)'}}),
                  ce('div',{className:'ag-brief-body'},
                    ce('div',{className:'ag-brief-lbl ag-brief-lbl--ev'},'Eventos'),
                    ce('div',{className:'ag-brief-txt'},pev[1].trim())
                  )
                ),
                ce('div',{className:'ag-brief-row'},
                  ce('i',{className:'ti ti-circle-check ag-brief-icon',style:{color:'rgba(52,211,153,0.8)'}}),
                  ce('div',{className:'ag-brief-body'},
                    ce('div',{className:'ag-brief-lbl ag-brief-lbl--tk'},'Tarefas'),
                    ce('div',{className:'ag-brief-txt'},ptk[1].trim())
                  )
                ),
                ce('div',{className:'ag-brief-row'},
                  ce('i',{className:'ti ti-target ag-brief-icon',style:{color:'rgba(251,191,36,0.8)'}}),
                  ce('div',{className:'ag-brief-body'},
                    ce('div',{className:'ag-brief-lbl ag-brief-lbl--fo'},'Foco'),
                    ce('div',{className:'ag-brief-txt ag-brief-txt--fo'},pfo[1].trim())
                  )
                )
              )
            :ce('div',{className:'ag-briefing-text'},briefDisp||' ')
      ),
      ce('div',{className:'ag-briefing-footer'},
        ce('button',{className:'ag-briefing-chat-btn',onClick:e=>{e.stopPropagation();onChat&&onChat('me conta mais sobre o meu dia');}},'\u2192 Abrir chat'),
        ce('div',{className:'ag-briefing-foot-r'},
          briefUpdatedAt&&ce('span',{className:'ag-briefing-updated'},briefUpdatedAt),
          ce('button',{className:'ag-briefing-refresh',onClick:e=>{e.stopPropagation();fetchBriefing();},title:'Atualizar'},'\u21bb')
        )
      )
    );
  };

  /* ── Day view ───────────────────────────────────────────────── */
  const renderDay=()=>{
    const NHOURS=HOUR_END-HOUR_START+1, totalH=NHOURS*ROW_H;
    const dayStr=fmtDate(curDate), isToday=dayStr===todayStr;
    const dayEvs=events.filter(ev=>evDate(ev)===dayStr).sort((a,b)=>evStart(a).localeCompare(evStart(b)));
    const hasDayEvs = dayEvs.length > 0;
    return ce('div',{
      className:`ag-grid-wrap${slideDir==='l'?' ag-slide-l':slideDir==='r'?' ag-slide-r':''}`,
      ref:gridRef,
      style:{display:'flex',flexDirection:'column'},
    },
      renderBriefing(),
      !hasDayEvs && nowTop===null && ce('div',{className:'ag-empty'},
        ce('i',{className:'ti ti-calendar-off ag-empty-icon'}),
        ce('p',{className:'ag-empty-label'},'Nenhum evento'),
        ce('button',{className:'ag-empty-btn',onClick:()=>openCreate(dayStr,9)},'Adicionar evento →')
      ),
      ce('div',{className:'ag-day-grid',style:{height:totalH+'px',position:'relative',flex:'1'}},
        ...Array.from({length:NHOURS},(_,hi)=>{
          const h=HOUR_START+hi;
          return ce('div',{key:h,className:'ag-hour-row',style:{top:hi*ROW_H+'px',height:ROW_H+'px'},onClick:()=>openCreate(dayStr,h)},
            ce('div',{className:'ag-hour-label'},`${h}h`),
            ce('div',{className:'ag-hour-line'},ce('div',{className:'ag-hour-line-inner'}),ce('div',{className:'ag-hour-half-line'}))
          );
        }),
        isToday&&nowTop!==null&&ce('div',{className:'ag-now-line',style:{top:nowTop+'px'}},
          ce('div',{className:'ag-now-dot'}), ce('div',{className:'ag-now-track'})
        ),
        ...dayEvs.map((ev,idx)=>{
          const col=evColor(ev);
          return ce('div',{key:ev.id,
            className:`ag-event ag-event--day${newIds.has(ev.id)?' ag-event--new':''}${dying.has(ev.id)?' ag-event--dying':''}`,
            style:{
              top:evTop(evStart(ev))+'px', height:evH(evStart(ev),evEnd(ev))+'px',
              left:'56px', right:'16px',
              '--ev-color':col,'--ev-bg':hexAlpha(col,0.15),'--ev-border':hexAlpha(col,0.3),'--ev-shadow':hexAlpha(col,0.25),
              animationDelay:`${idx*35}ms`
            },
            onClick:()=>openEdit(ev),
          },
            ce('div',{className:'ag-event-bar'}),
            ce('div',{className:'ag-event-body'},
              ce('div',{className:'ag-event-title'},ev.title),
              (evStart(ev)||evEnd(ev))&&ce('div',{className:'ag-event-time'},`${evStart(ev)}${evEnd(ev)?` – ${evEnd(ev)}`:''}`)
            ),
            ce('button',{className:'ag-event-del',onClick:e=>{e.stopPropagation();deleteEvent(ev.id);}},'×')
          );
        })
      )
    );
  };

  /* ── Modal ─────────────────────────────────────────────────── */
  const renderModal=()=>showModal&&ce('div',{className:'ag-modal-overlay',onClick:e=>{if(e.target===e.currentTarget)closeModal();}},
    ce('div',{className:'ag-modal'},
      ce('div',{className:'ag-modal-hd'},
        ce('span',{className:'ag-modal-title'},editId?'Editar Evento':'Novo Evento'),
        ce('button',{className:'ag-modal-x',onClick:closeModal},'×')
      ),
      ce('input',{className:'ag-modal-input',placeholder:'Título do evento',value:mTitle,onChange:e=>setMTitle(e.target.value),autoFocus:true,style:{fontSize:'15px',fontWeight:500}}),
      ce('div',{className:'ag-modal-row'},
        ce('input',{className:'ag-modal-input',type:'date',value:mDate,onChange:e=>setMDate(e.target.value),style:{flex:1}})
      ),
      ce('div',{className:'ag-modal-row'},
        ce('input',{className:'ag-modal-input',type:'time',value:mStart,onChange:e=>setMStart(e.target.value),style:{flex:1}}),
        ce('span',{style:{color:'var(--text-3)',fontSize:'11px',flexShrink:0,padding:'0 2px'}},'→'),
        ce('input',{className:'ag-modal-input',type:'time',value:mEnd,onChange:e=>setMEnd(e.target.value),style:{flex:1}})
      ),
      ce('div',{className:'ag-modal-colors'},
        ...COLORS.map((col,i)=>ce('button',{key:i,
          className:`ag-color-btn${mColor===col?' ag-color-btn--active':''}`,
          style:{background:col,'--ring':col},
          onClick:()=>setMColor(col),
          title:COLOR_LABELS[i],
        }))
      ),
      ce('input',{className:'ag-modal-input',placeholder:'Descrição (opcional)',value:mDesc,onChange:e=>setMDesc(e.target.value)}),
      ce('div',{className:'ag-modal-actions'},
        editId&&ce('button',{className:'ag-modal-del',onClick:()=>{deleteEvent(editId);closeModal();}},'Excluir'),
        ce('button',{className:'ag-modal-save',onClick:submitEvent,disabled:!mTitle.trim()||saving},saving?'...':editId?'Salvar':'Criar evento')
      )
    )
  );

  /* ── Skeleton ───────────────────────────────────────────────── */
  const renderSkeleton=()=>ce('div',{className:'ag-skel-wrap'},
    ...Array.from({length:4},(_,i)=>ce('div',{key:i,className:'ag-skel-event',style:{'--i':i}}))
  );

  /* ── Main render ────────────────────────────────────────────── */
  const _swipeStart=e=>{
    const t=e.touches?e.touches[0]:e;
    if(e.target&&e.target.closest('button,input,textarea')) return;
    swipeRef.current={x:t.clientX,y:t.clientY,active:true};
  };
  const _swipeEnd=e=>{
    if(!swipeRef.current.active) return;
    const t=e.changedTouches?e.changedTouches[0]:e;
    const dx=t.clientX-swipeRef.current.x, dy=t.clientY-swipeRef.current.y;
    swipeRef.current.active=false;
    if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx)*0.9) return;
    if(dx<0) goNext(); else goBack();
  };
  return ce('div',{className:'ag-view',
    onTouchStart:_swipeStart, onTouchEnd:_swipeEnd,
    onMouseDown:_swipeStart, onMouseUp:_swipeEnd,
    onMouseLeave:()=>{swipeRef.current.active=false;},
  },
    renderModal(),
    ce('div',{className:'ag-header'},
      ce('div',{className:'ag-header-left'},
        ce('h2',{className:'ag-title'},headerTitle())
      ),
      ce('div',{className:'ag-header-right'},
        view==='dia'&&ce('button',{className:'ag-nav-back-week',onClick:()=>switchView(prevView)},'← Voltar'),
        ce('div',{className:'ag-view-pills'},
          ...(['dia','semana','mes']).map(v=>ce('button',{key:v,
            className:`ag-view-pill${view===v?' ag-view-pill--active':''}`,
            onClick:()=>switchView(v)
          },v==='dia'?'Dia':v==='semana'?'Sem':'Mês'))
        ),
        ce('div',{className:'ag-nav'},
          ce('button',{className:'ag-nav-btn',onClick:goBack},'←'),
          ce('button',{className:'ag-nav-today',onClick:goToday},'Hoje'),
          ce('button',{className:'ag-nav-btn',onClick:goNext},'→')
        )
      )
    ),
    ce('div',{className:`ag-content${viewFade?' ag-content--fade':''}`},
      loading ? renderSkeleton() :
      view==='mes'    ? renderMonth()  :
      view==='semana' ? renderWeek()   :
      renderDay()
    ),
    ce('button',{
      className:'ag-fab',
      onClick:()=>openCreate(
        view==='dia'?fmtDate(curDate):view==='semana'?fmtDate(curDate):fmtDate(selDay||new Date()),
        null
      )
    }, ce('span',{className:'ag-fab-plus'},'+'))
  );
}

function PersonalView({onChat}={}) {
  const ce = React.createElement;
  const TABS = [
    {id:'notes',     label:'Notas',    icon:'ti-notes'},
    {id:'links',     label:'Links',    icon:'ti-link'},
    {id:'passwords', label:'Senhas',   icon:'ti-lock'},
    {id:'kanban',    label:'Quadro',   icon:'ti-layout-kanban'},
    {id:'goals',     label:'Metas',    icon:'ti-target-arrow'},
    {id:'profile',   label:'Perfil',   icon:'ti-user'},
  ];
  const [tab,         setTab]         = React.useState('notes');
  const [tabAnim,     setTabAnim]     = React.useState(false);
  const [loading,     setLoading]     = React.useState(false);
  const [notes,       setNotes]       = React.useState([]);
  const [noteSearch,  setNoteSearch]  = React.useState('');
  const [selNote,     setSelNote]     = React.useState(null);
  const [links,       setLinks]       = React.useState([]);
  const [passwords,   setPasswords]   = React.useState([]);
  const [pwDecrypted, setPwDecrypted] = React.useState({});
  const [pwVisible,   setPwVisible]   = React.useState({});
  const [pwCopied,    setPwCopied]    = React.useState({});
  const [kanban,      setKanban]      = React.useState({todo:[],doing:[],done:[]});

  /* ── Crypto ── */
  const deriveKey = React.useCallback(async()=>{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode('JoaoZacche'+'jarvis_vault_2024'),{name:'PBKDF2'},false,['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('jarvis_salt_v1'),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
  },[]);

  const encrypt = async(text) => {
    const key=await deriveKey();
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(text));
    return btoa(String.fromCharCode(...iv))+'.'+btoa(String.fromCharCode(...new Uint8Array(enc)));
  };

  const decrypt = async(cipher) => {
    try {
      const [ivB64,encB64]=cipher.split('.');
      const iv=Uint8Array.from(atob(ivB64),c=>c.charCodeAt(0));
      const enc=Uint8Array.from(atob(encB64),c=>c.charCodeAt(0));
      const key=await deriveKey();
      const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,enc);
      return new TextDecoder().decode(dec);
    } catch { return null; }
  };

  /* ── Notes ── */

      setModal(null); setNoteForm({title:'',body:''}); setNoteTagsArr([]); setNoteTagInput('');
    } finally { setNoteSaving(false); }

      setNotes(p=>p.map(n=>n.id===editNote.id?{...n,title:noteForm.title,content:nc,tags}:n));

  /* ── Passwords ── */
  const savePw = async() => {
    const encData=await encrypt(JSON.stringify({user:pwForm.user,password:pwForm.password,notes:pwForm.notes}));
    const entry=await api('/api/personal','POST',{title:pwForm.site,content:{encrypted:true,data:encData},tags:['senha'],type:'note'});
    setPasswords(p=>[entry,...p]);
    setModal(null); setPwForm({site:'',user:'',password:'',notes:''});
  };
  const getDecrypted = async(pw) => {
    if(pwDecrypted[pw.id]) return pwDecrypted[pw.id];
    const raw=await decrypt(pw.content&&pw.content.data||'');
    if(!raw) return null;
    try { const d=JSON.parse(raw); setPwDecrypted(p=>({...p,[pw.id]:d})); return d; } catch { return null; }
  };
  const revealPw = async(pw) => {
    const d=await getDecrypted(pw); if(!d) return;
    const end=Date.now()+5000;
    setPwRevealAt(p=>({...p,[pw.id]:end}));
    setPwVisible(p=>({...p,[pw.id]:true}));
    setTimeout(()=>{
      setPwVisible(p=>({...p,[pw.id]:false}));
      setPwRevealAt(p=>{const n={...p};delete n[pw.id];return n;});
    },5000);
  };
  const copyPw = async(pw, type) => {
    const d=await getDecrypted(pw); if(!d) return;
    const text=type==='password'?d.password:d.user;
    await navigator.clipboard.writeText(text);
    const k=`${pw.id}_${type}`;
    setPwCopied(p=>({...p,[k]:true})); setTimeout(()=>setPwCopied(p=>({...p,[k]:false})),2000);
    if(type==='password') setTimeout(()=>navigator.clipboard.writeText(''),30000);
  };
  const deletePw = async(id) => { await api(`/api/personal/${id}`,'DELETE'); setPasswords(p=>p.filter(pw=>pw.id!==id)); };
  const openPwEdit = async(pw) => {

    const rect=anchorEl?anchorEl.getBoundingClientRect():{left:window.innerWidth/2,top:window.innerHeight/2,width:0,height:0};
    const x=rect.left+rect.width/2; const y=rect.top+rect.height/2;

      id:Date.now()+i, color:colors[i%colors.length],
      cx:(Math.random()-0.5)*180+'px', cy:-(40+Math.random()*120)+'px',

    }));

  const fireGoalConfetti = (anchorEl) => {

    const rect=anchorEl?anchorEl.getBoundingClientRect():{left:window.innerWidth/2,top:window.innerHeight/2,width:0,height:0};
    const cx=rect.left+rect.width/2; const cy=rect.top+rect.height/2;
    for(let i=0;i<12;i++){
      const el=document.createElement('div');
      const dx=(Math.random()-0.5)*160; const dy=-(60+Math.random()*80);
      const deg=Math.random()*720-360;

    if(anchorEl&&milestones.some(m=>oldPct<m&&newPct>=m)) fireGoalConfetti(anchorEl);

  /* ── Helpers ── */

  /* ── Tab renders ── */

      if(tagFilter&&!(n.tags||[]).includes(tagFilter)) return false;

            )
          :filtered.length===0
            ?ce('div',{className:'pv-empty'},ce('i',{className:'ti ti-search pv-empty-icon'}),ce('p',null,'Nenhum resultado para este filtro.'))

                },
                ce('button',{className:'pv-note-del-x',title:'Excluir',onClick:e=>{e.stopPropagation();setNoteDelConfirm(n);setNoteDelExiting(false);}},'×'),

                ce('p',{className:'pv-card-preview'},(n.content&&n.content.body)||''),

                  ce('span',{className:'pv-note-rel-date'},fmtNoteDate(n.created_at))
                ));
              })),
      noteDelConfirm&&ce('div',{className:'pv-del-modal-overlay',onClick:()=>{if(!noteDelExiting){setNoteDelExiting(true);setTimeout(()=>setNoteDelConfirm(null),200);}}},
        ce('div',{className:'pv-del-modal'+(noteDelExiting?' pv-del-modal--exit':''),onClick:e=>e.stopPropagation()},
          ce('div',{style:{width:52,height:52,background:'rgba(239,68,68,0.12)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}},
            ce('i',{className:'ti ti-trash-x',style:{fontSize:26,color:'#f87171'}})
          ),

    if(!pw||pw.length<4) return {w:'20%',color:'#ef4444'};
    if(pw.length<8) return {w:'45%',color:'#f59e0b'};
    const u=/[A-Z]/.test(pw); const s=/[^a-zA-Z0-9]/.test(pw);
    if(pw.length>=12&&u&&s) return {w:'100%',color:'#22c55e'};
    if(pw.length>=8&&(u||s)) return {w:'70%',color:'#f59e0b'};
    return {w:'55%',color:'#f59e0b'};
  };

  const fmtNoteDate = (iso) => {
    if(!iso) return '';
    const abs=Math.abs(Math.ceil((new Date(iso)-new Date())/86400000));
    if(abs===0) return 'hoje';
    if(abs===1) return 'ontem';
    if(abs<7) return abs+'d atrás';
    if(abs<30) return Math.floor(abs/7)+'sem';
    return fmtDate(iso);
  };

  const fmtRelDate = (iso) => {
    if(!iso) return null;
    const d=Math.ceil((new Date(iso)-new Date())/86400000);
    if(d<0) return {text:'Vencida há '+Math.abs(d)+'d',cls:'--urgent'};
    if(d===0) return {text:'Vence hoje',cls:'--urgent'};
    if(d<=7) return {text:'Vence em '+d+'d',cls:'--urgent'};
    if(d<=30) return {text:'Vence em '+d+'d',cls:'--amber'};
    return {text:'Vence em '+d+'d',cls:''};
  };

function RemindersView() {
  const ce = React.createElement;
  const [reminders,  setReminders]  = React.useState([]);
  const [events,     setEvents]     = React.useState([]);
  const [loading,    setLoading]    = React.useState(true);
  const [modal,      setModal]      = React.useState(null);
  const [editing,    setEditing]    = React.useState(null);
  const [form,       setForm]       = React.useState({title:'',due_datetime:'',repeat:'none',notes:''});
  const [saving,     setSaving]     = React.useState(false);
  const [delConfirm, setDelConfirm] = React.useState(null);
  const [delExiting, setDelExiting] = React.useState(false);
  const [newIds,     setNewIds]     = React.useState(new Set());
  const [dying,      setDying]      = React.useState(new Set());

  React.useEffect(()=>{ load(); },[]);

  const load = async () => {
    setLoading(true);
    try {
      const [rRes,eRes]=await Promise.all([fetch('/api/reminders'),fetch('/api/events')]);
      const rd=await rRes.json(); setReminders(rd.reminders||[]);
      const ed=await eRes.json(); setEvents(ed.events||[]);
    } catch {}
    setLoading(false);
  };

  const openNew = () => {
    setEditing(null);
    const now=new Date(); now.setSeconds(0,0);
    now.setMinutes(Math.ceil(now.getMinutes()/15)*15);
    const pad=n=>String(n).padStart(2,'0');
    const dt=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
    setForm({title:'',due_datetime:dt,repeat:'none',notes:''});
    setModal('new');
  };

  const openEdit = (r) => {
    setEditing(r);
    const rawDt=(r.content&&r.content.due_datetime)||r.date||'';
    const localDt=rawDt?rawDt.slice(0,16):'';
    setForm({title:r.title||'',due_datetime:localDt,repeat:(r.content&&r.content.repeat)||'none',notes:(r.content&&r.content.notes)||''});
    setModal('edit');
  };

  const save = async () => {
    if(!form.title.trim()) return;
    setSaving(true);
    try {
      if(modal==='new') {
        const r=await fetch('/api/reminders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:form.title,due_datetime:form.due_datetime,repeat:form.repeat,notes:form.notes})});
        const d=await r.json();
        const entry=d.reminder||d;
        setReminders(p=>[entry,...p]);
        setNewIds(p=>{const s=new Set(p);s.add(entry.id);setTimeout(()=>setNewIds(pp=>{const ss=new Set(pp);ss.delete(entry.id);return ss;}),2000);return s;});
      } else {
        await fetch(`/api/reminders/${editing.id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:form.title,due_datetime:form.due_datetime,repeat:form.repeat,notes:form.notes})});
        setReminders(p=>p.map(r=>r.id===editing.id?{...r,title:form.title,content:{...r.content,due_datetime:form.due_datetime,repeat:form.repeat,notes:form.notes}}:r));
      }
      setModal(null);
    } catch {}
    setSaving(false);
  };

  const doDelete = async (id) => {
    setDying(p=>{const s=new Set(p);s.add(id);return s;});
    setTimeout(async()=>{
      await fetch(`/api/reminders/${id}`,{method:'DELETE'}).catch(()=>{});
      setReminders(p=>p.filter(r=>r.id!==id));
      setDying(p=>{const s=new Set(p);s.delete(id);return s;});
    },220);
    setDelConfirm(null);
  };

  const fmtDateTime = (iso) => {
    if(!iso) return '';
    try {
      const hasTime = iso.includes('T') && !iso.includes('T00:00');
      const now=new Date(); const tom=new Date(now); tom.setDate(now.getDate()+1);
      if(!hasTime) {
        const [y,m,dy]=iso.slice(0,10).split('-').map(Number);
        const d=new Date(y,m-1,dy);
        if(d.toDateString()===now.toDateString()) return 'Hoje';
        if(d.toDateString()===tom.toDateString()) return 'Amanhã';
        return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
      }
      const d=new Date(iso);
      const time=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      if(d.toDateString()===now.toDateString()) return time;
      if(d.toDateString()===tom.toDateString()) return 'Amanhã '+time;
      return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+time;
    } catch { return iso.slice(0,10)||''; }
  };

  const classify = () => {
    const now=new Date(); const todayStr=now.toDateString();
    const today=[],upcoming=[],overdue=[];
    reminders.forEach(r=>{
      const iso=(r.content&&r.content.due_datetime)||r.date;
      if(!iso){ upcoming.push(r); return; }
      let d;
      if(!iso.includes('T')||iso.includes('T00:00')){
        const [y,m,dy]=iso.slice(0,10).split('-').map(Number);
        d=new Date(y,m-1,dy);
      } else { d=new Date(iso); }
      if(d<now) overdue.push(r);
      else if(d.toDateString()===todayStr) today.push(r);
      else upcoming.push(r);
    });
    return {today,upcoming,overdue};
  };

  const REPEAT_LBL={none:'',daily:'Diário',weekly:'Semanal'};

  const renderEventCard=(e,i)=>
    ce('div',{key:e.id,className:'rm-ev-card',style:{'--si':i}},
      ce('div',{className:'rm-ev-icon'},ce('i',{className:'ti ti-calendar'})),
      ce('div',{className:'rm-ev-body'},
        ce('div',{className:'rm-ev-title'},e.title),
        ce('div',{className:'rm-ev-meta'},
          ce('span',{className:'rm-ev-pill'},e._pill||'Agenda'),
          (e.content&&e.content.start_time)&&ce('span',{className:'rm-time-pill'},e.content.start_time+(e.content.end_time?'–'+e.content.end_time:''))
        )
      )
    );

  const renderCard=(r,i,isOverdue)=>
    ce('div',{key:r.id,className:'rm-card'+(isOverdue?' rm-card--overdue':'')+(newIds.has(r.id)?' rm-card--new':'')+(dying.has(r.id)?' rm-card--dying':''),style:{'--si':i},onClick:()=>openEdit(r)},
      ce('div',{className:'rm-card-icon'},ce('i',{className:'ti '+(isOverdue?'ti-bell-off':'ti-bell')})),
      ce('div',{className:'rm-card-body'},
        ce('div',{className:'rm-card-title'},r.title),
        ce('div',{className:'rm-card-meta'},
          ((r.content&&r.content.due_datetime)||r.date)&&ce('span',{className:'rm-time-pill'},fmtDateTime((r.content&&r.content.due_datetime)||r.date)),
          (r.content&&r.content.repeat&&r.content.repeat!=='none')&&ce('span',{className:'rm-repeat-pill'},REPEAT_LBL[r.content.repeat]||r.content.repeat),
          isOverdue&&ce('span',{className:'rm-overdue-pill'},'Vencido')
        )
      ),
      ce('button',{className:'rm-card-del',onClick:e=>{e.stopPropagation();setDelConfirm(r);setDelExiting(false);}},'\xd7')
    );

  const renderSection=(title,items,emptyText,isOverdue=false,evts=[])=>{
    const total=evts.length+items.length;
    return ce('div',{className:'rm-section'},
      ce('div',{className:'rm-section-hd'},
        ce('span',{className:'rm-section-title'},title),
        total>0&&ce('span',{className:'rm-section-badge'},total)
      ),
      total===0
        ?ce('div',{className:'rm-empty'},ce('i',{className:'ti ti-bell rm-empty-icon'}),ce('p',{className:'rm-empty-text'},emptyText))
        :ce('div',{className:'rm-list'},...evts.map((e,i)=>renderEventCard(e,i)),...items.map((r,i)=>renderCard(r,evts.length+i,isOverdue)))
    );
  };

  const {today,upcoming,overdue}=classify();
  const _pad=n=>String(n).padStart(2,'0');
  const _now=new Date(); const _tom=new Date(_now); _tom.setDate(_now.getDate()+1);
  const _toStr=d=>`${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`;
  const _sortEv=(a,b)=>((a.content&&a.content.start_time)||'').localeCompare((b.content&&b.content.start_time)||'');
  const evToday=events.filter(e=>e.content&&e.content.date===_toStr(_now)).sort(_sortEv);
  const evTomorrow=events.filter(e=>e.content&&e.content.date===_toStr(_tom)).map(e=>({...e,_pill:'Amanhã'})).sort(_sortEv);

  const modalEl=modal&&ce('div',{className:'rm-modal-overlay',onClick:e=>{if(e.target===e.currentTarget)setModal(null);}},
    ce('div',{className:'rm-modal',onClick:e=>e.stopPropagation()},
      ce('div',{className:'rm-modal-hd'},
        ce('span',{className:'rm-modal-title'},modal==='new'?'Novo Lembrete':'Editar Lembrete'),
        ce('button',{className:'rm-modal-x',onClick:()=>setModal(null)},'\xd7')
      ),
      ce('div',{className:'rm-modal-row'},
        ce('div',{className:'rm-modal-label'},'T\xcdTULO'),
        ce('input',{className:'rm-modal-input',placeholder:'Ex: Ligar para cliente',value:form.title,onChange:e=>setForm(p=>({...p,title:e.target.value})),autoFocus:true,onKeyDown:e=>{if(e.key==='Enter')save();}})
      ),
      ce('div',{className:'rm-modal-row'},
        ce('div',{className:'rm-modal-label'},'DATA E HORA'),
        ce('input',{className:'rm-modal-input',type:'datetime-local',value:form.due_datetime,onChange:e=>setForm(p=>({...p,due_datetime:e.target.value}))})
      ),
      ce('div',{className:'rm-modal-row'},
        ce('div',{className:'rm-modal-label'},'REPETI\xc7\xc3O'),
        ce('div',{className:'rm-repeat-pills'},
          ['none','daily','weekly'].map(v=>ce('button',{key:v,className:'rm-repeat-btn'+(form.repeat===v?' rm-repeat-btn--active':''),onClick:()=>setForm(p=>({...p,repeat:v}))},{none:'Nenhum',daily:'Di\xe1rio',weekly:'Semanal'}[v]))
        )
      ),
      ce('div',{className:'rm-modal-row'},
        ce('div',{className:'rm-modal-label'},'NOTAS'),
        ce('textarea',{className:'rm-modal-input rm-modal-ta',placeholder:'Notas opcionais...',value:form.notes,onChange:e=>setForm(p=>({...p,notes:e.target.value}))})
      ),
      ce('div',{className:'rm-modal-foot'},
        ce('button',{className:'rm-modal-cancel',onClick:()=>setModal(null)},'Cancelar'),
        ce('button',{className:'rm-modal-save',onClick:save,disabled:saving},saving?'Salvando…':'Salvar')
      )
    )
  );

  const delEl=delConfirm&&ce('div',{className:'rm-del-overlay',onClick:()=>{if(!delExiting){setDelExiting(true);setTimeout(()=>setDelConfirm(null),200);}}},
    ce('div',{className:'rm-del-modal'+(delExiting?' rm-del-modal--exit':''),onClick:e=>e.stopPropagation()},
      ce('div',{className:'rm-del-icon'},ce('i',{className:'ti ti-trash',style:{fontSize:24,color:'#f87171'}})),
      ce('div',{className:'rm-del-title'},'Excluir lembrete?'),
      ce('div',{className:'rm-del-sub'},(delConfirm&&delConfirm.title)||'Este lembrete ser\xe1 apagado.'),
      ce('div',{className:'rm-del-actions'},
        ce('button',{className:'rm-del-cancel',onClick:()=>{setDelExiting(true);setTimeout(()=>setDelConfirm(null),200);}},'Cancelar'),
        ce('button',{className:'rm-del-confirm',onClick:()=>doDelete(delConfirm.id)},'Excluir')
      )
    )
  );

  return ce('div',{className:'rm-view'},
    ce('div',{className:'rm-header'},
      ce('h1',{className:'rm-header-title'},'Lembretes'),
      ce('button',{className:'rm-add-btn',onClick:openNew},'+ Lembrete')
    ),
    loading
      ?ce('div',{className:'rm-content'},ce('div',{style:{color:'var(--text-3)',fontSize:14,paddingTop:40,textAlign:'center'}},'Carregando…'))
      :ce('div',{className:'rm-content'},
          renderSection('Hoje',today,'Nenhum lembrete para hoje.',false,evToday),
          renderSection('Pr\xf3ximos',upcoming,'Tudo em dia — nenhum lembrete futuro.',false,evTomorrow),
          renderSection('Vencidos',overdue,'Sem lembretes vencidos.',true)
        ),
    modalEl,
    delEl
  );
}

function SettingsView() {
  const ce = React.createElement;
  const [sec, setSec] = React.useState(1);
  const [profileId, setProfileId] = React.useState(null);
  const [name, setName] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [tz, setTz] = React.useState('America/Sao_Paulo');
  const [botName, setBotName] = React.useState('Jarvis');
  const [botAvatar, setBotAvatar] = React.useState('🤖');
  const [color, setColor] = React.useState('#534AB7');
  const [tone, setTone] = React.useState('Parceiro');
  const [focus, setFocus] = React.useState([]);
  const [integs, setIntegs] = React.useState({gcal:false,gmail:false,whatsapp:false,instagram:false});
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [theme, setTheme] = React.useState('eclipse');
  const [showClear, setShowClear] = React.useState(false);

  React.useEffect(() => {
    fetch('/api/personal?tab=profile')
      .then(r => r.json())
      .then(d => {
        const items = d.entries || d.items || d.data || [];
        const p = items.find(i => i.tags && i.tags.includes('perfil')) || items[0];
        if (p) {
          setProfileId(p.id || null);
          const c = p.content || {};
          if (c.name) setName(c.name);
          if (c.email) setEmail(c.email);
          if (c.tz) setTz(c.tz);
          if (c.botName) setBotName(c.botName);
          if (c.botAvatar) setBotAvatar(c.botAvatar);
          if (c.color) { setColor(c.color); document.documentElement.style.setProperty('--accent', c.color); }
          if (c.tone) setTone(c.tone);
          if (c.focus) setFocus(c.focus);
          if (c.integs) setIntegs(c.integs);
          if (c.theme) setTheme(c.theme);
        }
      })
      .catch(() => {});
  }, []);

  function applyColor(c) {
    setColor(c);
    document.documentElement.style.setProperty('--accent', c);
    document.documentElement.style.setProperty('--accent-soft', window.__hexA(c, 0.18));
    localStorage.setItem('jarvis_primary_color', c);
  }

  function applyTheme(t) {
    setTheme(t);
    const bgs = {eclipse:'#080C14', nebula:'#050d1a', void:'#000000'};
    document.documentElement.style.setProperty('--bg', bgs[t] || '#080C14');
    localStorage.setItem('jarvis_theme', t);
  }

  function save() {
    setSaving(true);
    const content = {name,email,tz,botName,botAvatar,color,theme,tone,focus,integs};
    const body = profileId
      ? {content}
      : {type:'note',title:'Perfil',tags:['perfil'],content};
    const url = profileId ? '/api/personal/' + profileId : '/api/personal';
    const method = profileId ? 'PATCH' : 'POST';
    localStorage.setItem('jarvis_agent_tone', tone);
    localStorage.setItem('jarvis_name', botName || 'Jarvis');
    localStorage.setItem('jarvis_avatar', botAvatar || 'none');
    window.dispatchEvent(new CustomEvent('jarvis-settings-changed', {detail:{name:botName||'Jarvis',avatar:botAvatar||'none',tone,color}}));
    fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})
      .then(r => r.json())
      .then(d => {
        setSaving(false); setSaved(true);
        if (!profileId && (d.id || (d.data && d.data.id))) setProfileId(d.id || d.data.id);
        setTimeout(() => setSaved(false), 2500);
      })
      .catch(() => { setSaving(false); });
  }

  function toggleFocus(f) {
    setFocus(prev => prev.includes(f) ? prev.filter(x => x !== f) : [...prev, f]);

function TasksView() {
  const ce = React.createElement;
  const [tasks, setTasks] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState('all');
  const [dying, setDying] = React.useState(new Set());
  const [showModal, setShowModal] = React.useState(false);
  const [newTitle, setNewTitle] = React.useState('');
  const [newPriority, setNewPriority] = React.useState(1);
  const [newDue, setNewDue] = React.useState('');
  const [newTag, setNewTag] = React.useState('');
  const [creating, setCreating] = React.useState(false);

  React.useEffect(() => {
    fetch('/api/tasks')
      .then(r => r.json())
      .then(d => {
        const all = d.tasks || [];
        const today = new Date(); today.setHours(0,0,0,0);
        const stale = all.filter(t => {
          if (t.status !== 'done') return false;
          const ts = t.updated_at || t.created_at;
          if (!ts) return false;
          const completed = new Date(ts); completed.setHours(0,0,0,0);
          return completed < today;
        });
        stale.forEach(t => fetch('/api/tasks/' + t.id, {method: 'DELETE'}));
        setTasks(all.filter(t => !stale.find(s => s.id === t.id)));
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  const toggle = (task) => {
    const next = task.status === 'done' ? 'active' : 'done';
    if (next === 'done') {
      setDying(prev => { const s = new Set(prev); s.add(task.id); return s; });
      setTimeout(() => {
        setTasks(prev => prev.map(t => t.id === task.id ? {...t, status: next} : t));
        setDying(prev => { const s = new Set(prev); s.delete(task.id); return s; });
      }, 380);
    } else {
      setTasks(prev => prev.map(t => t.id === task.id ? {...t, status: next} : t));
    }
    fetch('/api/tasks/' + task.id, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({status: next})
    });
  };

  const createTask = () => {
    if (!newTitle.trim()) return;
    setCreating(true);
    fetch('/api/tasks', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        title: newTitle.trim(), priority: newPriority,
        due_date: newDue || null,
        tags: newTag.trim() ? [newTag.trim()] : []
      })
    })
    .then(r => r.json())
    .then(created => {
      if (created.id) setTasks(prev => [created, ...prev]);
      setShowModal(false);
      setNewTitle(''); setNewPriority(1); setNewDue(''); setNewTag('');
    })
    .finally(() => setCreating(false));
  };

  const PRIO = {
    high:   {label: 'Alta',  color: '#F87171', bg: 'rgba(248,113,113,0.12)', border: '#fbbf24'},
    medium: {label: 'Média', color: '#FBBF24', bg: 'rgba(251,191,36,0.09)',  border: '#60a5fa'},
    low:    {label: 'Baixa', color: 'rgba(255,255,255,0.32)', bg: 'rgba(255,255,255,0.05)', border: 'rgba(255,255,255,0.06)'}
  };

  const getPrio = (t) => {
    const cp = t.content && t.content.priority;
    if (cp === 'alta') return 'high';
    if (cp === 'média' || cp === 'media') return 'medium';
    if (cp === 'baixa') return 'low';
    if (t.priority >= 2) return 'high';
    if (t.priority === 1) return 'medium';
    return 'low';
  };

  // Extrai "- Cliente" do título; retorna {clean, client}
  const KNOWN_CLIENTS = ['Gracie Barra', 'SoHo', 'DDpartssolution'];
