<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>JARVIS</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0A0A12" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Jarvis" />
<link rel="apple-touch-icon" href="/icon-192.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080C14;
    --text: #F0F0F5;
    --text-2: #8888A0;
    --text-3: #5A5A70;
    --border: rgba(255,255,255,0.07);
    --accent: #7C6AF7;
    --accent-soft: rgba(124,106,247,0.18);
    --sb-w: 60px;
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  html { height: -webkit-fill-available; }
  body {
    margin: 0;
    font-family: 'Space Grotesk', 'DM Sans', 'Helvetica Neue', Helvetica, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    min-height: -webkit-fill-available;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button, input { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; }
  button { cursor: pointer; }

  /* ---------- APP ---------- */
  * { -webkit-tap-highlight-color: transparent; }
  button, a, [role="button"] { touch-action: manipulation; }

  .app {
    position: relative;
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--bg);
    transition: background 600ms ease;
  }

  /* ---------- BACKGROUND PARTICLES ---------- */
  .bg-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .bg-layer canvas {
    opacity: 0.25;
    transition: opacity 600ms ease;
  }
  .is-active .bg-layer canvas { opacity: 1; }

  /* ---------- ORB AS AMBIENT ENVIRONMENT ---------- */
  .orb-ambient {
    position: fixed;
    top: 44vh;
    top: 44dvh;
    left: 50%;
    bottom: auto;
    right: auto;
    width: var(--orb-size);
    height: var(--orb-size);
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: auto;
    opacity: 0.35;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 55%);
    transition: transform 520ms cubic-bezier(.4,0,.2,1), opacity 600ms ease;
    will-change: transform;
  }
  .is-active .orb-ambient { -webkit-transform: translate(-50%,-50%) scale(1.04); transform: translate(-50%,-50%) scale(1.04); opacity: 1; }
  .is-active .orb-ambient.orb-ambient--listening { -webkit-transform: translate(-50%,-50%) scale(1.06); transform: translate(-50%,-50%) scale(1.06); }
  .is-active .orb-ambient.orb-ambient--speaking  { -webkit-transform: translate(-50%,-50%) scale(1.05); transform: translate(-50%,-50%) scale(1.05); }
  .has-chat .orb-ambient {
    opacity: 0 !important;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 400ms ease, visibility 0s linear 400ms;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    position: absolute;
    left: 0; top: 0;
    z-index: 5;
    width: var(--sb-w);
    height: 100vh;
    height: 100dvh;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .sidebar-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .sidebar-logo-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.45);
    transition: color 250ms ease;
  }
  .sidebar-logo-mark:hover { color: #fff; }
  .is-light .sidebar-logo-mark { color: rgba(0,0,0,0.35); }
  .is-light .sidebar-logo-mark:hover { color: #15151B; }

  .sidebar-nav { display: flex; flex-direction: column; gap: 12px; flex: 1; padding-top: 14px; }
  .sidebar-foot { display: flex; flex-direction: column; gap: 16px; align-items: center; }

  .nav-item {
    position: relative;
    width: 30px; height: 30px;
    border-radius: 6px;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.20);
    transition: color 220ms ease, transform 220ms ease;
  }
  .is-light .nav-item { color: rgba(0,0,0,0.22); }
  .is-mounted .nav-item {
    animation: navIn 600ms cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes navIn {
    0% { transform: translateX(-6px); }
    100% { transform: translateX(0); }
  }
  .nav-item:hover { color: rgba(255,255,255,0.85); }
  .is-light .nav-item:hover { color: rgba(0,0,0,0.85); }
  .nav-item.is-active { color: #fff; }
  .is-light .nav-item.is-active { color: #15151B; }
  .nav-item.is-active::before {
    content: '';
    position: absolute;
    left: -16px; top: 50%;
    transform: translateY(-50%);
    width: 2px; height: 14px;
    border-radius: 0 2px 2px 0;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .nav-tooltip {
    position: absolute;
    left: calc(100% + 18px);
    top: 50%;
    transform: translateY(-50%) translateX(-4px);
    background: rgba(20,24,36,0.92);
    color: var(--text);
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 6px;
    border: 1px solid var(--border);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 20;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
  .nav-item:hover .nav-tooltip { opacity: 1; transform: translateY(-50%) translateX(0); }

  .nav-theme { color: rgba(255,255,255,0.20); }
  .is-light .nav-theme { color: rgba(0,0,0,0.22); }

  /* ---------- MAIN STAGE ---------- */
  .main {
    position: relative;
    z-index: 3;
    height: 100vh;
    height: 100dvh;
  }

  /* hero — layout centralizado, elementos fixed */
  .hero-phrase   { position:fixed; top:8vh;  left:50%; -webkit-transform:translateX(-50%); transform:translateX(-50%); text-align:center; font-size:12px; color:var(--text); opacity:0.22; pointer-events:none; z-index:4; letter-spacing:0.04em; white-space:nowrap; transition:opacity 420ms ease; }
  .hero-greeting { position:fixed; top:15vh; left:50%; -webkit-transform:translateX(-50%); transform:translateX(-50%); text-align:center; font-family:'Geist Mono',monospace; font-size:14px; font-weight:400; letter-spacing:0.2em; text-transform:uppercase; color:var(--text); opacity:0.55; pointer-events:none; z-index:4; white-space:nowrap; transition:opacity 420ms ease; }
  .hero-clock    { position:fixed; top:24px; right:24px; font-family:'Geist Mono',monospace; font-size:13px; color:var(--text); opacity:0.35; pointer-events:none; z-index:4; transition:opacity 420ms ease; letter-spacing:0.04em; }
  .hero-rank     { position:fixed; bottom:14vh; left:50%; -webkit-transform:translateX(-50%); transform:translateX(-50%); display:inline-flex; align-items:center; gap:6px; font-size:12px; font-family:'Geist Mono',monospace; letter-spacing:0.04em; pointer-events:none; z-index:4; transition:opacity 420ms ease; }
  .hero-rank-gem { font-size:13px; line-height:1; }
  .hero-rank-label { font-weight:500; }
  .hero-rank-pts { opacity:0.45; }
  .hero-rank-pts::before { content:'·'; margin-right:5px; }
  .is-active .hero-greeting,.is-active .hero-clock,.is-active .hero-rank,.is-active .hero-phrase { opacity:0; }
  .has-chat   .hero-greeting,.has-chat   .hero-clock,.has-chat   .hero-rank,.has-chat   .hero-phrase { opacity:0; pointer-events:none; }
  .is-mounted .hero-phrase   { animation:fadeUpCentered 700ms 60ms  cubic-bezier(.2,.7,.2,1) both; }
  .is-mounted .hero-greeting { animation:fadeUpCentered 700ms 120ms cubic-bezier(.2,.7,.2,1) both; }
  .is-mounted .hero-clock    { animation:fadeUp         700ms 80ms  cubic-bezier(.2,.7,.2,1) both; }
  .is-mounted .hero-rank     { animation:fadeUpCentered 800ms 200ms cubic-bezier(.2,.7,.2,1) both; }

  .hero-agent { display:flex; align-items:center; gap:8px; margin-bottom:12px; opacity:0; transform:translateY(6px); transition:opacity 0.4s ease, transform 0.4s ease; }
  .is-mounted .hero-agent { opacity:1; transform:translateY(0); }
  .hero-agent-icon { font-size:20px; line-height:1; }
  .hero-agent-name { font-size:12px; font-weight:700; color:var(--text-3); letter-spacing:1.5px; text-transform:uppercase; }
  .st-save-btn.st-saved-ok { background:#10B981 !important; }
  .hero-eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
    text-shadow: 0 0 40px rgba(8,12,20,0.8);
  }
  .is-light .hero-eyebrow { color: rgba(0,0,0,0.32); }
  .is-mounted .hero-eyebrow {
    animation: fadeUp 800ms 80ms cubic-bezier(.2,.7,.2,1) both;
  }


  /* ---------- INPUT — pill, fixed at bottom ---------- */
  .input-shell {
    position: fixed;
    left: 50%;
    bottom: 6vh;
    top: auto;
    -webkit-transform: translateX(-50%);
    transform: translateX(-50%);
    width: min(520px, calc(100% - 48px));
    z-index: 2;
    transition: width 540ms cubic-bezier(.4,0,.2,1);
  }
  .is-active .input-shell {
    width: min(560px, calc(100% - 48px));
  }
  .is-mounted .composer {
    animation: fadeUp 1000ms 500ms cubic-bezier(.2,.7,.2,1) both;
  }

  .composer {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 6px 6px 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px) saturate(1.2);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.05) inset,
      0 12px 40px rgba(0,0,0,0.35);
    transition: background 280ms ease, box-shadow 280ms ease;
  }
  .is-light .composer { background: rgba(255,255,255,0.55); }
  .composer:focus-within {
    background: rgba(255,255,255,0.07);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.08) inset,
      0 12px 40px rgba(0,0,0,0.4),
      0 0 0 1px var(--accent-soft);
  }
  .is-light .composer:focus-within { background: rgba(255,255,255,0.75); }
  .composer.is-listening {
    box-shadow:
      0 1px 0 rgba(255,255,255,0.08) inset,
      0 12px 40px rgba(0,0,0,0.4),
      0 0 0 1px var(--accent);
  }

  .composer-input {
    flex: 1;
    min-width: 0;
    background: none;
    outline: 0;
    color: var(--text);
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.5;
    padding: 8px 4px;
  }
  .composer-input::placeholder {
    color: rgba(255,255,255,0.35);
    font-weight: 400;
  }
  .is-light .composer-input::placeholder { color: rgba(0,0,0,0.35); }

  .composer-btn {
    position: relative;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.45);
    transition: color 200ms ease, background 200ms ease, transform 200ms ease;
    flex-shrink: 0;
  }
  .is-light .composer-btn { color: rgba(0,0,0,0.5); }
  .composer-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .is-light .composer-btn:hover { background: rgba(0,0,0,0.05); }
  .composer-btn.mic.is-on {
    color: var(--accent);
    background: rgba(124,106,247,0.18);
  }
  /* ── Action wrapper: single flex slot, mic + send overlap via absolute ── */
  .composer-action-wrap {
    position: relative;
    width: 36px; height: 36px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .composer-action-wrap .composer-send,
  .composer-action-wrap .composer-btn.mic {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border-radius: 11px;
    display: grid; place-items: center;
    transition: opacity 0.18s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease, background 0.18s ease;
  }
  /* Send: hidden by default, springs in on has-text */
  .composer-send {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 18px rgba(83,74,183,0.5);
    opacity: 0; transform: scale(0.5) rotate(-20deg); pointer-events: none;
  }
  .composer-send:active { transform: scale(0.86) !important; box-shadow: 0 2px 8px rgba(83,74,183,0.3); }
  /* Mic: visible by default */
  .composer-btn.mic {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    opacity: 1; transform: scale(1);
  }
  /* Swap on has-text */
  .composer.has-text .composer-send {
    opacity: 1; transform: scale(1) rotate(0deg); pointer-events: auto;
    box-shadow: 0 4px 20px rgba(83,74,183,0.6);
  }
  .composer.has-text .composer-btn.mic {
    opacity: 0; transform: scale(0.5) rotate(20deg); pointer-events: none;
  }
  @keyframes sendPop { from { transform: scale(0.4) rotate(-25deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
  .mic-pulse {
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0;
    animation: micPulse 1.2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes micPulse {
    0%   { transform: scale(0.85); opacity: .8; }
    100% { transform: scale(1.45); opacity: 0; }
  }

  /* ---------- STATUS LINE (below orb when speaking/listening) ---------- */
  .status-line {
    position: absolute;
    left: 50%;
    top: calc(50% + min(34vh, 280px));
    transform: translate(-50%, -50%);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.32em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    z-index: 4;
    transition: opacity 380ms ease, top 540ms cubic-bezier(.4,0,.2,1);
  }
  .status-line.is-visible { opacity: .85; }

  /* ---------- ANIMS ---------- */
  @keyframes fadeUp         { from { transform: translateY(8px); }              to { transform: none; } }
  @keyframes fadeUpCentered { from { transform: translateX(-50%) translateY(8px); } to { transform: translateX(-50%); } }


  /* ---------- CHAT FEED ---------- */
  .chat-feed {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    -webkit-transform: translateX(-50%);
    transform: translateX(-50%);
    width: min(560px, calc(100% - var(--sb-w) - 48px));
    margin-left: calc(var(--sb-w) / 2);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 40px 12px calc(6vh + 88px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
    z-index: 2;
  }
  .chat-feed::-webkit-scrollbar { width: 4px; }
  .chat-feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .chat-feed.has-messages { opacity: 1; pointer-events: auto; }

  .msg { position: relative; margin: 0 0 20px; display: flex; flex-direction: column; gap: 4px; }
  .msg-user { align-items: flex-end; }
  .msg-jarvis { align-items: flex-start; }

  .msg-user .msg-bubble {
    background: rgba(255,255,255,0.07);
    border-radius: 18px 18px 4px 18px;
    padding: 10px 14px;
    font-size: 14.5px;
    line-height: 1.55;
    max-width: 85%;
  }
  .is-light .msg-user .msg-bubble { background: rgba(0,0,0,0.06); }

  .msg-copy-wrap { position: relative; }
  .msg-text { font-size: 14.5px; line-height: 1.65; color: var(--text); white-space: pre-wrap; }

  .msg-copy {
    position: absolute; top: 2px; right: -30px;
    opacity: 0; width: 22px; height: 22px;
    border-radius: 5px; display: grid; place-items: center;
    color: var(--text-2);
    transition: opacity 150ms ease, background 150ms ease, color 150ms ease;
  }
  .msg:hover .msg-copy { opacity: 1; }
  .msg-copy:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .is-light .msg-copy:hover { background: rgba(0,0,0,0.06); }

  .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); opacity: 0.3;
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotBounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  .msg-error-row {
    font-size: 13px; color: rgba(240,80,80,0.9);
    display: flex; align-items: center; gap: 8px;
  }
  .retry-btn { font-size: 12px; color: var(--accent); text-decoration: underline; cursor: pointer; }

  /* ── mini-cards inline no chat ── */
  @keyframes mcIn { from { opacity:0; transform:translateY(6px) scale(0.95); } to { opacity:1; transform:none; } }
  @keyframes mcFadeOut { to { opacity:0; transform:translateX(8px); } }
  @keyframes mcConfettiP { to { opacity:0; transform:translate(var(--cx,0px),var(--cy,-40px)) rotate(var(--cr,180deg)); } }
  .mc-wrap { margin-top:12px; background:linear-gradient(135deg,rgba(83,74,183,0.12),rgba(83,74,183,0.04)); border:1px solid rgba(83,74,183,0.3); border-radius:16px; padding:16px; display:flex; flex-direction:column; gap:0; animation:mcIn 350ms cubic-bezier(0.34,1.56,0.64,1) both; overflow:hidden; max-height:1400px; transition:max-height 420ms cubic-bezier(0.4,0,0.2,1),opacity 350ms ease-out,padding 350ms ease-out,margin-top 350ms ease-out; }
  .mc-wrap.is-collapsed { max-height:0; opacity:0; padding-top:0; padding-bottom:0; margin-top:0; pointer-events:none; }
  .mc-wrap--neg { background:linear-gradient(135deg,rgba(248,113,113,0.1),rgba(248,113,113,0.04)) !important; border-color:rgba(248,113,113,0.35) !important; }
  .mc-footer-count { font-size:10px; color:rgba(255,255,255,0.25); }
  .mc-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .mc-header-icon { font-size:15px; color:#9b8fff; flex-shrink:0; }
  .mc-header-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.45); flex:1; }
  .mc-count-pill { font-size:10px; font-weight:700; padding:1px 8px; border-radius:999px; background:rgba(83,74,183,0.25); color:#9b8fff; }
  .mc-row { display:flex; align-items:center; gap:9px; padding:6px 4px; border-radius:8px; min-width:0; transition:background 0.15s, transform 0.18s; }
  .mc-row:hover { background:rgba(255,255,255,0.04); transform:translateX(4px); }
  .mc-row.is-done { opacity:0.4; }
  .mc-row.is-fading { animation:mcFadeOut 400ms ease both; }
  .mc-chk { width:17px; height:17px; min-width:17px; border-radius:50%; border:1.5px solid rgba(124,106,247,0.45); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.18s; background:transparent; }
  .mc-chk:hover { border-color:#9b8fff; background:rgba(83,74,183,0.2); }
  .mc-chk.is-checked { border-color:#1D9E75; background:rgba(29,158,117,0.2); }
  .mc-chk-svg { width:9px; height:9px; opacity:0; transition:opacity 0.18s; }
  .mc-chk.is-checked .mc-chk-svg { opacity:1; }
  .mc-title { font-size:13px; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:all 0.2s; }
  .mc-row.is-done .mc-title { text-decoration:line-through; color:rgba(255,255,255,0.28); }
  .mc-subtitle { font-size:11px; color:rgba(255,255,255,0.38); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
  .mc-pill { font-size:10px; font-weight:600; padding:2px 6px; border-radius:999px; text-transform:uppercase; letter-spacing:0.05em; flex-shrink:0; white-space:nowrap; }
  .mc-pill--active,.mc-pill--todo,.mc-pill--pending { background:rgba(124,106,247,0.18); color:#9b8fff; }
  .mc-pill--done,.mc-pill--completed { background:rgba(29,158,117,0.15); color:#1D9E75; }
  .mc-pill--overdue { background:rgba(248,113,113,0.18); color:#f87171; }
  .mc-tag { font-size:10px; padding:2px 6px; border-radius:6px; flex-shrink:0; font-weight:500; white-space:nowrap; }
  .mc-tag--gracie { background:rgba(52,211,153,0.15); color:#34d399; }
  .mc-tag--soho { background:rgba(124,106,247,0.18); color:#9b8fff; }
  .mc-tag--ddparts { background:rgba(251,146,60,0.18); color:#fb923c; }
  .mc-tag--default { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.5); }
  .mc-ev-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .mc-ev-time { font-size:11px; color:rgba(255,255,255,0.38); font-family:'Geist Mono',monospace; flex-shrink:0; }
  .mc-finance-pills { display:flex; gap:8px; }
  .mc-fin-pill { flex:1; display:flex; flex-direction:column; gap:2px; padding:9px 10px; border-radius:10px; background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.08); }
  .mc-fin-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.38); }
  .mc-fin-value { font-size:13px; font-weight:600; }
  .mc-fin-pill--balance .mc-fin-value { color:var(--text); }
  .mc-fin-pill--income  .mc-fin-value { color:#34d399; }
  .mc-fin-pill--expense .mc-fin-value { color:#f87171; }
  .mc-footer { display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding-top:10px; border-top:0.5px solid rgba(255,255,255,0.07); }
  .mc-expand-btn { font-size:10px; color:rgba(255,255,255,0.28); background:none; border:none; cursor:pointer; font-family:inherit; padding:0; transition:color 0.15s; }
  .mc-expand-btn:hover { color:rgba(255,255,255,0.65); }
  .mc-action { font-size:11px; color:rgba(124,106,247,0.75); background:none; border:none; cursor:pointer; padding:0; font-family:inherit; display:inline-flex; align-items:center; gap:4px; transition:color 0.15s; }
  .mc-action:hover { color:#9b8fff; }
  .mc-action-arrow { display:inline-block; transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
  .mc-action:hover .mc-action-arrow { transform:translateX(3px); }
  .is-light .mc-wrap { background:linear-gradient(135deg,rgba(83,74,183,0.06),rgba(83,74,183,0.02)); border-color:rgba(83,74,183,0.2); }
  .is-light .mc-subtitle,.is-light .mc-ev-time,.is-light .mc-fin-label { color:rgba(0,0,0,0.4); }
  .is-light .mc-tag--default { background:rgba(0,0,0,0.06); color:rgba(0,0,0,0.5); }
  .is-light .mc-footer { border-top-color:rgba(0,0,0,0.07); }
  .is-light .mc-header-label { color:rgba(0,0,0,0.4); }
  /* skeleton */
  @keyframes mcShimmer { from{background-position:-200% 0} to{background-position:200% 0} }
  .mc-skel-wrap { margin-top:12px; background:rgba(83,74,183,0.05); border:1px solid rgba(83,74,183,0.12); border-radius:16px; padding:16px; display:flex; flex-direction:column; gap:11px; }
  .mc-skel-line { height:11px; border-radius:6px; background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.1) 50%,rgba(255,255,255,0.04) 75%); background-size:200% 100%; animation:mcShimmer 1.5s ease-in-out infinite; }
  /* stagger row entrance */
  @keyframes mcRowIn { from{opacity:0;transform:translateX(-5px)} to{opacity:1;transform:none} }
  .mc-row-enter { animation:mcRowIn 260ms cubic-bezier(0.34,1.56,0.64,1) both; }
  /* progress bar */
  .mc-progress { height:3px; border-radius:999px; background:rgba(255,255,255,0.07); margin-bottom:12px; overflow:hidden; }
  .mc-progress-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#534AB7,#9b8fff); transition:width 600ms cubic-bezier(0.34,1.56,0.64,1); }
  .mc-progress-fill--done { background:linear-gradient(90deg,#1D9E75,#34d399); }
  /* all-done */
  .mc-alldone { display:flex; flex-direction:column; align-items:center; gap:5px; padding:10px 0 6px; animation:mcIn 400ms cubic-bezier(0.34,1.56,0.64,1) both; }
  .mc-alldone-icon { font-size:30px; line-height:1; }
  .mc-alldone-text { font-size:12px; font-weight:700; color:#34d399; letter-spacing:0.1em; text-transform:uppercase; }
  .mc-alldone-sub  { font-size:11px; color:rgba(255,255,255,0.32); }
  /* finance trend */
  .mc-fin-trend { font-size:10px; font-weight:600; margin-top:3px; }
  .mc-fin-trend--up   { color:#34d399; }
  .mc-fin-trend--down { color:#f87171; }
  /* finance period label */
  .mc-fin-period { font-size:9px; color:rgba(255,255,255,0.22); letter-spacing:0.08em; white-space:nowrap; }
  /* reminders urgency */
  @keyframes mcPulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .mc-rm-urgent { animation:mcPulse 1s ease infinite; }

  .composer-textarea {
    flex: 1; min-width: 0; background: none; outline: 0;
    color: var(--text); font-family: inherit;
    font-size: 14.5px; font-weight: 400; line-height: 1.5;
    padding: 8px 4px; resize: none; overflow-y: hidden;
    position: relative; z-index: 1;
    min-height: 24px;
  }
  .composer-textarea::placeholder { color: rgba(255,255,255,0.35); font-weight: 400; }
  .is-light .composer-textarea::placeholder { color: rgba(0,0,0,0.35); }

  /* ─── Tasks View ─── */
  @keyframes tvFadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes tvSlideDown{ from { opacity:0; transform:translateY(-8px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes tvSlideUp  { from { transform:translateY(100%); } to { transform:translateY(0); } }
  @keyframes tvSlideOut { from { opacity:1; transform:translateX(0); max-height:60px; padding-top:12px; padding-bottom:12px; } to { opacity:0; transform:translateX(28px); max-height:0; padding-top:0; padding-bottom:0; border-bottom-width:0; } }
  @keyframes tvShimmer  { from { background-position:-600px 0; } to { background-position:600px 0; } }
  @keyframes tvScaleIn  { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }
  @keyframes tvPulse    { 0%,100% { box-shadow:0 0 0 0 rgba(124,106,247,0.4); } 50% { box-shadow:0 0 0 7px rgba(124,106,247,0); } }

  .is-tasks .orb-ambient { opacity: 0 !important; transition: opacity 0.5s; }
  .is-tasks .bg-layer canvas { opacity: 0.05 !important; transition: opacity 0.5s; }

  .tasks-view {
    position: relative; z-index: 3; height: 100vh; height: 100dvh;
    padding: 40px 48px 32px calc(var(--sb-w) + 40px);
    display: flex; flex-direction: column; gap: 20px;
    overflow-y: auto; box-sizing: border-box;
  }
  .tv-header { display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
  .tv-title { font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.04em; margin: 0; animation: tvFadeUp 0.4s both; }
  .tv-sub { display: block; font-size: 11.5px; color: var(--text-3); margin-top: 6px; font-family: 'Geist Mono', monospace; letter-spacing: 0.04em; animation: tvFadeUp 0.4s 0.05s both; }
  .tv-new-btn {
    padding: 9px 20px; border-radius: 999px;
    background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.3);
    color: var(--accent); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    animation: tvFadeUp 0.4s 0.1s both;
  }
  .tv-new-btn:hover { background: rgba(124,106,247,0.22); border-color: rgba(124,106,247,0.5); transform: translateY(-1px); }
  .tv-new-btn:active { transform: translateY(0); }

  /* Stats cards */
  .tv-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; flex-shrink: 0; animation: tvFadeUp 0.4s 0.08s both; }
  .tv-card {
    padding: 10px 16px; border-radius: 12px; max-height: 70px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
    transition: background 0.18s, border-color 0.18s, transform 0.18s; cursor: default;
  }
  .tv-card:hover { background: rgba(255,255,255,0.055); border-color: rgba(255,255,255,0.1); transform: translateY(-2px); }
  .tv-card-num { font-size: 22px; font-weight: 300; color: var(--text); letter-spacing: -0.03em; line-height: 1; }
  .tv-card-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }
  .tv-card--active .tv-card-num { color: var(--accent); }
  .tv-card--done   .tv-card-num { color: #34D399; }
  .tv-card--late   .tv-card-num { color: #F87171; }

  /* Tabs */
  .tv-tabs { display: flex; gap: 6px; flex-shrink: 0; animation: tvFadeUp 0.4s 0.12s both; }
  .tv-tab {
    padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 500;
    background: transparent; border: 1px solid var(--border); color: var(--text-3);
    cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .tv-tab:hover { color: var(--text-2); border-color: rgba(255,255,255,0.12); }
  .tv-tab.is-on { background: rgba(124,106,247,0.12); border-color: rgba(124,106,247,0.3); color: var(--accent); }
  .tv-tab--done.is-on { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.25); color: #34D399; }
  .tv-tab--late.is-on { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.25); color: #F87171; }

  /* Skeleton */
  .tv-skel-row { display: grid; grid-template-columns: 20px 1fr 68px 82px; align-items: center; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .tv-skel-row:last-child { border-bottom: none; }
  .tv-skel { height: 12px; border-radius: 6px; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 600px 100%; animation: tvShimmer 1.6s infinite linear; }
  .tv-skel-circ { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.05); }

  /* Empty state */
  .tv-empty { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 56px 0; animation: tvFadeUp 0.3s both; }
  .tv-empty-icon { font-size: 36px; opacity: 0.15; line-height: 1; }
  .tv-empty-msg { font-size: 14px; color: var(--text-3); font-family: 'Geist Mono', monospace; }
  .tv-empty-plain { font-size: 13px; color: var(--text-3); font-family: 'Geist Mono', monospace; padding: 60px 0; text-align: center; animation: tvFadeUp 0.3s both; }

  /* List */
  .tv-list { border-radius: 14px; border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; animation: tvFadeUp 0.4s 0.14s both; }
  .tv-row {
    display: grid; grid-template-columns: 22px 1fr auto;
    align-items: center; gap: 14px; padding: 12px 18px 12px 12px;
    border-bottom: 1px solid var(--border); transition: background 0.12s;
    animation: tvFadeUp 0.35s calc(var(--i,0) * 35ms) both;
    border-left: 3px solid var(--tv-prio, rgba(255,255,255,0.06));
  }
  .tv-row:last-child { border-bottom: none; }
  .tv-row:hover { background: rgba(255,255,255,0.02); }
  .tv-row.is-dying { animation: tvSlideOut 0.38s forwards ease-in; overflow: hidden; pointer-events: none; }
  .tv-done { opacity: 0.45; }

  /* Circular checkbox */
  .tv-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.18); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; padding: 0;
  }
  .tv-check:hover { border-color: var(--accent); background: rgba(124,106,247,0.08); animation: tvPulse 0.8s ease; }
  .tv-check svg { width: 10px; height: 8px; opacity: 0; transform: scale(0.5); transition: opacity 0.2s, transform 0.2s; }
  .tv-checked { background: var(--accent) !important; border-color: var(--accent) !important; }
  .tv-checked svg { opacity: 1 !important; transform: scale(1) !important; animation: tvScaleIn 0.2s; }

  /* Row body */
  .tv-body { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .tv-title-row { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .tv-task-name { font-size: 13.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; min-width: 0; }
  .tv-done .tv-task-name { text-decoration: line-through; color: var(--text-3); }
  .tv-client-pill { font-size: 10.5px; padding: 1.5px 7px; border-radius: 4px; font-weight: 500; background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.2); color: rgba(168,155,255,0.9); white-space: nowrap; flex-shrink: 0; }
  .tv-tags { display: flex; gap: 5px; }
  .tv-client-tag { font-size: 10.5px; padding: 1.5px 7px; border-radius: 4px; font-weight: 500; background: rgba(124,106,247,0.08); border: 1px solid rgba(124,106,247,0.15); color: rgba(168,155,255,0.7); }
  .tv-created-at { font-size: 10px; color: rgba(255,255,255,0.18); font-family: 'Geist Mono', monospace; letter-spacing: 0.02em; }
  .tv-row-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .tv-badge { font-size: 11px; padding: 2.5px 9px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
  .tv-due { font-size: 11.5px; color: var(--text-3); font-family: 'Geist Mono', monospace; white-space: nowrap; min-width: 60px; text-align: right; }
  .tv-no-prazo { color: rgba(255,255,255,0.2) !important; font-style: italic; }
  .tv-late-due { color: #F87171 !important; }

  /* FAB — mobile only */
  .tv-fab { display: none; }

  /* Modal */
  .tv-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: center; justify-content: center; animation: tvFadeUp 0.18s both; }
  .tv-modal {
    background: #0D1420; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px; padding: 26px; width: 420px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    animation: tvSlideDown 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .tv-modal-hd { display: flex; align-items: center; justify-content: space-between; }
  .tv-modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .tv-modal-x { font-size: 20px; color: var(--text-2); cursor: pointer; background: none; border: none; line-height: 1; padding: 2px 6px; border-radius: 6px; transition: background 0.12s; }
  .tv-modal-x:hover { background: rgba(255,255,255,0.08); }
  .tv-input {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 11px 14px; font-size: 13.5px; color: var(--text);
    width: 100%; font-family: inherit; outline: none; box-sizing: border-box; transition: border-color 0.15s;
  }
  .tv-input:focus { border-color: rgba(124,106,247,0.4); }
  .tv-input::placeholder { color: var(--text-3); }
  .tv-field { display: flex; flex-direction: column; gap: 6px; }
  .tv-label { font-size: 10.5px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-3); }
  .tv-prio-pills { display: flex; gap: 6px; }
  .tv-prio-pill { flex: 1; padding: 8px 0; border-radius: 8px; font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; font-family: inherit; transition: all 0.15s; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--text-3); }
  .tv-prio-pill.is-sel-high { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.4); color: #F87171; }
  .tv-prio-pill.is-sel-med  { background: rgba(251,191,36,0.1);  border-color: rgba(251,191,36,0.35);  color: #FBBF24; }
  .tv-prio-pill.is-sel-low  { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); color: var(--text-2); }
  .tv-modal-ft { display: flex; gap: 8px; justify-content: flex-end; margin-top: 2px; }
  .tv-btn-cancel { padding: 9px 17px; border-radius: 8px; background: transparent; border: 1px solid rgba(255,255,255,0.08); color: var(--text-2); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .tv-btn-cancel:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .tv-btn-ok { padding: 9px 20px; border-radius: 8px; background: var(--accent); border: none; color: white; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s, transform 0.15s; }
  .tv-btn-ok:hover { opacity: 0.88; transform: translateY(-1px); }
  .tv-btn-ok:active { transform: translateY(0); }
  .tv-btn-ok:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* ── Responsive ── */
  @media (max-width: 767px) {
    .tasks-view { padding: 24px 16px 100px calc(var(--sb-w) + 16px); gap: 16px; }
    .tv-title { font-size: 20px; }
    .tv-header { align-items: flex-start; flex-direction: column; gap: 2px; }
    .tv-new-btn { display: none; }
    .tv-stats { grid-template-columns: repeat(2,1fr); gap: 8px; }
    .tv-tabs { overflow-x: auto; padding-bottom: 2px; flex-wrap: nowrap; }
    .tv-tabs::-webkit-scrollbar { display: none; }
    .tv-hide-mobile { display: none !important; }
    .tv-row { padding: 11px 14px 11px 12px; gap: 10px; }
    .tv-fab {
      display: flex; position: fixed; bottom: 24px; right: 24px; z-index: 100;
      width: 52px; height: 52px; border-radius: 50%; background: var(--accent);
      border: none; color: white; font-size: 26px; line-height: 1;
      align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 6px 24px rgba(124,106,247,0.45); transition: transform 0.15s, box-shadow 0.15s;
    }
    .tv-fab:hover { transform: scale(1.08); box-shadow: 0 8px 32px rgba(124,106,247,0.6); }
    .tv-modal-bg { align-items: flex-end; }
    .tv-modal {
      width: 100%; max-width: 100%; border-radius: 20px 20px 0 0;
      animation: tvSlideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
      padding-bottom: max(26px, env(safe-area-inset-bottom, 26px));
    }
  }
  @media (min-width: 768px) and (max-width: 1023px) {
    .tasks-view { padding: 32px 32px 32px calc(var(--sb-w) + 28px); }
    .tv-card { padding: 10px 14px; }
    .tv-card-num { font-size: 21px; }
  }

  /* ─── CRM / Clients View ─── */
  @keyframes crmPulse    { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.35); opacity:0.55; } }
  @keyframes crmRotateIn { from { transform:rotate(-180deg) scale(0); opacity:0; } to { transform:rotate(0deg) scale(1); opacity:1; } }
  @keyframes crmDivider  { from { transform:scaleX(0); } to { transform:scaleX(1); } }
  @keyframes crmBlink    { 0%,100% { opacity:1; } 50% { opacity:0; } }

  .is-crm .orb-ambient { opacity: 0 !important; transition: opacity 0.5s; }
  .is-crm .bg-layer canvas { opacity: 0.05 !important; transition: opacity 0.5s; }
  .is-finance .orb-ambient { opacity: 0 !important; transition: opacity 0.5s; }
  .is-finance .bg-layer canvas { opacity: 0.05 !important; transition: opacity 0.5s; }
  .crm-view {
    position: relative; z-index: 3; height: 100vh; height: 100dvh;
    padding: 40px 48px 40px calc(var(--sb-w) + 40px);
    display: flex; flex-direction: column; gap: 24px;
    overflow-y: auto; box-sizing: border-box;
  }
  .crm-header { display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
  .crm-title { font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.04em; margin: 0; animation: tvFadeUp 0.3s both; }
  .crm-sub { display: block; font-size: 11.5px; color: var(--text-3); margin-top: 6px; font-family: 'Geist Mono', monospace; letter-spacing: 0.04em; animation: tvFadeUp 0.3s 0.06s both; }
  .crm-add-btn {
    padding: 9px 18px; border-radius: 999px;
    background: rgba(83,74,183,0.12); border: 1px solid rgba(83,74,183,0.28);
    color: var(--accent); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px;
