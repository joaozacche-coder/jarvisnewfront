        .then(d => { if (d.transactions) setTxns(d.transactions); })
        .catch(() => {});
    }, 30000);
    return () => clearInterval(id);
  }, []);

  React.useEffect(() => {
    if (loading || !chartRef.current) return;
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) { setChartVisible(true); obs.disconnect(); }
    }, { threshold: 0.3 });
    obs.observe(chartRef.current);
    return () => obs.disconnect();
  }, [loading]);

  const now = new Date();
  const MONTH_FULL  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const MONTH_SHORT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const curMonthName = MONTH_FULL[now.getMonth()].toLowerCase();

  const PERIODS = [{k:'week',l:'Semana'},{k:'month',l:'Mês'},{k:'year',l:'Ano'}];
  const periodIdx = PERIODS.findIndex(p => p.k === period);
  const sliderLeft  = 'calc(3px + ' + periodIdx + ' * (100% - 6px) / 3)';
  const sliderWidth = 'calc((100% - 6px) / 3)';

  const _normKey = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const CAT_MAP = {
    'alimentacao':    {icon:'🍽️', bg:'#92400e', label:'Alimentação'},
    'transporte':     {icon:'🚗', bg:'#1e3a5f', label:'Transporte'},
    'marketing':      {icon:'📢', bg:'#3b1f6e', label:'Marketing'},
    'trabalho':       {icon:'💼', bg:'#14532d', label:'Trabalho'},
    'freelance':      {icon:'💼', bg:'#14532d', label:'Trabalho'},
    'salario':        {icon:'💼', bg:'#14532d', label:'Trabalho'},
    'moradia':        {icon:'🏠', bg:'#78350f', label:'Moradia'},
    'aluguel':        {icon:'🏠', bg:'#78350f', label:'Moradia'},
    'saude':          {icon:'💊', bg:'#831843', label:'Saúde'},
    'lazer':          {icon:'🎮', bg:'#1e1b4b', label:'Lazer'},
    'entretenimento': {icon:'🎮', bg:'#1e1b4b', label:'Lazer'},
  };
  const _CAT_DEF = {icon:'💳', bg:'#1f2937', label:'Outros'};
  const getCat = raw => CAT_MAP[_normKey(raw)] || _CAT_DEF;
  const CATS = ['Alimentação','Transporte','Marketing','Trabalho','Moradia','Saúde','Lazer','Outros'];
  const CAT_ICONS = {'Alimentação':'🍽️','Transporte':'🚗','Marketing':'📢','Trabalho':'💼','Moradia':'🏠','Saúde':'💊','Lazer':'🎮','Outros':'💳'};

  const changePeriod = p => {
    if (p === period) return;
    setListVisible(false);
    setPageSize(20);
    setTimeout(() => { setPeriod(p); setListVisible(true); }, 150);
  };

  const periodStart = () => {
    const d = new Date();
    if (period === 'week')  { d.setDate(d.getDate() - 7); d.setHours(0,0,0,0); return d; }
    if (period === 'month') { return new Date(d.getFullYear(), d.getMonth(), 1); }
    return new Date(d.getFullYear(), 0, 1);
  };
  const filtered = txns.filter(t => new Date(t.date || t.created_at) >= periodStart());

  const income  = filtered.filter(t => t.content && t.content.transaction_type === 'receita').reduce((s,t) => s + parseFloat(t.content.amount||0), 0);
  const expense = filtered.filter(t => t.content && t.content.transaction_type === 'despesa').reduce((s,t) => s + parseFloat(t.content.amount||0), 0);
  const balance = income - expense;
  const periodLabel = period === 'week' ? 'esta semana' : period === 'year' ? 'este ano' : 'este mês';

  const chartData = Array.from({length:6}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - 5 + i, 1);
    const m = d.getMonth(), y = d.getFullYear();
    const mt = txns.filter(t => { const td = new Date(t.date||t.created_at); return td.getMonth()===m && td.getFullYear()===y; });
    return {
      label:   MONTH_SHORT[m],
      income:  mt.filter(t => t.content && t.content.transaction_type==='receita').reduce((s,t)=>s+parseFloat(t.content.amount||0),0),
      expense: mt.filter(t => t.content && t.content.transaction_type==='despesa').reduce((s,t)=>s+parseFloat(t.content.amount||0),0),
    };
  });
  const maxVal = Math.max(8, ...chartData.flatMap(m => [m.income, m.expense]));
  const BAR_MAX = 80;

  const fmtCur   = n => n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtShort = n => 'R$ '+Math.round(n).toLocaleString('pt-BR');
  const fmtDate  = iso => {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  };
  const fmtAmt = (isIncome, n) => (isIncome ? '+' : '−') + 'R$ ' + fmtCur(n);

  const todayD     = new Date(); todayD.setHours(0,0,0,0);
  const yesterdayD = new Date(todayD); yesterdayD.setDate(yesterdayD.getDate()-1);
  const weekAgoD   = new Date(todayD); weekAgoD.setDate(weekAgoD.getDate()-7);
  const getGroup   = iso => {
    if (!iso) return 'Mais antigas';
    const d = new Date(iso); d.setHours(0,0,0,0);
    if (d >= todayD)     return 'Hoje';
    if (d >= yesterdayD) return 'Ontem';
    if (d >  weekAgoD)   return 'Esta semana';
    return 'Mais antigas';
  };
  const groups = {};
  filtered.forEach(t => {
    const g = getGroup(t.date || t.created_at);
    if (!groups[g]) groups[g] = [];
    groups[g].push(t);
  });
  const GROUP_ORDER = ['Hoje','Ontem','Esta semana','Mais antigas'];

  const allItems = GROUP_ORDER.filter(g => groups[g] && groups[g].length > 0).flatMap(g => groups[g]);
  const paginated = allItems.slice(0, pageSize);

  const fireConfetti = () => {
    const cols = ['#7C6AF7','#1D9E75','#f87171'];
    const dots = cols.map((color, i) => ({
      id: Date.now()+i, color,
      cx: (Math.random()*70-35)+'px',
      cy: -(Math.random()*55+25)+'px',
      x: Math.round(window.innerWidth/2), y: 180,
    }));
    setConfetti(prev => [...prev, ...dots]);
    setTimeout(() => {
      const ids = new Set(dots.map(d => d.id));
      setConfetti(prev => prev.filter(d => !ids.has(d.id)));
    }, 900);
  };

  const closeModal = () => {
    setShowModal(false); setEditId(null);
    setModalAmount(''); setModalDesc(''); setModalCat('Outros'); setModalType('despesa');
  };

  const openEdit = t => {
    const cat = getCat((t.content && t.content.category) || '').label;
    setEditId(t.id);
    setModalType((t.content && t.content.transaction_type) || 'despesa');
    setModalAmount(String(parseFloat((t.content && t.content.amount) || 0)));
    setModalCat(cat);
    setModalDesc((t.content && t.content.description) || t.title || '');
    setShowModal(true);
  };

  const submitTx = () => {
    const amt = parseFloat(modalAmount);
    if (!modalAmount || amt <= 0) return;
    const isInc = modalType === 'receita';
    if (editId) {
      const orig = txns.find(t => t.id === editId);
      if (!orig) { closeModal(); return; }
      const updated = {
        ...orig,
        title: modalDesc.trim() || orig.title || (isInc ? 'Receita' : 'Despesa'),
        content: { amount: amt, transaction_type: modalType, category: modalCat },
      };
      setTxns(prev => prev.map(t => t.id === editId ? updated : t));
      closeModal();
      fetch('/api/transactions/' + editId, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ title: updated.title, amount: amt, transaction_type: modalType, category: modalCat }),
      }).catch(() => {});
      return;
    }
    const tempId = '_tmp_' + Date.now();
    const optimistic = {
      id: tempId,
      title: modalDesc.trim() || (isInc ? 'Receita' : 'Despesa'),
      date: new Date().toISOString(),
      created_at: new Date().toISOString(),
      content: { amount: amt, transaction_type: modalType, category: modalCat },
    };
    setTxns(prev => [optimistic, ...prev]);
    setNewIds(prev => { const s = new Set(prev); s.add(tempId); return s; });
    closeModal();
    setBalFlash(isInc ? 'pos' : 'neg');
    setTimeout(() => setBalFlash(null), 600);
    setTimeout(() => setNewIds(prev => { const s = new Set(prev); s.delete(tempId); return s; }), 700);
    fireConfetti();
    fetch('/api/transactions', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title: optimistic.title, amount: amt, transaction_type: modalType, category: modalCat }),
    })
    .then(r => r.ok ? r.json() : null)
    .then(real => {
      if (!real) return;
      setTxns(prev => prev.map(t => t.id === tempId ? {...real, id: real.id || tempId} : t));
    })
    .catch(() => { setTxns(prev => prev.filter(t => t.id !== tempId)); });
  };

  const deleteTx = id => {
    setDyingIds(prev => { const s = new Set(prev); s.add(id); return s; });
    setDeleteId(null);
    setTimeout(() => {
      setTxns(prev => prev.filter(t => t.id !== id));
      setDyingIds(prev => { const s = new Set(prev); s.delete(id); return s; });
    }, 320);
    if (!id.startsWith('_tmp_')) {
      fetch('/api/transactions/' + id, { method:'DELETE' }).catch(() => {});
    }
  };

  /* ── Skeleton ── */
  const skelCards = ce('div', {className:'fin-cards'},
    [0,1,2].map(i => ce('div', {key:i, className:'fin-card', style:{borderTop:'2px solid rgba(255,255,255,0.05)',animation:'none'}},
      ce('div', {className:'fin-skel', style:{width:'48px',height:'8px'}}),
      ce('div', {className:'fin-skel', style:{width:'68%',height:'20px',marginTop:'5px'}}),
      ce('div', {className:'fin-skel', style:{width:'46%',height:'7px',marginTop:'3px'}})
    ))
  );
  const skelList = ce('div', {className:'fin-list', style:{marginTop:'4px'}},
    [0,1,2,3].map(i => ce('div', {key:i, className:'fin-tx-item', style:{animation:'none'}},
      ce('div', {className:'fin-skel', style:{width:'34px',height:'34px',borderRadius:'9px',flexShrink:0}}),
      ce('div', {style:{flex:1}},
        ce('div', {className:'fin-skel', style:{width:'52%',height:'12px',marginBottom:'5px'}}),
        ce('div', {className:'fin-skel', style:{width:'32%',height:'9px'}})
      ),
      ce('div', {className:'fin-skel', style:{width:'58px',height:'13px'}})
    ))
  );

  /* ── Cards ── */
  const cards = ce('div', {className:'fin-cards'},
    ce('div', {className:'fin-card fin-card--income', style:{'--ci':0}},
      ce('div', {className:'fin-card-label'}, '↑  RECEITAS'),
      ce('div', {className:'fin-card-num'}, 'R$ ', ce(CountUp, {end:Math.round(income), duration:700, locale:'pt-BR'})),
      ce('div', {className:'fin-card-sub'}, periodLabel)
    ),
    ce('div', {className:'fin-card fin-card--expense', style:{'--ci':1}},
      ce('div', {className:'fin-card-label'}, '↓  DESPESAS'),
      ce('div', {className:'fin-card-num'}, 'R$ ', ce(CountUp, {end:Math.round(expense), duration:700, locale:'pt-BR'})),
      ce('div', {className:'fin-card-sub'}, periodLabel)
    ),
    ce('div', {className:'fin-card fin-card--balance' + (balFlash ? ' fin-card--flash-'+balFlash : ''), style:{'--ci':2}},
      ce('div', {className:'fin-card-label'}, balance >= 0 ? '≡  SALDO' : '↘  SALDO'),
      ce('div', {className:'fin-card-num'}, balance >= 0 ? '+R$ ' : '−R$ ', ce(CountUp, {end:Math.round(Math.abs(balance)), duration:700, locale:'pt-BR'})),
      ce('div', {className:'fin-card-sub'}, 'líquido')
    )
  );

  /* ── Chart ── */
  const chart = ce('div', {className:'fin-chart-wrap'},
    ce('div', {className:'fin-chart-title'}, 'Histórico — últimos 6 meses'),
    ce('div', {
      className: 'fin-chart' + (chartVisible ? ' fin-chart--visible' : ''),
      ref: chartRef,
    },
      chartData.map((m,i) => {
        const incH = Math.max(6, Math.round((m.income / maxVal) * BAR_MAX));
        const expH = Math.max(6, Math.round((m.expense / maxVal) * BAR_MAX));
        return ce('div', {key:i, className:'fin-month'},
          ce('div', {className:'fin-bars'},
            ce('div', {className:'fin-bar-wrap'},
              ce('div', {className:'fin-bar fin-bar--income', style:{'--fh':incH+'px','--bi':i*2}}),
              ce('span', {className:'fin-bar-tooltip'}, 'Receita: '+fmtShort(m.income))
            ),
            ce('div', {className:'fin-bar-wrap'},
              ce('div', {className:'fin-bar fin-bar--expense', style:{'--fh':expH+'px','--bi':i*2+1}}),
              ce('span', {className:'fin-bar-tooltip'}, 'Despesa: '+fmtShort(m.expense))
            )
          ),
          ce('div', {className:'fin-month-label'}, m.label)
        );
      })
    )
  );

  /* ── List ── */
  var txIdx = 0;
  const listBody = filtered.length === 0
    ? ce('div', {className:'fin-empty'},
        ce('div', {className:'fin-empty-icon'}, '💸'),
        ce('p', {className:'fin-empty-title'}, 'Nenhuma transação em ' + (period==='week'?'esta semana':period==='year'?'este ano':curMonthName)),
        ce('p', {className:'fin-empty-sub'},   'Registre receitas e despesas para ver seu saldo'),
        ce('button', {className:'fin-empty-btn', onClick:()=>setShowModal(true)}, 'Registrar primeira →')
      )
    : ce('div', {className:'fin-list'},
        ...GROUP_ORDER.filter(g => groups[g] && groups[g].length > 0).flatMap(g => {
          const items = groups[g].map(t => {
            if (!paginated.includes(t)) return null;
            const i = txIdx++;
            const isIncome = t.content && t.content.transaction_type === 'receita';
            const catInfo = getCat((t.content && t.content.category) || '');
            const amt = parseFloat((t.content && t.content.amount) || 0);
            const displayTitle = (t.content && t.content.description) || t.title || '—';
            const isNew  = newIds.has(t.id);
            const isDying = dyingIds.has(t.id);
            const isConfirming = deleteId === t.id;
            return ce('div', {
              key: t.id || i,
              className: 'fin-tx-item'+(isNew?' fin-tx-item--new':'')+(isDying?' fin-tx-item--dying':''),
              style: {'--i': i},
            },
              ce('div', {className:'fin-tx-icon', style:{background: catInfo.bg}}, catInfo.icon),
              ce('div', {className:'fin-tx-info'},
                ce('div', {className:'fin-tx-title'}, displayTitle),
                ce('div', {className:'fin-tx-meta'},
                  ce('span', {className:'fin-cat-pill'}, catInfo.label),
                  ce('span', {className:'fin-tx-date'}, fmtDate(t.date || t.created_at))
                )
              ),
              ce('div', {className:'fin-tx-amount fin-tx-amount--'+(isIncome?'income':'expense')},
                fmtAmt(isIncome, amt)
              ),
              isConfirming
                ? ce('div', {className:'fin-tx-confirm'},
                    ce('span', {className:'fin-tx-confirm-lbl'}, 'Deletar?'),
                    ce('button', {className:'fin-tx-confirm-yes', onClick:()=>deleteTx(t.id)}, 'sim'),
                    ce('button', {className:'fin-tx-confirm-no',  onClick:()=>setDeleteId(null)}, 'não')
                  )
                : ce('div', {className:'fin-tx-actions'},
                    ce('button', {className:'fin-tx-edit',   onClick: e => { e.stopPropagation(); openEdit(t); },       title:'Editar'},  ce('i', {className:'ti ti-pencil'})),
                    ce('button', {className:'fin-tx-delete', onClick: e => { e.stopPropagation(); setDeleteId(t.id); }, title:'Deletar'}, ce('i', {className:'ti ti-trash'}))
                  )
            );
          }).filter(Boolean);
          if (items.length === 0) return [];
          return [
            ce('div', {key:'hd-'+g, className:'fin-group-hd'},
              ce('span', {className:'fin-group-lbl'}, g),
              ce('div', {className:'fin-group-line'})
            ),
            ...items,
          ];
        }),
        pageSize < allItems.length
          ? ce('div', {className:'fin-ver-mais'},
              ce('button', {className:'fin-ver-mais-btn', onClick:()=>setPageSize(prev => prev + 20)}, 'Ver mais')
            )
          : null,
        ce('div', {className:'fin-total-row'},
          ce('span', null,
            ce('span', {className:'fin-total-income'}, '↑ R$ '+fmtCur(income)),
            '  ·  ',
            ce('span', {className:'fin-total-expense'}, '↓ R$ '+fmtCur(expense))
          ),
          ce('span', null, 'total do período')
        )
      );

  const list = ce('div', {className:'fin-list-wrap' + (listVisible ? '' : ' fin-list-wrap--hidden')}, listBody);

  /* ── Modal ── */
  const modal = showModal ? ce('div', {
    className:'fin-modal-overlay',
    onClick: e => { if(e.target===e.currentTarget) closeModal(); },
  },
    ce('div', {className:'fin-modal'},
      ce('div', {className:'fin-modal-hd'},
        ce('div', {className:'fin-modal-title'}, editId ? 'Editar Transação' : 'Nova Transação'),
        ce('button', {className:'fin-modal-x', onClick: closeModal}, '×')
      ),
      ce('div', {className:'fin-toggle-wrap'},
        ce('div', {className:'fin-toggle-slider fin-toggle-slider--'+modalType}),
        ce('button', {className:'fin-toggle-btn', style:{color:modalType==='receita'?'#1D9E75':'var(--text-3)'}, onClick:()=>setModalType('receita')}, '↑  Receita'),
        ce('button', {className:'fin-toggle-btn', style:{color:modalType==='despesa'?'#f87171':'var(--text-3)'}, onClick:()=>setModalType('despesa')}, '↓  Despesa')
      ),
      ce('div', {className:'fin-amount-wrap'},
        ce('div', {className:'fin-amount-row'},
          ce('span', {className:'fin-amount-prefix'}, 'R$'),
          ce('input', {
            className:'fin-amount-input', type:'text', inputMode:'decimal', placeholder:'0,00',
            value:modalAmount, autoFocus:true,
            onChange: e => setModalAmount(e.target.value.replace(',','.')),
            onKeyDown: e => { if(e.key==='Enter') submitTx(); if(e.key==='Escape') closeModal(); },
          })
        )
      ),
      ce('div', {className:'fin-modal-cats'},
        CATS.map(c => ce('button', {
          key:c,
          className:'fin-modal-cat'+(modalCat===c?' fin-modal-cat--sel':''),
          onClick:()=>setModalCat(c),
        },
          ce('span', {className:'fin-modal-cat-icon'}, CAT_ICONS[c] || '📌'),
          c
        ))
      ),
      ce('input', {
        className:'fin-modal-desc', type:'text', placeholder:'Descrição (opcional)',
        value:modalDesc,
        onChange: e => setModalDesc(e.target.value),
        onKeyDown: e => { if(e.key==='Enter') submitTx(); if(e.key==='Escape') closeModal(); },
      }),
      ce('div', {className:'fin-modal-actions'},
        ce('button', {className:'fin-modal-cancel', onClick: closeModal}, 'Cancelar'),
        ce('button', {
          className:'fin-modal-confirm fin-modal-confirm--'+modalType,
          onClick: submitTx,
          disabled: !modalAmount || parseFloat(modalAmount) <= 0,
        }, editId ? 'Salvar' : (modalType==='receita' ? 'Registrar receita' : 'Registrar despesa'))
      )
    )
  ) : null;

  return ce('div', {className:'fin-view'},
    modal,
    ...confetti.map(d => ce('div', {
      key:d.id, className:'fin-confetti-dot',
      style:{background:d.color, left:d.x+'px', top:d.y+'px', '--cx':d.cx, '--cy':d.cy},
    })),
    ce('div', {className:'fin-header'},
      ce('div', null,
        ce('h2', {className:'fin-title'}, 'Finanças'),
        ce('span', {className:'fin-sub'}, loading ? 'carregando…' : curMonthName + ' ' + now.getFullYear())
      ),
      ce('div', {className:'fin-period-pills'},
        ce('div', {className:'fin-period-slider', style:{left:sliderLeft, width:sliderWidth}}),
        PERIODS.map(p => ce('button', {
          key:p.k,
          className:'fin-period-btn '+(period===p.k?'fin-period-btn--active':'fin-period-btn--inactive'),
          onClick:()=>changePeriod(p.k),
        }, p.l))
      )
    ),
    loading ? skelCards : cards,
    loading ? null      : chart,
    loading ? skelList  : list,
    ce('button', {className:'fin-fab', onClick:()=>setShowModal(true)},
      ce('span', {className:'fin-fab-plus'}, '+')
    )
  );
}

function AgendaView() {
  const ce = React.createElement;

  const HOUR_START = 6, HOUR_END = 23, ROW_H = 68;
  const COLORS = ['#534AB7','#3b82f6','#10b981','#f87171','#f59e0b','#e879f9'];
  const COLOR_LABELS = ['Roxo','Azul','Verde','Vermelho','Amber','Rosa'];
  const DAY_SHORT  = ['D','S','T','Q','Q','S','S'];
  const DAY_LONG   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const MONTH_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const MONTH_SHORT= ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  /* utils */
  const fmtDate = d => {
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  };
  const sameDay  = (a,b) => fmtDate(a) === fmtDate(b);
  const addDays  = (d,n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
  const addMonths= (d,n) => { const r = new Date(d); r.setMonth(r.getMonth()+n); r.setDate(1); return r; };
  const getMonday= d => { const r=new Date(d); const day=r.getDay(); r.setDate(r.getDate()+(day===0?-6:1-day)); r.setHours(0,0,0,0); return r; };
  const parseTime= t => { if(!t) return null; const [h,m]=(t+'').split(':').map(Number); if(isNaN(h)) return null; return {h,m:m||0,total:h+(m||0)/60}; };
  const padTime  = (h,m=0) => `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const hexAlpha = (hex,a) => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };
  const capFirst = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
  const evColor  = ev => (ev.content && ev.content.color) || ev.color || '#534AB7';
  const evDate   = ev => ((ev.content && ev.content.date) || ev.date || ev.created_at || '').slice(0,10);
  const evStart  = ev => (ev.content && ev.content.start_time) || ev.start_time || '';
  const evEnd    = ev => (ev.content && ev.content.end_time)   || ev.end_time   || '';

  /* state */
  const now0 = new Date();
  const todayStr = fmtDate(now0);
  const [view, setView]         = React.useState('semana');
  const [curDate, setCurDate]   = React.useState(new Date(now0.getFullYear(),now0.getMonth(),now0.getDate()));
  const [weekStart, setWeekStart]= React.useState(getMonday(now0));
  const [curMonth, setCurMonth] = React.useState(new Date(now0.getFullYear(),now0.getMonth(),1));
  const [selDay,  setSelDay]    = React.useState(null);
  const [events,  setEvents]    = React.useState([]);
  const [loading, setLoading]   = React.useState(true);
  const [slideDir,setSlideDir]  = React.useState('');
  const [viewFade,setViewFade]  = React.useState(false);
  const [showModal,setShowModal]= React.useState(false);
  const [editId,  setEditId]    = React.useState(null);
  const [mTitle,  setMTitle]    = React.useState('');
  const [mDate,   setMDate]     = React.useState(todayStr);
  const [mStart,  setMStart]    = React.useState('09:00');
  const [mEnd,    setMEnd]      = React.useState('10:00');
  const [mColor,  setMColor]    = React.useState(COLORS[0]);
  const [mDesc,   setMDesc]     = React.useState('');
  const [saving,  setSaving]    = React.useState(false);
  const [newIds,  setNewIds]    = React.useState(new Set());
  const [dying,   setDying]     = React.useState(new Set());
  const [nowStr,  setNowStr]    = React.useState(padTime(now0.getHours(),now0.getMinutes()));
  const gridRef = React.useRef(null);

  /* load events */
  React.useEffect(() => {
    fetch('/api/events').then(r=>r.json()).then(d=>{ setEvents(d.events||[]); setLoading(false); }).catch(()=>setLoading(false));
  }, []);

  /* clock tick */
  React.useEffect(() => {
    const id = setInterval(()=>{ const n=new Date(); setNowStr(padTime(n.getHours(),n.getMinutes())); },60000);
    return ()=>clearInterval(id);
  }, []);

  /* scroll to now */
  React.useEffect(() => {
    if ((view==='semana'||view==='dia') && gridRef.current) {
      const p=parseTime(nowStr);
      if(p) gridRef.current.scrollTop = Math.max(0,(p.total-HOUR_START)*ROW_H-140);
    }
  }, [view, loading]);

  /* derived now position */
  const nowTop = React.useMemo(()=>{
    const p=parseTime(nowStr);
    if(!p||p.total<HOUR_START||p.total>HOUR_END) return null;
    return (p.total-HOUR_START)*ROW_H;
  },[nowStr]);

  const evTop= t=>{ const p=parseTime(t); if(!p) return 0; return Math.max(0,(p.total-HOUR_START)*ROW_H); };
  const evH  = (s,e)=>{ const sp=parseTime(s),ep=parseTime(e); if(!sp||!ep) return ROW_H; return Math.max(28,(ep.total-sp.total)*ROW_H); };

  /* navigation */
  const slideNav=(dir,fn)=>{ setSlideDir(dir); fn(); setTimeout(()=>setSlideDir(''),300); };
  const goBack=()=>{ if(view==='dia') slideNav('r',()=>setCurDate(d=>addDays(d,-1))); else if(view==='semana') slideNav('r',()=>setWeekStart(d=>addDays(d,-7))); else slideNav('r',()=>{ setCurMonth(d=>addMonths(d,-1)); setSelDay(null); }); };
  const goNext=()=>{ if(view==='dia') slideNav('l',()=>setCurDate(d=>addDays(d,1))); else if(view==='semana') slideNav('l',()=>setWeekStart(d=>addDays(d,7))); else slideNav('l',()=>{ setCurMonth(d=>addMonths(d,1)); setSelDay(null); }); };
  const goToday=()=>{ const t=new Date(); setCurDate(new Date(t.getFullYear(),t.getMonth(),t.getDate())); setWeekStart(getMonday(t)); setCurMonth(new Date(t.getFullYear(),t.getMonth(),1)); setSelDay(null); };
  const switchView=v=>{ if(v===view) return; setViewFade(true); setTimeout(()=>{ setView(v); setViewFade(false); },150); };

  /* header title */
  const headerTitle=()=>{
    if(view==='mes') return `${MONTH_FULL[curMonth.getMonth()]} ${curMonth.getFullYear()}`;
    if(view==='semana'){
      const end=addDays(weekStart,6);
      const sm=MONTH_SHORT[weekStart.getMonth()],em=MONTH_SHORT[end.getMonth()];
      if(sm===em) return `${weekStart.getDate()} – ${end.getDate()} ${capFirst(sm)} ${weekStart.getFullYear()}`;
      return `${weekStart.getDate()} ${capFirst(sm)} – ${end.getDate()} ${capFirst(em)} ${weekStart.getFullYear()}`;
    }
    const d=curDate; return `${DAY_LONG[d.getDay()]}, ${d.getDate()} ${capFirst(MONTH_SHORT[d.getMonth()])} ${d.getFullYear()}`;
  };

  /* modal helpers */
  const openCreate=(date,startH)=>{ setEditId(null); setMTitle(''); setMDate(date||todayStr); setMStart(startH!=null?padTime(startH):'09:00'); setMEnd(startH!=null?padTime(startH+1):'10:00'); setMColor(COLORS[0]); setMDesc(''); setShowModal(true); };
  const openEdit  =ev=>{ setEditId(ev.id); setMTitle(ev.title||''); setMDate(evDate(ev)); setMStart(evStart(ev)); setMEnd(evEnd(ev)); setMColor(evColor(ev)); setMDesc((ev.content&&ev.content.description)||''); setShowModal(true); };
  const closeModal=()=>{ setShowModal(false); setEditId(null); };

  const submitEvent=async()=>{
    if(!mTitle.trim()) return;
    setSaving(true);
    const body={title:mTitle.trim(),date:mDate,start_time:mStart,end_time:mEnd,color:mColor,description:mDesc};
    try{
      if(editId){
        setEvents(evs=>evs.map(e=>e.id===editId?{...e,title:body.title,content:{...(e.content||{}),...body}}:e));
        await fetch(`/api/events/${editId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const r=await fetch('/api/events').then(x=>x.json()); setEvents(r.events||[]);
      } else {
        const tid=`_tmp_${Date.now()}`;
        setEvents(evs=>[{id:tid,title:body.title,content:body},...evs]);
        setNewIds(s=>new Set([...s,tid]));
        const r=await fetch('/api/events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const data=await r.json();
        setEvents(evs=>evs.map(e=>e.id===tid?(data.event||e):e));
        setNewIds(s=>{ const n=new Set(s); n.delete(tid); return n; });
      }
    }catch(e){}
    setSaving(false); closeModal();
  };

  const deleteEvent=async id=>{
    setDying(s=>new Set([...s,id]));
    setTimeout(()=>{ setEvents(evs=>evs.filter(e=>e.id!==id)); setDying(s=>{ const n=new Set(s); n.delete(id); return n; }); },350);
    await fetch(`/api/events/${id}`,{method:'DELETE'});
  };

  /* ── Month view ─────────────────────────────────────────────── */
  const renderMonth=()=>{
    const year=curMonth.getFullYear(), month=curMonth.getMonth();
    const firstDay=new Date(year,month,1), lastDay=new Date(year,month+1,0);
    const startOffset=firstDay.getDay();
    const totalCells=Math.ceil((startOffset+lastDay.getDate())/7)*7;
    const cells=Array.from({length:totalCells},(_,i)=>new Date(year,month,1-startOffset+i));
    const dayEvs=d=>events.filter(e=>evDate(e)===fmtDate(d));
    const isToday=d=>fmtDate(d)===todayStr;
    const isCurMonth=d=>d.getMonth()===month;
    const isSelDay=d=>selDay&&fmtDate(d)===fmtDate(selDay);
    const selEvs=selDay?events.filter(e=>evDate(e)===fmtDate(selDay)).sort((a,b)=>evStart(a).localeCompare(evStart(b))):[];

    return ce('div',{className:'ag-month-wrap'},
      ce('div',{className:'ag-month-headers'}, ...DAY_SHORT.map((d,i)=>ce('div',{key:i,className:'ag-month-hd'},d))),
      ce('div',{className:`ag-month-grid${slideDir==='l'?' ag-slide-l':slideDir==='r'?' ag-slide-r':''}`},
        ...cells.map((d,i)=>{
          const evs=dayEvs(d), dots=evs.slice(0,3), extra=evs.length-3;
          return ce('div',{key:i,
            className:`ag-month-cell${!isCurMonth(d)?' ag-month-cell--other':''}${isToday(d)?' ag-month-cell--today':''}${isSelDay(d)?' ag-month-cell--sel':''}`,
            onClick:()=>setSelDay(isSelDay(d)?null:new Date(d)),
          },
            ce('span',{className:'ag-month-num'},d.getDate()),
            evs.length>0&&ce('div',{className:'ag-month-dots'},
              ...dots.map((ev,j)=>ce('span',{key:j,className:'ag-month-dot',style:{background:evColor(ev)}})),
              extra>0&&ce('span',{className:'ag-month-more'},`+${extra}`)
            )
          );
        })
      ),
      selDay&&selEvs.length===0&&ce('div',{className:'ag-day-expand ag-day-expand--empty'},
        ce('span',{className:'ag-day-expand-title'},`${DAY_LONG[selDay.getDay()]}, ${selDay.getDate()} ${capFirst(MONTH_SHORT[selDay.getMonth()])}`),
        ce('p',{className:'ag-day-expand-empty'},'Nenhum evento'),
        ce('button',{className:'ag-day-expand-add',style:{marginTop:'8px'},onClick:()=>openCreate(fmtDate(selDay),null)},'+ novo evento')
      ),
      selDay&&selEvs.length>0&&ce('div',{className:'ag-day-expand'},
        ce('div',{className:'ag-day-expand-hd'},
          ce('span',{className:'ag-day-expand-title'},`${DAY_LONG[selDay.getDay()]}, ${selDay.getDate()} ${capFirst(MONTH_SHORT[selDay.getMonth()])}`),
          ce('button',{className:'ag-day-expand-add',onClick:()=>openCreate(fmtDate(selDay),null)},'+ novo')
        ),
        ...selEvs.map((ev,i)=>ce('div',{key:ev.id,
          className:`ag-day-ev-card${dying.has(ev.id)?' ag-event--dying':''}${newIds.has(ev.id)?' ag-event--new':''}`,
          style:{'--ev-color':evColor(ev),'--ev-bg':hexAlpha(evColor(ev),0.12),'--ev-border':hexAlpha(evColor(ev),0.25),'--i':i},
          onClick:()=>openEdit(ev),
        },
          ce('div',{className:'ag-day-ev-bar',style:{background:evColor(ev)}}),
          ce('div',{className:'ag-day-ev-body'},
            ce('div',{className:'ag-event-title'},ev.title),
            (evStart(ev)||evEnd(ev))&&ce('div',{className:'ag-event-time'},`${evStart(ev)}${evEnd(ev)?` – ${evEnd(ev)}`:''}`)
          ),
          ce('button',{className:'ag-event-del',onClick:e=>{e.stopPropagation();deleteEvent(ev.id);}},'×')
        ))
      )
    );
  };

  /* ── Week view ──────────────────────────────────────────────── */
  const renderWeek=()=>{
    const days=Array.from({length:7},(_,i)=>addDays(weekStart,i));
    const NHOURS=HOUR_END-HOUR_START+1, totalH=NHOURS*ROW_H;
    return ce('div',{className:'ag-week-outer'},
      ce('div',{className:'ag-week-hd-row'},
        ...days.map((d,i)=>ce('div',{key:i,
          className:`ag-week-hd-cell${sameDay(d,new Date())?' ag-week-hd-cell--today':''}`,
          onClick:()=>{ setCurDate(d); switchView('dia'); },
        },
          ce('span',{className:'ag-week-hd-name'},DAY_SHORT[d.getDay()]),
          ce('span',{className:'ag-week-hd-num'},d.getDate())
        ))
      ),
      ce('div',{
        className:`ag-grid-wrap${slideDir==='l'?' ag-slide-l':slideDir==='r'?' ag-slide-r':''}`,
        ref:gridRef,
      },
        ce('div',{className:'ag-week-grid',style:{height:totalH+'px',position:'relative'}},
          ...Array.from({length:NHOURS},(_,hi)=>{
            const h=HOUR_START+hi;
            return ce('div',{key:h,className:'ag-hour-row',style:{top:hi*ROW_H+'px',height:ROW_H+'px'}},
              ce('div',{className:'ag-hour-label'},`${h}h`),
              ...days.map((d,di)=>ce('div',{key:di,className:'ag-week-slot',onClick:()=>openCreate(fmtDate(d),h)},
                ce('div',{className:'ag-week-slot-line'})
              ))
            );
          }),
          nowTop!==null&&sameDay(new Date(),new Date())&&ce('div',{className:'ag-now-line',style:{top:nowTop+'px',left:'48px'}},
            ce('div',{className:'ag-now-dot'}), ce('div',{className:'ag-now-track'})
          ),
          ...events.filter(ev=>days.some(d=>fmtDate(d)===evDate(ev))).map((ev,idx)=>{
            const colIdx=days.findIndex(d=>fmtDate(d)===evDate(ev));
            if(colIdx<0) return null;
            const col=evColor(ev);
            return ce('div',{key:ev.id,
              className:`ag-event${newIds.has(ev.id)?' ag-event--new':''}${dying.has(ev.id)?' ag-event--dying':''}`,
              style:{
                top:evTop(evStart(ev))+'px', height:evH(evStart(ev),evEnd(ev))+'px',
                left:`calc(48px + ${colIdx}*(100% - 48px)/7 + 3px)`,
                width:`calc((100% - 48px)/7 - 6px)`,
                '--ev-color':col,'--ev-bg':hexAlpha(col,0.15),'--ev-border':hexAlpha(col,0.3),'--ev-shadow':hexAlpha(col,0.25),
                animationDelay:`${idx*25}ms`
              },
              onClick:()=>openEdit(ev),
            },
              ce('div',{className:'ag-event-bar'}),
              ce('div',{className:'ag-event-body'},
                ce('div',{className:'ag-event-title'},ev.title),
                evStart(ev)&&ce('div',{className:'ag-event-time'},`${evStart(ev)}${evEnd(ev)?`–${evEnd(ev)}`:''}`)
              )
            );
          })
        )
      )
    );
  };

  /* ── Day view ───────────────────────────────────────────────── */
  const renderDay=()=>{
    const NHOURS=HOUR_END-HOUR_START+1, totalH=NHOURS*ROW_H;
    const dayStr=fmtDate(curDate), isToday=dayStr===todayStr;
    const dayEvs=events.filter(ev=>evDate(ev)===dayStr).sort((a,b)=>evStart(a).localeCompare(evStart(b)));
    return ce('div',{
      className:`ag-grid-wrap${slideDir==='l'?' ag-slide-l':slideDir==='r'?' ag-slide-r':''}`,
      ref:gridRef,
    },
      ce('div',{className:'ag-day-grid',style:{height:totalH+'px',position:'relative'}},
        ...Array.from({length:NHOURS},(_,hi)=>{
          const h=HOUR_START+hi;
          return ce('div',{key:h,className:'ag-hour-row',style:{top:hi*ROW_H+'px',height:ROW_H+'px'},onClick:()=>openCreate(dayStr,h)},
            ce('div',{className:'ag-hour-label'},`${h}h`),
            ce('div',{className:'ag-hour-line'},ce('div',{className:'ag-hour-line-inner'}))
          );
        }),
        isToday&&nowTop!==null&&ce('div',{className:'ag-now-line',style:{top:nowTop+'px'}},
          ce('div',{className:'ag-now-dot'}), ce('div',{className:'ag-now-track'})
        ),
        ...dayEvs.map((ev,idx)=>{
          const col=evColor(ev);
          return ce('div',{key:ev.id,
            className:`ag-event ag-event--day${newIds.has(ev.id)?' ag-event--new':''}${dying.has(ev.id)?' ag-event--dying':''}`,
            style:{
              top:evTop(evStart(ev))+'px', height:evH(evStart(ev),evEnd(ev))+'px',
              left:'56px', right:'16px',
              '--ev-color':col,'--ev-bg':hexAlpha(col,0.15),'--ev-border':hexAlpha(col,0.3),'--ev-shadow':hexAlpha(col,0.25),
              animationDelay:`${idx*35}ms`
            },
            onClick:()=>openEdit(ev),
          },
            ce('div',{className:'ag-event-bar'}),
            ce('div',{className:'ag-event-body'},
              ce('div',{className:'ag-event-title'},ev.title),
              (evStart(ev)||evEnd(ev))&&ce('div',{className:'ag-event-time'},`${evStart(ev)}${evEnd(ev)?` – ${evEnd(ev)}`:''}`)
            ),
            ce('button',{className:'ag-event-del',onClick:e=>{e.stopPropagation();deleteEvent(ev.id);}},'×')
          );
        })
      )
    );
  };

  /* ── Modal ─────────────────────────────────────────────────── */
  const renderModal=()=>showModal&&ce('div',{className:'ag-modal-overlay',onClick:e=>{if(e.target===e.currentTarget)closeModal();}},
    ce('div',{className:'ag-modal'},
      ce('div',{className:'ag-modal-hd'},
        ce('span',{className:'ag-modal-title'},editId?'Editar Evento':'Novo Evento'),
        ce('button',{className:'ag-modal-x',onClick:closeModal},'×')
      ),
      ce('input',{className:'ag-modal-input',placeholder:'Título do evento',value:mTitle,onChange:e=>setMTitle(e.target.value),autoFocus:true,style:{fontSize:'15px',fontWeight:500}}),
      ce('div',{className:'ag-modal-row'},
        ce('input',{className:'ag-modal-input',type:'date',value:mDate,onChange:e=>setMDate(e.target.value),style:{flex:1}})
      ),
      ce('div',{className:'ag-modal-row'},
        ce('input',{className:'ag-modal-input',type:'time',value:mStart,onChange:e=>setMStart(e.target.value),style:{flex:1}}),
        ce('span',{style:{color:'var(--text-3)',fontSize:'11px',flexShrink:0,padding:'0 2px'}},'→'),
        ce('input',{className:'ag-modal-input',type:'time',value:mEnd,onChange:e=>setMEnd(e.target.value),style:{flex:1}})
      ),
      ce('div',{className:'ag-modal-colors'},
        ...COLORS.map((col,i)=>ce('button',{key:i,
          className:`ag-color-btn${mColor===col?' ag-color-btn--active':''}`,
          style:{background:col,'--ring':col},
          onClick:()=>setMColor(col),
          title:COLOR_LABELS[i],
        }))
      ),
      ce('input',{className:'ag-modal-input',placeholder:'Descrição (opcional)',value:mDesc,onChange:e=>setMDesc(e.target.value)}),
      ce('div',{className:'ag-modal-actions'},
        editId&&ce('button',{className:'ag-modal-del',onClick:()=>{deleteEvent(editId);closeModal();}},'Excluir'),
        ce('button',{className:'ag-modal-save',onClick:submitEvent,disabled:!mTitle.trim()||saving},saving?'...':editId?'Salvar':'Criar evento')
      )
    )
  );

  /* ── Skeleton ───────────────────────────────────────────────── */
  const renderSkeleton=()=>ce('div',{className:'ag-skel-wrap'},
    ...Array.from({length:4},(_,i)=>ce('div',{key:i,className:'ag-skel-event',style:{'--i':i}}))
  );

  /* ── Main render ────────────────────────────────────────────── */
  return ce('div',{className:'ag-view'},
    renderModal(),
    ce('div',{className:'ag-header'},
      ce('div',{className:'ag-header-left'},
        ce('h2',{className:'ag-title'},headerTitle())
      ),
      ce('div',{className:'ag-header-right'},
        ce('div',{className:'ag-view-pills'},
          ...(['dia','semana','mes']).map(v=>ce('button',{key:v,
            className:`ag-view-pill${view===v?' ag-view-pill--active':''}`,
            onClick:()=>switchView(v)
          },v==='dia'?'Dia':v==='semana'?'Sem':'Mês'))
        ),
        ce('div',{className:'ag-nav'},
          ce('button',{className:'ag-nav-btn',onClick:goBack},'←'),
          ce('button',{className:'ag-nav-today',onClick:goToday},'Hoje'),
          ce('button',{className:'ag-nav-btn',onClick:goNext},'→')
        )
      )
    ),
    ce('div',{className:`ag-content${viewFade?' ag-content--fade':''}`},
      loading ? renderSkeleton() :
      view==='mes'    ? renderMonth()  :
      view==='semana' ? renderWeek()   :
      renderDay()
    ),
    ce('button',{
      className:'ag-fab',
      onClick:()=>openCreate(
        view==='dia'?fmtDate(curDate):view==='semana'?fmtDate(curDate):fmtDate(selDay||new Date()),
        null
      )
    }, ce('span',{className:'ag-fab-plus'},'+'))
  );
}

function TasksView() {
  const ce = React.createElement;
  const [tasks, setTasks] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState('all');
  const [dying, setDying] = React.useState(new Set());
  const [showModal, setShowModal] = React.useState(false);
  const [newTitle, setNewTitle] = React.useState('');
  const [newPriority, setNewPriority] = React.useState(1);
  const [newDue, setNewDue] = React.useState('');
  const [newTag, setNewTag] = React.useState('');
  const [creating, setCreating] = React.useState(false);

  React.useEffect(() => {
    fetch('/api/tasks')
      .then(r => r.json())
      .then(d => {
        const all = d.tasks || [];
        const today = new Date(); today.setHours(0,0,0,0);
        const stale = all.filter(t => {
          if (t.status !== 'done') return false;
          const ts = t.updated_at || t.created_at;
          if (!ts) return false;
          const completed = new Date(ts); completed.setHours(0,0,0,0);
          return completed < today;
        });
        stale.forEach(t => fetch('/api/tasks/' + t.id, {method: 'DELETE'}));
        setTasks(all.filter(t => !stale.find(s => s.id === t.id)));
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  const toggle = (task) => {
    const next = task.status === 'done' ? 'active' : 'done';
    if (next === 'done') {
      setDying(prev => { const s = new Set(prev); s.add(task.id); return s; });
      setTimeout(() => {
        setTasks(prev => prev.map(t => t.id === task.id ? {...t, status: next} : t));
        setDying(prev => { const s = new Set(prev); s.delete(task.id); return s; });
      }, 380);
    } else {
      setTasks(prev => prev.map(t => t.id === task.id ? {...t, status: next} : t));
    }
    fetch('/api/tasks/' + task.id, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({status: next})
    });
  };

  const createTask = () => {
    if (!newTitle.trim()) return;
    setCreating(true);
    fetch('/api/tasks', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        title: newTitle.trim(), priority: newPriority,
        due_date: newDue || null,
        tags: newTag.trim() ? [newTag.trim()] : []
      })
    })
    .then(r => r.json())
    .then(created => {
      if (created.id) setTasks(prev => [created, ...prev]);
      setShowModal(false);
      setNewTitle(''); setNewPriority(1); setNewDue(''); setNewTag('');
    })
    .finally(() => setCreating(false));
  };

  const PRIO = {
    high:   {label: 'Alta',  color: '#F87171', bg: 'rgba(248,113,113,0.12)', border: '#fbbf24'},
    medium: {label: 'Média', color: '#FBBF24', bg: 'rgba(251,191,36,0.09)',  border: '#60a5fa'},
    low:    {label: 'Baixa', color: 'rgba(255,255,255,0.32)', bg: 'rgba(255,255,255,0.05)', border: 'rgba(255,255,255,0.06)'}
  };

  const getPrio = (t) => {
    const cp = t.content && t.content.priority;
    if (cp === 'alta') return 'high';
    if (cp === 'média' || cp === 'media') return 'medium';
    if (cp === 'baixa') return 'low';
    if (t.priority >= 2) return 'high';
    if (t.priority === 1) return 'medium';
    return 'low';
  };

  // Extrai "- Cliente" do título; retorna {clean, client}
  const KNOWN_CLIENTS = ['Gracie Barra', 'SoHo', 'DDpartssolution'];
  const extractClient = (title) => {
