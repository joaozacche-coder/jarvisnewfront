<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jarvis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css">
<style>
:root {
  --primary: #534AB7;
  --primary-light: #EEEDFE;
  --primary-mid: #AFA9EC;
  --bg: #FFFFFF;
  --bg-2: #F7F7F8;
  --bg-3: #EFEFF1;
  --text: #111118;
  --text-2: #6B7280;
  --text-3: #9CA3AF;
  --border: rgba(0,0,0,0.07);
  --border-md: rgba(0,0,0,0.11);
  --red: #EF4444;
  --green: #1D9E75;
  --sb-w: 56px;
  --top-h: 52px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
textarea, input { font-family: inherit; }

/* ─── LAYOUT ──────────────────────────── */
.app { display: flex; height: 100vh; }

/* ─── SIDEBAR ─────────────────────────── */
.sidebar {
  width: var(--sb-w);
  height: 100vh;
  background: var(--bg-2);
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 0 14px;
  flex-shrink: 0;
  z-index: 20;
}
.sb-logo {
  width: 30px; height: 30px;
  background: var(--primary);
  border-radius: 8px;
  display: grid; place-items: center;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin-bottom: 18px;
  flex-shrink: 0;
  user-select: none;
}
.sb-nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  width: 100%;
  align-items: center;
  padding: 0 10px;
}
.sb-item {
  position: relative;
  width: 36px; height: 36px;
  border-radius: 9px;
  display: grid; place-items: center;
  color: var(--text-3);
  font-size: 18px;
  transition: background 130ms, color 130ms;
  flex-shrink: 0;
}
.sb-item:hover { background: var(--bg-3); color: var(--text-2); }
.sb-item.is-active { background: var(--primary-light); color: var(--primary); }
.sb-badge {
  position: absolute;
  top: 5px; right: 5px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  border: 1.5px solid var(--bg-2);
  pointer-events: none;
}
.sb-tooltip {
  position: absolute;
  left: calc(100% + 10px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--text);
  color: #fff;
  font-size: 11.5px;
  font-weight: 500;
  padding: 4px 8px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 120ms;
  z-index: 100;
}
.sb-item:hover .sb-tooltip { opacity: 1; }
.sb-foot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 0 10px;
  flex-shrink: 0;
}

/* ─── MAIN ────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  height: 100vh;
  overflow: hidden;
}

/* ─── TOPBAR ──────────────────────────── */
.topbar {
  height: var(--top-h);
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 10px;
  flex-shrink: 0;
  background: var(--bg);
  z-index: 5;
}
.top-orb {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 2px rgba(29,158,117,0.18);
  animation: orbPulse 2.6s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes orbPulse {
  0%,100% { box-shadow: 0 0 0 2px rgba(29,158,117,0.18); }
  50% { box-shadow: 0 0 0 5px rgba(29,158,117,0.08); }
}
.top-name { font-size: 14px; font-weight: 500; color: var(--text); }
.top-sep { width: 1px; height: 13px; background: var(--border-md); flex-shrink: 0; }
.top-status { font-size: 12px; color: var(--text-3); }
.top-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.btn-briefing {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  border-radius: 99px;
  border: 0.5px solid var(--border-md);
  background: var(--bg);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text-2);
  transition: background 130ms, border-color 130ms, color 130ms;
}
.btn-briefing:hover { background: var(--bg-2); color: var(--text); }

/* ─── CONTEXT PILL ────────────────────── */
.ctx-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 20px;
  height: 30px;
  border-bottom: 0.5px solid var(--border);
  background: #FAFAFE;
  font-size: 12px;
  color: var(--text-2);
  flex-shrink: 0;
  animation: fadeDown 200ms both;
}
@keyframes fadeDown {
  from { opacity: 0; height: 0; } to { opacity: 1; height: 30px; }
}
.ctx-bar-label { color: var(--text-3); }
.ctx-bar span { font-weight: 500; color: var(--primary); }
.ctx-clear {
  margin-left: auto;
  width: 18px; height: 18px;
  border-radius: 4px;
  display: grid; place-items: center;
  font-size: 12px;
  color: var(--text-3);
  transition: background 130ms;
}
.ctx-clear:hover { background: var(--bg-3); color: var(--text-2); }

/* ─── CHAT FEED ───────────────────────── */
.chat-feed {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,0,0,0.09) transparent;
}
.chat-feed::-webkit-scrollbar { width: 4px; }
.chat-feed::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.09); border-radius: 2px; }
.chat-inner {
  max-width: 724px;
  margin: 0 auto;
  padding: 28px 28px 12px;
  display: flex;
  flex-direction: column;
}

/* ─── LOAD MORE ───────────────────────── */
.load-more {
  display: flex;
  justify-content: center;
  padding-bottom: 8px;
}
.load-more-btn {
  font-size: 12px;
  color: var(--text-3);
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  transition: background 130ms, color 130ms;
}
.load-more-btn:hover { background: var(--bg-2); color: var(--text-2); }

/* ─── DATE SEPARATOR ──────────────────── */
.date-sep {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 12px 0 16px;
  color: var(--text-3);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.date-sep::before, .date-sep::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--border);
}

/* ─── MESSAGE ROW ─────────────────────── */
.msg-row {
  display: flex;
  gap: 10px;
  padding: 4px 0;
  animation: fadeUp 210ms cubic-bezier(.2,.7,.2,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: none; }
}
.msg-row.user { flex-direction: row-reverse; }
.msg-row + .msg-row { margin-top: 2px; }
.msg-row.jarvis + .msg-row.user,
.msg-row.user + .msg-row.jarvis { margin-top: 12px; }

.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 500;
  flex-shrink: 0;
  margin-top: 1px;
  user-select: none;
}
.msg-avatar.jarvis { background: var(--primary-light); color: var(--primary); }
.msg-avatar.user   { background: var(--bg-3); color: var(--text-2); }

.msg-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.msg-row.user .msg-content { align-items: flex-end; }

/* user bubble */
.msg-bubble {
  background: var(--bg-2);
  border: 0.5px solid var(--border);
  border-radius: 14px 14px 4px 14px;
  padding: 8px 13px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  max-width: 76%;
  word-break: break-word;
}

/* jarvis text */
.msg-text-wrap { position: relative; }
.msg-text {
  font-size: 14.5px;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-actions {
  position: absolute;
  top: -4px; right: 0;
  display: none;
  gap: 4px;
}
.msg-row.jarvis:hover .msg-actions { display: flex; }
.copy-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--bg-2);
  border: 0.5px solid var(--border);
  display: grid; place-items: center;
  font-size: 13px;
  color: var(--text-3);
  transition: background 130ms, color 130ms;
}
.copy-btn:hover { background: var(--bg-3); color: var(--text); }
.copy-btn.copied { color: var(--green); }

/* ─── TYPING INDICATOR ────────────────── */
.typing-row {
  display: flex;
  gap: 10px;
  padding: 4px 0;
  margin-top: 12px;
  animation: fadeUp 210ms both;
}
.typing-dots {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 0 2px;
  height: 28px;
}
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-3);
  animation: typeDot 1.4s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typeDot {
  0%,60%,100% { transform: scale(0.65); opacity: 0.35; }
  30% { transform: scale(1); opacity: 1; }
}

/* ─── CONTEXT CARDS ───────────────────── */
.cards-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.ctx-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 11px;
  border-radius: 10px;
  border: 0.5px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: transform 140ms, border-color 140ms, background 140ms;
  text-align: left;
  width: 100%;
}
.ctx-card:hover { transform: translateX(2px); border-color: var(--border-md); background: var(--bg-2); }
.ctx-card:active { transform: scale(0.97); }
.ctx-card.urgent { border-left: 2px solid rgba(239,68,68,0.35); }
.ctx-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 15px;
  flex-shrink: 0;
}
.ctx-body { flex: 1; min-width: 0; }
.ctx-title { font-size: 13px; font-weight: 500; line-height: 1.3; color: var(--text); }
.ctx-sub { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }
.ctx-pill {
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
  flex-shrink: 0;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}
.stat-card {
  padding: 11px 12px;
  border-radius: 10px;
  border: 0.5px solid var(--border);
  background: var(--bg);
}
.stat-label { font-size: 11px; color: var(--text-3); font-weight: 500; }
.stat-value { font-size: 18px; font-weight: 500; color: var(--text); margin-top: 3px; }

/* ─── QUICK ACTIONS ───────────────────── */
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.qa-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 12px;
  border-radius: 99px;
  border: 0.5px solid var(--border-md);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text-2);
  transition: background 130ms, color 130ms, border-color 130ms;
}
.qa-chip:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary-mid); }

/* ─── EMPTY STATE ─────────────────────── */
.empty-wrap {
  padding: 32px 0 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.empty-greeting {
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}
.empty-sub {
  font-size: 14px;
  color: var(--text-3);
  margin-top: -14px;
}

/* ─── ERROR MESSAGE ───────────────────── */
.msg-error {
  font-size: 13.5px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.msg-error i { color: var(--red); font-size: 14px; }
.retry-btn {
  font-size: 13px;
  font-weight: 500;
  color: var(--primary);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
}
.retry-btn:hover { color: #3f35a0; }

/* ─── INPUT BAR ───────────────────────── */
.input-wrap {
  padding: 10px 16px 14px;
  background: var(--bg);
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
}
.input-bar {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  padding: 9px 10px;
  border-radius: 12px;
  border: 1px solid var(--border-md);
  background: var(--bg);
  max-width: 724px;
  margin: 0 auto;
  transition: border-color 180ms, box-shadow 180ms;
}
.input-bar:focus-within {
  border-color: var(--primary-mid);
  box-shadow: 0 0 0 3px rgba(83,74,183,0.08);
}
.input-icon-btn {
  width: 30px; height: 30px;
  border-radius: 7px;
  display: grid; place-items: center;
  font-size: 17px;
  color: var(--text-3);
  flex-shrink: 0;
  transition: background 130ms, color 130ms;
}
.input-icon-btn:hover { background: var(--bg-2); color: var(--text-2); }
.input-icon-btn.mic-on { color: var(--primary); background: var(--primary-light); }
.input-textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  resize: none;
  font-size: 14px;
  line-height: 1.57;
  color: var(--text);
  min-height: 22px;
  max-height: 96px;
  overflow-y: auto;
  padding: 0;
  scrollbar-width: none;
}
.input-textarea::-webkit-scrollbar { display: none; }
.input-textarea::placeholder { color: var(--text-3); }
.btn-send {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  display: grid; place-items: center;
  font-size: 16px;
  flex-shrink: 0;
  transition: background 130ms, opacity 130ms;
}
.btn-send:hover { background: #3f35a0; }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; background: var(--primary); }
.input-hint {
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  margin-top: 5px;
  max-width: 724px;
  margin-left: auto;
  margin-right: auto;
}

/* ─── TOAST ───────────────────────────── */
.toast-wrap {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}
.toast {
  background: var(--text);
  color: #fff;
  font-size: 13px;
  padding: 7px 16px;
  border-radius: 99px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.14);
  animation: toastIn 250ms cubic-bezier(.2,.7,.2,1) both;
  pointer-events: auto;
  white-space: nowrap;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.95); }
  to   { opacity: 1; transform: none; }
}

/* ─── MOBILE ──────────────────────────── */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    bottom: 0; left: 0; right: 0; top: auto;
    width: 100%;
    height: 58px;
    flex-direction: row;
    justify-content: space-around;
    border-right: none;
    border-top: 0.5px solid var(--border);
    padding: 0;
    z-index: 50;
  }
  .sb-logo { display: none; }
  .sb-nav { flex-direction: row; flex: none; gap: 0; padding: 0; }
  .sb-foot { flex-direction: row; padding: 0; margin-top: 0; }
  .sb-item .sb-tooltip { display: none; }
  .main { padding-bottom: 58px; }
  .stats-grid { grid-template-columns: 1fr; }
  .msg-bubble { max-width: 88%; }
  .input-wrap { padding: 8px 10px 10px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const { useState, useEffect, useRef, useCallback } = React;
const e = React.createElement;

// ─── UTILS ─────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2, 9); }

function greeting() {
  const h = new Date().getHours();
  if (h < 5)  return 'Boa noite';
  if (h < 12) return 'Bom dia';
  if (h < 18) return 'Boa tarde';
  return 'Boa noite';
}

function todayLabel() {
  const d = new Date();
  const days  = ['dom','seg','ter','qua','qui','sex','sáb'];
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `hoje · ${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

// ─── NAV ────────────────────────────────────────────────────────────────
const NAV = [
  { id: 'chat',     icon: 'ti-message',   label: 'Chat' },
  { id: 'tasks',    icon: 'ti-checklist', label: 'Tarefas', badge: true },
  { id: 'clients',  icon: 'ti-users',     label: 'Clientes' },
  { id: 'finance',  icon: 'ti-chart-bar', label: 'Finanças' },
  { id: 'calendar', icon: 'ti-calendar',  label: 'Agenda' },
  { id: 'brain',    icon: 'ti-brain',     label: 'Segundo Cérebro' },
];

// ─── SIDEBAR ────────────────────────────────────────────────────────────
function Sidebar({ active, onSelect }) {
  return e('aside', { className: 'sidebar' },
    e('div', { className: 'sb-logo' }, 'J'),
    e('nav', { className: 'sb-nav' },
      NAV.map(n =>
        e('button', {
          key: n.id,
          className: `sb-item ${active === n.id ? 'is-active' : ''}`,
          onClick: () => onSelect(n.id),
          title: n.label
        },
          e('i', { className: `ti ${n.icon}` }),
          n.badge && e('span', { className: 'sb-badge' }),
          e('span', { className: 'sb-tooltip' }, n.label)
        )
      )
    ),
    e('div', { className: 'sb-foot' },
      e('button', {
        className: `sb-item ${active === 'settings' ? 'is-active' : ''}`,
        onClick: () => onSelect('settings'),
        title: 'Configurações'
      },
        e('i', { className: 'ti ti-settings' }),
        e('span', { className: 'sb-tooltip' }, 'Configurações')
      )
    )
  );
}

// ─── TOPBAR ──────────────────────────────────────────────────────────────
function Topbar({ onBriefing }) {
  return e('header', { className: 'topbar' },
    e('div', { className: 'top-orb' }),
    e('span', { className: 'top-name' }, 'Jarvis'),
    e('div', { className: 'top-sep' }),
    e('span', { className: 'top-status' }, 'online agora'),
    e('div', { className: 'top-right' },
      e('button', { className: 'btn-briefing', onClick: onBriefing },
        'Briefing ',
        e('i', { className: 'ti ti-external-link', style: { fontSize: '11px' } })
      )
    )
  );
}

// ─── CONTEXT BAR ─────────────────────────────────────────────────────────
function ContextBar({ context, onClear }) {
  if (!context) return null;
  return e('div', { className: 'ctx-bar' },
    e('span', { className: 'ctx-bar-label' }, 'contexto: '),
    e('span', null, context),
    e('button', { className: 'ctx-clear', onClick: onClear, title: 'Limpar contexto' },
      e('i', { className: 'ti ti-x' })
    )
  );
}

// ─── DATE SEPARATOR ───────────────────────────────────────────────────────
function DateSep({ label }) {
  return e('div', { className: 'date-sep' }, label);
}

// ─── COPY BUTTON ──────────────────────────────────────────────────────────
function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const doCopy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => {});
  };
  return e('button', {
    className: `copy-btn ${copied ? 'copied' : ''}`,
    onClick: doCopy,
    title: copied ? 'Copiado!' : 'Copiar'
  }, e('i', { className: `ti ${copied ? 'ti-check' : 'ti-copy'}` }));
}

// ─── CONTEXT CARDS ────────────────────────────────────────────────────────
function ContextCards({ cards }) {
  if (!cards || !cards.length) return null;
  return e('div', { className: 'cards-list' },
    cards.map((c, i) =>
      e('button', {
        key: i,
        className: `ctx-card ${c.urgent ? 'urgent' : ''}`,
        onClick: c.onClick || (() => {})
      },
        e('div', {
          className: 'ctx-icon',
          style: { background: c.iconBg || '#F0F0F2', color: c.iconColor || '#6B7280' }
        }, e('i', { className: `ti ${c.icon || 'ti-file'}` })),
        e('div', { className: 'ctx-body' },
          e('div', { className: 'ctx-title' }, c.title),
          c.sub && e('div', { className: 'ctx-sub' }, c.sub)
        ),
        c.status && e('span', {
          className: 'ctx-pill',
          style: { background: c.statusBg || '#F0F0F2', color: c.statusColor || '#6B7280' }
        }, c.status)
      )
    )
  );
}

// ─── STAT CARDS ───────────────────────────────────────────────────────────
function StatCards({ stats }) {
  if (!stats || !stats.length) return null;
  return e('div', { className: 'stats-grid' },
    stats.map((s, i) =>
      e('div', { key: i, className: 'stat-card' },
        e('div', { className: 'stat-label' }, s.label),
        e('div', { className: 'stat-value' }, s.value)
      )
    )
  );
}

// ─── QUICK ACTION CHIPS ───────────────────────────────────────────────────
function QuickChips({ actions }) {
  if (!actions || !actions.length) return null;
  return e('div', { className: 'quick-actions' },
    actions.map((a, i) =>
      e('button', { key: i, className: 'qa-chip', onClick: a.onClick },
        a.label,
        e('i', { className: 'ti ti-arrow-up-right', style: { fontSize: '11px' } })
      )
    )
  );
}

// ─── MESSAGE ──────────────────────────────────────────────────────────────
function Message({ msg, onRetry, userInitials }) {
  const isUser = msg.role === 'user';
  return e('div', { className: `msg-row ${msg.role}` },
    e('div', { className: `msg-avatar ${msg.role}` }, isUser ? (userInitials || 'EU') : 'J'),
    e('div', { className: 'msg-content' },
      isUser
        ? e('div', { className: 'msg-bubble' }, msg.text)
        : msg.isError
          ? e('div', { className: 'msg-error' },
              e('i', { className: 'ti ti-alert-circle' }),
              'Algo deu errado.',
              e('button', { className: 'retry-btn', onClick: onRetry }, 'Tenta de novo.')
            )
          : e(React.Fragment, null,
              e('div', { className: 'msg-text-wrap' },
                e('div', { className: 'msg-text' }, msg.text),
                e('div', { className: 'msg-actions' },
                  e(CopyBtn, { text: msg.text })
                )
              ),
              msg.cards  && e(ContextCards, { cards: msg.cards }),
              msg.stats  && e(StatCards, { stats: msg.stats }),
              msg.quickActions && e(QuickChips, { actions: msg.quickActions })
            )
    )
  );
}

// ─── TYPING INDICATOR ─────────────────────────────────────────────────────
function TypingIndicator() {
  return e('div', { className: 'typing-row' },
    e('div', { className: 'msg-avatar jarvis' }, 'J'),
    e('div', { className: 'typing-dots' },
      e('span'), e('span'), e('span')
    )
  );
}

// ─── EMPTY STATE ──────────────────────────────────────────────────────────
function EmptyState({ onAction }) {
  const actions = [
    { label: 'Ver tarefas de hoje',  msg: 'Quais são minhas tarefas de hoje?' },
    { label: 'Status dos clientes',  msg: 'Como está o status dos meus clientes?' },
    { label: 'Briefing do dia',      msg: 'Me dá o briefing do dia.' },
  ];
  return e('div', { className: 'empty-wrap' },
    e('div', null,
      e('div', { className: 'empty-greeting' }, `${greeting()}, Chefe.`),
      e('div', { className: 'empty-sub' }, 'Como posso ajudar você hoje?')
    ),
    e('div', { className: 'quick-actions' },
      actions.map((a, i) =>
        e('button', { key: i, className: 'qa-chip', onClick: () => onAction(a.msg) },
          a.label,
          e('i', { className: 'ti ti-arrow-up-right', style: { fontSize: '11px' } })
        )
      )
    )
  );
}

// ─── INPUT BAR ────────────────────────────────────────────────────────────
function InputBar({ onSend, isThinking, isListening, onMicToggle, inputRef: externalRef }) {
  const [val, setVal]   = useState('');
  const taRef           = useRef(null);

  // expose textarea ref to parent for Cmd+K
  useEffect(() => {
    if (externalRef) externalRef.current = taRef.current;
  });

  // auto-resize textarea
  useEffect(() => {
    const ta = taRef.current;
    if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 96) + 'px';
  }, [val]);

  const send = useCallback(() => {
    const v = val.trim();
    if (!v || isThinking) return;
    onSend(v);
    setVal('');
    if (taRef.current) taRef.current.style.height = 'auto';
  }, [val, isThinking, onSend]);

  const onKey = useCallback(ev => {
    if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); send(); return; }
    if (ev.key === 'Escape') {
      setVal('');
      if (taRef.current) { taRef.current.style.height = 'auto'; taRef.current.blur(); }
    }
  }, [send]);

  const canSend = val.trim().length > 0 && !isThinking;

  return e('div', { className: 'input-wrap' },
    e('div', { className: 'input-bar' },
      e('button', { className: 'input-icon-btn', title: 'Anexar', tabIndex: -1 },
        e('i', { className: 'ti ti-paperclip' })
      ),
      e('textarea', {
        ref: taRef,
        className: 'input-textarea',
        placeholder: 'Mensagem…',
        value: val,
        rows: 1,
        onChange: ev => setVal(ev.target.value),
        onKeyDown: onKey
      }),
      e('button', {
        className: `input-icon-btn ${isListening ? 'mic-on' : ''}`,
        onClick: onMicToggle,
        title: isListening ? 'Parar voz' : 'Voz',
        tabIndex: -1
      }, e('i', { className: 'ti ti-microphone' })),
      e('button', {
        className: 'btn-send',
        onClick: send,
        disabled: !canSend,
        title: 'Enviar (Enter)'
      }, e('i', { className: 'ti ti-arrow-up' }))
    ),
    e('div', { className: 'input-hint' }, 'Enter para enviar · Shift+Enter para nova linha · Cmd+K para focar')
  );
}

// ─── TOAST ────────────────────────────────────────────────────────────────
function ToastStack({ toasts }) {
  if (!toasts.length) return null;
  return e('div', { className: 'toast-wrap' },
    toasts.map(t => e('div', { key: t.id, className: 'toast' }, t.text))
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────
function App() {
  const [messages,      setMessages]      = useState([]);
  const [isThinking,    setIsThinking]    = useState(false);
  const [activeNav,     setActiveNav]     = useState('chat');
  const [activeContext, setActiveContext] = useState(null);
  const [toasts,        setToasts]        = useState([]);
  const [isListening,   setIsListening]   = useState(false);
  const [lastMsg,       setLastMsg]       = useState('');

  const feedRef  = useRef(null);
  const inputRef = useRef(null); // points to the textarea DOM node

  // scroll feed to bottom
  const scrollBottom = useCallback(() => {
    if (feedRef.current) feedRef.current.scrollTop = feedRef.current.scrollHeight;
  }, []);

  useEffect(scrollBottom, [messages, isThinking, scrollBottom]);

  // Cmd+K → focus input
  useEffect(() => {
    const handler = ev => {
      if ((ev.metaKey || ev.ctrlKey) && ev.key === 'k') {
        ev.preventDefault();
        if (inputRef.current) inputRef.current.focus();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // add a transient toast
  const addToast = useCallback(text => {
    const id = uid();
    setToasts(prev => [...prev, { id, text }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);

  // send a message
  const sendMessage = useCallback(async text => {
    const trimmed = text.trim();
    if (!trimmed) return;
    setLastMsg(trimmed);

    // optimistic user bubble
    setMessages(prev => [...prev, { id: uid(), role: 'user', text: trimmed }]);
    setIsThinking(true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: trimmed })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const reply = data.response || data.reply || data.message || JSON.stringify(data);
      setMessages(prev => [...prev, { id: uid(), role: 'jarvis', text: reply }]);
    } catch (err) {
      console.error('chat error:', err);
      setMessages(prev => [...prev, { id: uid(), role: 'jarvis', isError: true, text: '' }]);
      addToast('Erro ao conectar com Jarvis.');
    } finally {
      setIsThinking(false);
    }
  }, [addToast]);

  // retry last message
  const handleRetry = useCallback(() => {
    setMessages(prev => prev.filter(m => !m.isError));
    if (lastMsg) sendMessage(lastMsg);
  }, [lastMsg, sendMessage]);

  // LiveKit voice
  const onMicToggle = useCallback(async () => {
    if (window._lkRoom) {
      await window._lkRoom.disconnect();
      window._lkRoom = null;
      setIsListening(false);
      return;
    }
    setIsListening(true);
    try {
      const res = await fetch('/api/token');
      const { token, url } = await res.json();
      const room = new LivekitClient.Room();
      window._lkRoom = room;
      room.on('trackSubscribed', track => {
        if (track.kind === 'audio') track.attach();
      });
      room.on('disconnected', () => {
        setIsListening(false);
        window._lkRoom = null;
      });
      await room.connect(url, token);
      await room.localParticipant.setMicrophoneEnabled(true);
    } catch (err) {
      console.error('livekit error:', err);
      setIsListening(false);
      addToast('Erro ao conectar microfone.');
    }
  }, [addToast]);

  const hasMessages = messages.length > 0;

  return e('div', { className: 'app' },
    e(Sidebar, { active: activeNav, onSelect: setActiveNav }),

    e('div', { className: 'main' },
      e(Topbar, { onBriefing: () => sendMessage('Me dá o briefing do dia.') }),
      e(ContextBar, { context: activeContext, onClear: () => setActiveContext(null) }),

      e('div', { className: 'chat-feed', ref: feedRef },
        e('div', { className: 'chat-inner' },

          hasMessages && e('div', { className: 'load-more' },
            e('button', { className: 'load-more-btn' }, '↑ ver mais')
          ),

          e(DateSep, { label: todayLabel() }),

          hasMessages
            ? messages.map(msg =>
                e(Message, {
                  key: msg.id,
                  msg,
                  onRetry: handleRetry,
                  userInitials: 'JZ'
                })
              )
            : e(EmptyState, { onAction: sendMessage }),

          isThinking && e(TypingIndicator)
        )
      ),

      e(InputBar, {
        onSend: sendMessage,
        isThinking,
        isListening,
        onMicToggle,
        inputRef
      })
    ),

    e(ToastStack, { toasts })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
