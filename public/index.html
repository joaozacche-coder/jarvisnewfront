  .crm-add-icon { display: inline-block; font-size: 17px; line-height: 1; transition: transform 0.2s; }
  .crm-add-btn:hover .crm-add-icon { transform: rotate(45deg); }

  /* Grid */
  .crm-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }

  /* Card */
  .crm-card {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px;
    display: flex; flex-direction: column; gap: 16px;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s, border-color 0.25s, background 0.2s;
    border-top: 3px solid var(--crm-color, var(--accent));
    animation: tvFadeUp 0.4s calc(var(--ci,0) * 80ms) both;
    cursor: default;
  }
  .crm-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(83,74,183,0.28); border-color: rgba(83,74,183,0.38); background: rgba(255,255,255,0.04); }
  .crm-card:active { transform: scale(0.98) !important; transition-duration: 0.07s !important; }

  /* Avatar */
  .crm-card-top { display: flex; align-items: flex-start; gap: 14px; }
  .crm-avatar {
    width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
    background: var(--crm-color, var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: 700; color: rgba(255,255,255,0.95); letter-spacing: 0;
    animation: crmRotateIn 0.5s cubic-bezier(0.34,1.56,0.64,1) calc(var(--ci,0) * 80ms + 100ms) both;
  }
  .crm-card-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .crm-name { font-size: 16px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
  .crm-dot { width: 7px; height: 7px; border-radius: 50%; background: #34D399; flex-shrink: 0; animation: crmPulse 2.2s ease-in-out infinite; }
  .crm-dot--empty { background: rgba(255,255,255,0.16); animation: none; }
  .crm-updated { font-size: 10px; color: var(--text-3); font-family: 'Geist Mono', monospace; }

  /* Divider */
  .crm-divider { height: 1px; background: var(--border); transform-origin: left; animation: crmDivider 0.5s calc(var(--ci,0) * 80ms + 200ms) both; }

  /* Sections */
  .crm-section { display: flex; flex-direction: column; gap: 5px; }
  .crm-label { font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); }
  .crm-body { font-size: 12.5px; color: var(--text-2); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .crm-next { font-size: 12.5px; color: rgba(124,106,247,0.9); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-style: italic; }
  .crm-cursor { color: var(--accent); animation: crmBlink 1s step-end infinite; font-style: normal; margin-left: 1px; opacity: 0.75; }

  /* Empty card */
  .crm-empty-card { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 6px 0; text-align: center; }
  .crm-spark { font-size: 26px; opacity: 0.35; line-height: 1; }
  .crm-empty-card-txt { font-size: 12px; color: var(--text-3); }
  .crm-start-btn { margin-top: 2px; padding: 6px 16px; border-radius: 8px; font-size: 12px; background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.24); color: var(--accent); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .crm-start-btn:hover { background: rgba(124,106,247,0.2); transform: translateY(-1px); }

  /* Footer */
  .crm-card-ft { display: flex; align-items: center; justify-content: space-between; margin-top: auto; gap: 8px; }
  .crm-tasks-pill { font-size: 11px; padding: 3px 9px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-3); font-family: 'Geist Mono', monospace; transition: transform 0.15s, background 0.15s; cursor: default; }
  .crm-tasks-pill:hover { transform: scale(1.06); }
  .crm-tasks-pill--on { background: rgba(124,106,247,0.09); border-color: rgba(124,106,247,0.22); color: var(--accent); }
  .crm-tasks-pill--late { background: rgba(248,113,113,0.09); border-color: rgba(248,113,113,0.24); color: #F87171; animation: crmPulse 2s ease-in-out infinite; }
  .crm-chat-btn { font-size: 12px; color: var(--text-3); background: none; border: none; cursor: pointer; font-family: inherit; transition: color 0.2s, background 0.2s; padding: 5px 10px; border-radius: 7px; display: flex; align-items: center; gap: 4px; }
  .crm-chat-btn:hover { color: var(--accent); background: rgba(124,106,247,0.09); }
  .crm-arrow { display: inline-block; transition: transform 0.2s; }
  .crm-chat-btn:hover .crm-arrow { transform: translateX(4px); }

  /* Skeleton */
  .crm-skel-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 16px; padding: 22px; display: flex; flex-direction: column; gap: 14px; border-top: 3px solid rgba(255,255,255,0.05); }

  /* Empty state */
  .crm-empty { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 80px 0; animation: tvFadeUp 0.3s both; }
  .crm-empty-icon { font-size: 36px; opacity: 0.15; line-height: 1; }
  .crm-empty-msg { font-size: 14px; color: var(--text-3); font-family: 'Geist Mono', monospace; }

  /* Modal */
  .crm-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: center; justify-content: center; animation: tvFadeUp 0.18s both; }
  .crm-modal { background: #0D1420; border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 26px; width: 380px; max-width: calc(100vw - 32px); display: flex; flex-direction: column; gap: 14px; box-shadow: 0 32px 80px rgba(0,0,0,0.7); animation: tvSlideDown 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .crm-modal-hd { display: flex; align-items: center; justify-content: space-between; }
  .crm-modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .crm-modal-x { font-size: 20px; color: var(--text-2); cursor: pointer; background: none; border: none; line-height: 1; padding: 2px 6px; border-radius: 6px; transition: background 0.12s; }
  .crm-modal-x:hover { background: rgba(255,255,255,0.08); }
  .crm-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 200; display: flex; align-items: center; justify-content: center; animation: tvFadeUp 0.18s both; }
  .crm-modal-input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--text); font-family: inherit; outline: none; width: 100%; box-sizing: border-box; transition: border-color 0.15s; }
  .crm-modal-input:focus { border-color: rgba(124,106,247,0.5); }
  .crm-modal-hint { font-size: 11px; color: var(--text-3); font-family: 'Geist Mono', monospace; }
  .crm-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .crm-modal-cancel { padding: 8px 16px; border-radius: 9px; font-size: 13px; background: none; border: 1px solid var(--border); color: var(--text-2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .crm-modal-cancel:hover { background: rgba(255,255,255,0.04); }
  .crm-modal-confirm { padding: 8px 18px; border-radius: 9px; font-size: 13px; background: rgba(124,106,247,0.16); border: 1px solid rgba(124,106,247,0.32); color: var(--accent); cursor: pointer; font-family: inherit; transition: all 0.15s; font-weight: 500; }
  .crm-modal-confirm:hover { background: rgba(124,106,247,0.26); transform: translateY(-1px); }
  .crm-card--empty { opacity: 0.7; }
  .crm-empty-state { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 0 6px; text-align: center; }
  .crm-empty-spark { font-size: 22px; opacity: 0.4; line-height: 1; }
  .crm-empty-state-txt { font-size: 12px; color: var(--text-3); }

  @media (max-width: 1023px) { .crm-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 767px) {
    .crm-view { padding: 24px 16px 40px calc(var(--sb-w) + 16px); }
    .crm-grid { grid-template-columns: 1fr; }
    .crm-title { font-size: 20px; }
  }
  @media (max-width: 600px) {
    .crm-modal-bg { align-items: flex-end; }
    .crm-modal { width: 100% !important; max-width: 100% !important; border-radius: 18px 18px 0 0; padding-bottom: max(26px, env(safe-area-inset-bottom, 0px)); }
  }

  /* ─── Finance View ─── */
  @keyframes finFadeUp    { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes finSlideIn   { from { opacity:0; transform:translateX(18px); } to { opacity:1; transform:translateX(0); } }
  @keyframes finBarGrow   { from { height:6px; } to { height:var(--fh,6px); } }
  @keyframes finNewItem   { from { opacity:0; transform:translateY(-10px) scaleY(0.85); transform-origin:top; } to { opacity:1; transform:translateY(0) scaleY(1); } }
  @keyframes finPulse     { 0%,100% { opacity:0.14; transform:scale(1); } 50% { opacity:0.22; transform:scale(1.08); } }
  @keyframes finConfetti  { 0% { transform:translate(0,0) rotate(0deg); opacity:1; } 100% { transform:translate(var(--cx,0px),var(--cy,-40px)) rotate(540deg); opacity:0; } }
  @keyframes finSkelShim  { from { background-position:-200% 0; } to { background-position:200% 0; } }
  @keyframes finFlashPos  { 0%,100% { box-shadow:none; } 40% { box-shadow:0 0 0 3px rgba(29,158,117,0.45); background:rgba(29,158,117,0.08); } }
  @keyframes finFlashNeg  { 0%,100% { box-shadow:none; } 40% { box-shadow:0 0 0 3px rgba(248,113,113,0.45); background:rgba(248,113,113,0.08); } }
  @keyframes finFadeOut   { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(24px); } }

  .fin-view {
    position: relative; z-index: 3; height: 100vh; height: 100dvh;
    padding: 40px 48px 40px calc(var(--sb-w) + 40px);
    display: flex; flex-direction: column; gap: 20px;
    overflow-y: auto; box-sizing: border-box;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.07) transparent;
  }

  .fin-header { display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
  .fin-title { font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: -0.04em; margin: 0; animation: finFadeUp 0.3s both; }
  .fin-sub { display: block; font-size: 11px; color: var(--text-3); margin-top: 4px; font-family: 'Geist Mono', monospace; letter-spacing: 0.06em; text-transform: capitalize; animation: finFadeUp 0.3s 0.05s both; }

  .fin-period-pills { display: flex; gap: 4px; animation: finFadeUp 0.3s 0.08s both; }
  .fin-period-slider { display: none; }
  .fin-period-btn { padding: 4px 14px; border: 0.5px solid transparent; background: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; border-radius: 99px; transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap; }
  .fin-period-btn--active   { background: rgba(83,74,183,0.25); border-color: #534AB7; color: #fff; }
  .fin-period-btn--inactive { color: rgba(255,255,255,0.4); }

  .fin-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; flex-shrink: 0; }
  .fin-card {
    padding: 10px 16px 8px; border-radius: 14px; max-height: 72px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 2px;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, background 0.18s;
    animation: finFadeUp 0.4s calc(var(--ci,0)*80ms) both; cursor: default;
    overflow: hidden;
  }
  .fin-card:hover { transform: translateY(-3px); }
  .fin-card--income  { border-top: 2px solid #1D9E75; }
  .fin-card--income:hover  { box-shadow: 0 8px 24px rgba(29,158,117,0.28); background: rgba(29,158,117,0.04); }
  .fin-card--expense { border-top: 2px solid #f87171; }
  .fin-card--expense:hover { box-shadow: 0 8px 24px rgba(248,113,113,0.28); background: rgba(248,113,113,0.04); }
  .fin-card--balance { border-top: 2px solid var(--accent); }
  .fin-card--balance:hover { box-shadow: 0 8px 24px rgba(124,106,247,0.28); background: rgba(124,106,247,0.04); }
  .fin-card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
  .fin-card--income  .fin-card-label { color: rgba(29,158,117,0.7); }
  .fin-card--expense .fin-card-label { color: rgba(248,113,113,0.7); }
  .fin-card--balance .fin-card-label { color: rgba(124,106,247,0.7); }
  .fin-card-num { font-size: 22px; font-weight: 300; letter-spacing: -0.04em; line-height: 1.1; }
  .fin-card--income  .fin-card-num { color: #1D9E75; }
  .fin-card--expense .fin-card-num { color: #f87171; }
  .fin-card--balance .fin-card-num { color: var(--accent); }
  .fin-card-sub { font-size: 9.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }

  .fin-chart-wrap  { flex-shrink: 0; animation: finFadeUp 0.4s 0.3s both; }
  .fin-chart-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; }
  .fin-chart  { display: flex; gap: 6px; align-items: flex-end; padding-bottom: 2px; scroll-snap-type: x mandatory; overflow-x: auto; scrollbar-width: none; }
  .fin-chart::-webkit-scrollbar { display: none; }
  .fin-month  { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; min-width: 38px; scroll-snap-align: start; }
  .fin-bars   { display: flex; gap: 3px; align-items: flex-end; height: 88px; }
  .fin-bar-wrap { position: relative; display: flex; flex-direction: column; align-items: center; }
  .fin-bar {
    width: 13px; border-radius: 4px 4px 0 0;
    height: 6px; min-height: 6px;
    cursor: pointer; transition: filter 0.15s;
  }
  .fin-chart--visible .fin-bar {
    height: var(--fh, 6px);
    animation: finBarGrow 0.5s ease-out calc(var(--bi,0) * 0.06s) both;
  }
  .fin-bar:hover { filter: brightness(1.25); }
  .fin-bar--income  { background: linear-gradient(to top, #0a6644, #1D9E75); }
  .fin-bar--expense { background: linear-gradient(to top, #7f1d1d, #f87171); }
  .fin-bar-tooltip {
    position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%);
    background: #0D1420; border: 1px solid rgba(255,255,255,0.12);
    padding: 4px 8px; border-radius: 6px; font-size: 10px; white-space: nowrap;
    color: var(--text); font-family: 'Geist Mono', monospace;
    opacity: 0; pointer-events: none; transition: opacity 0.12s; z-index: 10;
  }
  .fin-bar-wrap:hover .fin-bar-tooltip { opacity: 1; }
  .fin-month-label { font-size: 9.5px; color: var(--text-3); font-family: 'Geist Mono', monospace; text-transform: capitalize; }

  .fin-list-wrap { transition: opacity 0.15s ease; }
  .fin-list-wrap--hidden { opacity: 0; pointer-events: none; }
  .fin-list { display: flex; flex-direction: column; animation: finFadeUp 0.4s 0.55s both; }
  .fin-group-hd { display: flex; align-items: center; gap: 10px; padding: 14px 0 8px; }
  .fin-group-hd:first-child { padding-top: 0; }
  .fin-group-lbl { font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); flex-shrink: 0; }
  .fin-group-line { flex: 1; height: 1px; background: rgba(255,255,255,0.12); }
  .fin-tx-item {
    display: flex; align-items: center; gap: 11px; padding: 8px 10px; border-radius: 10px;
    transition: background 0.12s, transform 0.15s;
    animation: finSlideIn 0.28s calc(var(--i,0)*40ms) both; cursor: default;
  }
  .fin-tx-item--new { animation: finNewItem 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
  .fin-tx-item:hover { background: rgba(255,255,255,0.03); transform: translateX(4px); }
  .fin-tx-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .fin-tx-info { flex: 1; min-width: 0; }
  .fin-tx-title { font-size: 13px; color: var(--text); letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fin-tx-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .fin-cat-pill { font-size: 9.5px; padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--text-3); }
  .fin-tx-date  { font-size: 9.5px; color: var(--text-3); font-family: 'Geist Mono', monospace; opacity: 0; transition: opacity 0.15s; }
  .fin-tx-item:hover .fin-tx-date { opacity: 1; }
  .fin-tx-amount { font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .fin-tx-amount--income  { color: #1D9E75; }
  .fin-tx-amount--expense { color: #f87171; }

  .fin-tx-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .fin-tx-edit   { opacity:0; background:none; border:none; cursor:pointer; color:rgba(124,106,247,0.5); font-size:15px; padding:4px 5px; border-radius:6px; transition:opacity 0.15s, color 0.15s, background 0.12s; line-height:1; }
  .fin-tx-delete { opacity:0; background:none; border:none; cursor:pointer; color:rgba(248,113,113,0.5); font-size:15px; padding:4px 5px; border-radius:6px; transition:opacity 0.15s, color 0.15s, background 0.12s; line-height:1; }
  .fin-tx-item:hover .fin-tx-edit   { opacity:1; }
  .fin-tx-item:hover .fin-tx-delete { opacity:1; }
  .fin-tx-edit:hover   { color:var(--accent); background:rgba(124,106,247,0.1); }
  .fin-tx-delete:hover { color:#f87171; background:rgba(248,113,113,0.1); }
  .fin-tx-confirm { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .fin-tx-confirm-lbl { font-size:11px; color:var(--text-3); white-space:nowrap; }
  .fin-tx-confirm-yes { padding:3px 8px; border-radius:5px; background:rgba(248,113,113,0.14); border:1px solid rgba(248,113,113,0.3); color:#f87171; font-size:11px; cursor:pointer; font-family:inherit; transition:all 0.12s; }
  .fin-tx-confirm-yes:hover { background:rgba(248,113,113,0.24); }
  .fin-tx-confirm-no  { padding:3px 8px; border-radius:5px; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--text-3); font-size:11px; cursor:pointer; font-family:inherit; transition:all 0.12s; }
  .fin-tx-confirm-no:hover { background:rgba(255,255,255,0.07); }
  .fin-total-row { display:flex; justify-content:space-between; padding:12px 10px 4px; border-top:1px solid rgba(255,255,255,0.12); margin-top:4px; font-size:11px; color:var(--text-3); font-family:'Geist Mono',monospace; }
  .fin-total-income { color:rgba(29,158,117,0.7); }
  .fin-total-expense { color:rgba(248,113,113,0.7); }

  .fin-ver-mais { display:flex; justify-content:center; padding:16px 0 4px; }
  .fin-ver-mais-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:8px 20px; font-size:12px; color:var(--text-3); cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .fin-ver-mais-btn:hover { background:rgba(255,255,255,0.07); color:var(--text-2); }

  .fin-empty { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 64px 0; animation: finFadeUp 0.4s both; }
  .fin-empty-icon { font-size: 34px; animation: finPulse 2.8s ease-in-out infinite; }
  .fin-empty-title { font-size: 15px; color: var(--text-2); font-weight: 400; margin: 0; }
  .fin-empty-sub   { font-size: 12px; color: var(--text-3); font-family: 'Geist Mono', monospace; text-align: center; max-width: 260px; line-height: 1.6; margin: 0; }
  .fin-empty-btn   { padding: 9px 20px; border-radius: 10px; background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.25); color: var(--accent); cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: all 0.15s; }
  .fin-empty-btn:hover { background: rgba(124,106,247,0.2); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(124,106,247,0.2); }

  .fin-skel { border-radius: 6px; background: linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: finSkelShim 1.4s ease-in-out infinite; }
  .fin-card--flash-pos { animation: finFlashPos 0.55s ease-out; }
  .fin-card--flash-neg { animation: finFlashNeg 0.55s ease-out; }
  .fin-tx-item--dying { animation: finFadeOut 0.3s ease-out both; pointer-events:none; }

  .fin-fab {
    position: fixed; bottom: 32px; right: 32px; z-index: 50;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(124,106,247,0.42);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
  }
  .fin-fab:hover { transform: scale(1.1); box-shadow: 0 12px 32px rgba(124,106,247,0.58); }
  .fin-fab-plus { display: inline-block; font-size: 24px; color: #fff; line-height: 1; transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1); }
  .fin-fab:hover .fin-fab-plus { transform: rotate(45deg); }

  .fin-confetti-dot { position: fixed; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; z-index: 999; animation: finConfetti 0.75s ease-out both; }

  .fin-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.74); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center; animation: finFadeUp 0.16s both; }
  .fin-modal { background: #0D1420; border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 26px; width: 420px; max-width: calc(100vw - 32px); display: flex; flex-direction: column; gap: 16px; box-shadow: 0 32px 80px rgba(0,0,0,0.75); animation: finNewItem 0.28s cubic-bezier(0.34,1.56,0.64,1); }
  .fin-modal-hd { display: flex; align-items: center; justify-content: space-between; }
  .fin-modal-title { font-size: 16px; font-weight: 500; color: var(--text); }
  .fin-modal-x { background: none; border: none; color: var(--text-2); cursor: pointer; font-size: 22px; line-height: 1; padding: 0 4px; border-radius: 6px; transition: background 0.12s, color 0.12s; }
  .fin-modal-x:hover { background: rgba(255,255,255,0.07); color: var(--text); }
  .fin-toggle-wrap { display: flex; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 3px; position: relative; }
  .fin-toggle-slider { position: absolute; top: 3px; bottom: 3px; width: calc(50% - 3px); border-radius: 7px; transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .fin-toggle-slider--receita { left: 3px;       background: rgba(29,158,117,0.18); border: 1px solid rgba(29,158,117,0.36); }
  .fin-toggle-slider--despesa { left: calc(50%); background: rgba(248,113,113,0.18); border: 1px solid rgba(248,113,113,0.36); }
  .fin-toggle-btn { flex: 1; padding: 8px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; border-radius: 7px; transition: color 0.2s; position: relative; z-index: 1; }
  .fin-amount-wrap { text-align: center; }
  .fin-amount-row { display: flex; align-items: baseline; justify-content: center; gap: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; transition: border-color 0.15s; }
  .fin-amount-row:focus-within { border-color: rgba(124,106,247,0.4); }
  .fin-amount-prefix { font-size: 22px; font-weight: 300; color: var(--text-2); }
  .fin-amount-input { font-size: 42px; font-weight: 300; letter-spacing: -0.04em; background: none; border: none; outline: none; color: var(--text); font-family: inherit; text-align: center; width: 170px; padding: 0; }
  .fin-amount-input::placeholder { color: rgba(255,255,255,0.1); }
  .fin-modal-cats { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
  .fin-modal-cat { padding: 8px 4px; border-radius: 9px; font-size: 11px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-3); cursor: pointer; font-family: inherit; transition: all 0.14px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .fin-modal-cat:hover { border-color: rgba(255,255,255,0.1); color: var(--text-2); background: rgba(255,255,255,0.06); }
  .fin-modal-cat--sel { border-color: rgba(124,106,247,0.38); color: var(--accent); background: rgba(124,106,247,0.1); }
  .fin-modal-cat-icon { font-size: 17px; }
  .fin-modal-desc { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--text); font-family: inherit; outline: none; transition: border-color 0.15s; width: 100%; box-sizing: border-box; }
  .fin-modal-desc:focus { border-color: rgba(124,106,247,0.4); }
  .fin-modal-desc::placeholder { color: rgba(255,255,255,0.2); }
  .fin-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .fin-modal-cancel { padding: 9px 18px; border-radius: 9px; background: none; border: 1px solid var(--border); color: var(--text-2); cursor: pointer; font-family: inherit; font-size: 13px; transition: all 0.15s; }
  .fin-modal-cancel:hover { background: rgba(255,255,255,0.04); }
  .fin-modal-confirm { padding: 9px 20px; border-radius: 9px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; transition: all 0.15s; border: 1px solid; }
  .fin-modal-confirm--receita { background: rgba(29,158,117,0.14); border-color: rgba(29,158,117,0.34); color: #1D9E75; }
  .fin-modal-confirm--receita:hover:not(:disabled) { background: rgba(29,158,117,0.24); transform: translateY(-1px); }
  .fin-modal-confirm--despesa { background: rgba(248,113,113,0.14); border-color: rgba(248,113,113,0.34); color: #f87171; }
  .fin-modal-confirm--despesa:hover:not(:disabled) { background: rgba(248,113,113,0.24); transform: translateY(-1px); }
  .fin-modal-confirm:disabled { opacity: 0.45; cursor: not-allowed; }

  @media (max-width: 767px) {
    .fin-view { padding: 24px 16px 120px calc(var(--sb-w) + 16px); gap: 16px; }
    .fin-header { flex-direction: column; gap: 12px; }
    .fin-cards { grid-template-columns: repeat(2,1fr); }
    .fin-card--balance { grid-column: 1 / -1; }
    .fin-chart-wrap { overflow-x: hidden; }
    .fin-chart { overflow-x: auto; }
    .fin-fab { bottom: 24px; right: 20px; }
    .fin-modal-overlay { align-items: flex-end; }
    .fin-modal { width: 100%; max-width: 100%; border-radius: 22px 22px 0 0; padding: 22px 20px 36px; }
    .fin-tx-date { opacity: 1; }
    .fin-tx-edit, .fin-tx-delete { opacity: 1; }
  }
  @media (min-width: 768px) and (max-width: 1023px) {
    .fin-view { padding: 32px 32px 32px calc(var(--sb-w) + 28px); }
  }

  /* ─── Agenda View ─── */
  @keyframes agFadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes agEventIn  { from{opacity:0;transform:translateX(-8px) scale(0.96)} to{opacity:1;transform:translateX(0) scale(1)} }
  @keyframes agPop      { from{opacity:0;transform:scale(0.94) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes agFadeOut  { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(0.96)} }
  @keyframes agShim     { 0%,100%{opacity:0.4} 50%{opacity:1} }
  @keyframes agPulse    { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }
  @keyframes agSlideL   { from{opacity:0.1;transform:translateX(22%)} to{opacity:1;transform:translateX(0)} }
  @keyframes agSlideR   { from{opacity:0.1;transform:translateX(-22%)} to{opacity:1;transform:translateX(0)} }
  @keyframes agSlideDown{ from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes agNowIn    { from{opacity:0} to{opacity:1} }
  @keyframes agCellIn   { from{opacity:0} to{opacity:1} }
  @keyframes agFadeIn   { from{opacity:0} to{opacity:1} }

  .ag-view {
    position: relative; z-index: 3; height: 100vh; height: 100dvh;
    padding: 28px 32px 0 calc(var(--sb-w) + 32px);
    display: flex; flex-direction: column; gap: 14px;
    overflow: hidden; box-sizing: border-box;
  }
  .is-agenda .orb-ambient { opacity: 0 !important; transition: opacity 0.5s; }
  .is-agenda .bg-layer canvas { opacity: 0.04 !important; transition: opacity 0.5s; }

  /* Header */
  .ag-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; animation: agFadeUp 0.3s both; gap: 12px; }
  .ag-header-left { flex: 1; min-width: 0; }
  .ag-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .ag-title { font-size: 22px; font-weight: 300; color: var(--text); letter-spacing: -0.04em; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ag-nav { display: flex; align-items: center; gap: 6px; }
  .ag-nav-btn { width: 32px; height: 32px; border-radius: 8px; background: transparent; border: 0.5px solid rgba(255,255,255,0.15); color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s, border-color 0.15s; font-size: 14px; line-height: 1; }
  .ag-nav-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.28); color: var(--text); }
  .ag-nav-today { padding: 5px 14px; border-radius: 99px; background: rgba(83,74,183,0.18); border: 1px solid #534AB7; color: var(--accent); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: all 0.15s; }
  .ag-nav-today:hover { background: rgba(83,74,183,0.32); box-shadow: 0 4px 14px rgba(83,74,183,0.28); }
  .ag-nav-back-week { padding: 5px 12px; border-radius: 8px; background: transparent; border: 0.5px solid rgba(255,255,255,0.15); color: var(--text-3); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
  .ag-nav-back-week:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.28); color: var(--text); }

  /* View pills toggle */
  .ag-view-pills { display: flex; background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; gap: 2px; }
  .ag-view-pill { padding: 4px 12px; border-radius: 8px; background: transparent; border: none; color: var(--text-3); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: background 0.18s, color 0.18s, border-color 0.18s; white-space: nowrap; }
  .ag-view-pill--active { background: rgba(83,74,183,0.30); color: #fff; box-shadow: 0 2px 8px rgba(83,74,183,0.22); }
  .ag-view-pill:not(.ag-view-pill--active):hover { background: rgba(255,255,255,0.06); color: var(--text-2); }

  /* Content area */
  .ag-content { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; transition: opacity 0.15s; }
  .ag-content--fade { opacity: 0; }

  /* Shared grid scroll wrapper */
  .ag-grid-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 80px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.07) transparent; }
  .ag-grid-wrap.ag-slide-l { animation: agSlideL 0.22s both; }
  .ag-grid-wrap.ag-slide-r { animation: agSlideR 0.22s both; }

  /* Hour rows */
  .ag-hour-row { position: absolute; left: 0; right: 0; display: flex; align-items: flex-start; }
  .ag-hour-row:hover .ag-week-slot { background: rgba(255,255,255,0.025); }
  .ag-hour-label { width: 48px; flex-shrink: 0; font-size: 9px; color: var(--text-3); font-family: 'Geist Mono', monospace; text-align: right; padding-right: 10px; padding-top: 4px; user-select: none; letter-spacing: 0.04em; }
  .ag-hour-line { flex: 1; padding-top: 14px; }
  .ag-hour-line-inner { height: 1px; background: rgba(255,255,255,0.1); }
  .ag-hour-half-line { height: 1px; background: rgba(255,255,255,0.05); margin-top: calc(60px / 2 - 2px); margin-left: 0; }
  .ag-week-half-line { position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: rgba(255,255,255,0.045); pointer-events: none; }

  /* Now indicator */
  .ag-now-line { position: absolute; left: 42px; right: 0; z-index: 5; display: flex; align-items: center; pointer-events: none; animation: agNowIn 0.5s 0.3s both; }
  .ag-now-dot  { width: 8px; height: 8px; border-radius: 50%; background: #f87171; flex-shrink: 0; box-shadow: 0 0 8px rgba(248,113,113,0.6); animation: agPulse 2.2s ease-in-out infinite; }
  .ag-now-track { flex: 1; height: 1.5px; background: rgba(248,113,113,0.5); }

  /* Event cards */
  .ag-event {
    position: absolute; border-radius: 8px;
    background: var(--ev-bg, rgba(83,74,183,0.15));
    border: 1px solid var(--ev-border, rgba(83,74,183,0.3));
    display: flex; overflow: hidden; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    animation: agEventIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .ag-event--new   { animation: agEventIn 0.42s cubic-bezier(0.34,1.56,0.64,1) both; }
  .ag-event--dying { animation: agFadeOut 0.32s ease-out both; pointer-events: none; }
  .ag-event:hover  { transform: translateX(2px) translateY(-1px); box-shadow: 0 6px 20px var(--ev-shadow, rgba(83,74,183,0.28)); filter: brightness(1.1); }
  .ag-event-bar    { width: 3px; background: var(--ev-color, #534AB7); flex-shrink: 0; }
  .ag-event-body   { padding: 5px 8px; flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; justify-content: center; }
  .ag-event-title  { font-size: 11px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ag-event-time   { font-size: 9px; color: var(--text-3); font-family: 'Geist Mono', monospace; }
  .ag-event-client { font-size: 9px; color: var(--ev-color, #534AB7); opacity: 0.85; }
  .ag-event-del    { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 8px; opacity: 0; transition: opacity 0.12s, color 0.12s; align-self: flex-start; padding-top: 5px; }
  .ag-event:hover .ag-event-del { opacity: 1; }
  .ag-event-del:hover { color: #f87171; }

  /* ── Week view ── */
  .ag-week-outer { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .ag-week-hd-row { display: flex; flex-shrink: 0; padding-left: 48px; border-bottom: 1px solid rgba(255,255,255,0.06); animation: agFadeUp 0.25s both; }
  .ag-week-hd-cell { flex: 1; text-align: center; padding: 6px 4px; cursor: pointer; transition: background 0.12s; border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .ag-week-hd-cell:hover { background: rgba(255,255,255,0.05); }
  .ag-week-hd-name { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); }
  .ag-week-hd-num  { font-size: 17px; font-weight: 300; color: var(--text-2); line-height: 1.1; }
  .ag-week-hd-cell--today .ag-week-hd-num { background: var(--accent); color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .ag-week-hd-cell--today .ag-week-hd-name { color: var(--accent); }
  .ag-week-grid { position: relative; }
  .ag-week-slot { flex: 1; height: 100%; cursor: pointer; position: relative; transition: background 0.1s; border-left: 0.5px solid rgba(255,255,255,0.05); }
  .ag-week-slot:hover { background: rgba(83,74,183,0.06); }
  .ag-week-slot:hover::after { content: '+'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 16px; color: rgba(83,74,183,0.7); pointer-events: none; font-weight: 300; }
  .ag-week-slot-line { position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.09); }
  .ag-grid-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 80px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.07) transparent; }

  /* ── Day view ── */
  .ag-day-grid { position: relative; }
  .ag-event--day { left: 56px; right: 12px; }

  /* ── Month view ── */
  .ag-month-wrap { display: flex; flex-direction: column; gap: 0; flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 80px; animation: agFadeUp 0.3s both; }
  .ag-month-headers { display: grid; grid-template-columns: repeat(7,1fr); gap: 0; padding: 0 0 0; border-bottom: 0.5px solid rgba(255,255,255,0.1); flex-shrink: 0; }
  .ag-month-hd { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.35); padding: 8px 0; }
  .ag-month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 0; padding: 0; flex-shrink: 0; }
  .ag-month-grid.ag-slide-l { animation: agSlideL 0.22s both; }
  .ag-month-grid.ag-slide-r { animation: agSlideR 0.22s both; }
  .ag-month-cell { min-height: 80px; border-radius: 0; padding: 8px 6px 6px; cursor: pointer; transition: background 0.15s; border-right: 0.5px solid rgba(255,255,255,0.06); border-bottom: 0.5px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; animation: agCellIn 0.22s calc(var(--ci,0)*8ms) both; }
  .ag-month-cell:hover { background: rgba(255,255,255,0.04); border-radius: 8px; transition: background 0.15s; }
  .ag-month-cell--other { visibility: hidden; pointer-events: none; cursor: default; }
  .ag-month-cell--today .ag-month-num { background: #534AB7; color: #fff !important; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; box-shadow: 0 0 0 3px rgba(83,74,183,0.28); }
  .ag-month-cell--sel { background: transparent; }
  .ag-month-num { font-size: 14px; font-weight: 300; color: var(--text-2); line-height: 1.1; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
  .ag-month-dots { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .ag-month-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .ag-month-more { font-size: 8px; color: var(--text-3); font-family: 'Geist Mono', monospace; }

  /* Expanded day events (month view) */
  .ag-day-expand { border-top: 1px solid rgba(255,255,255,0.07); padding: 14px 4px 10px; display: flex; flex-direction: column; gap: 8px; animation: agSlideDown 0.22s both; }
  .ag-day-expand--empty { align-items: center; padding: 20px; }
  .ag-day-expand-hd { display: flex; align-items: center; justify-content: space-between; }
  .ag-day-expand-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .ag-day-expand-add { background: none; border: 1px solid rgba(83,74,183,0.3); border-radius: 8px; color: var(--accent); cursor: pointer; font-size: 11px; padding: 3px 10px; font-family: inherit; transition: background 0.12s; }
  .ag-day-expand-add:hover { background: rgba(83,74,183,0.15); }
  .ag-day-expand-empty { font-size: 12px; color: var(--text-3); margin: 0; }
  .ag-day-ev-card { display: flex; align-items: center; gap: 0; border-radius: 8px; background: var(--ev-bg); border: 1px solid var(--ev-border); cursor: pointer; overflow: hidden; transition: transform 0.12s, filter 0.12s; animation: agEventIn 0.3s calc(var(--i,0)*40ms) both; position: relative; }
  .ag-day-ev-card:hover { transform: translateX(3px); filter: brightness(1.1); }
  .ag-day-ev-bar { width: 3px; background: var(--ev-color); flex-shrink: 0; align-self: stretch; }
  .ag-day-ev-body { padding: 8px 10px; flex: 1; min-width: 0; }

  /* Skeleton */
  .ag-skel-wrap  { display: flex; flex-direction: column; gap: 10px; padding: 20px 0 20px 56px; animation: agFadeUp 0.3s both; }
  .ag-skel-event { height: 52px; border-radius: 10px; margin-right: 12px; background: linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: agShim 1.4s ease-in-out calc(var(--i,0)*0.14s) infinite; }

  /* Empty state */
  .ag-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; flex: 1; animation: agFadeIn 0.4s both; padding: 60px 0; }
  .ag-empty-icon { font-size: 40px; color: rgba(255,255,255,0.12); }
  .ag-empty-label { font-size: 15px; color: var(--text-3); font-weight: 300; margin: 0; }
  .ag-empty-btn { background: none; border: 1px solid rgba(83,74,183,0.3); border-radius: 10px; color: var(--accent); cursor: pointer; font-size: 12px; padding: 7px 18px; font-family: inherit; transition: background 0.15s, transform 0.15s; margin-top: 4px; }
  .ag-empty-btn:hover { background: rgba(83,74,183,0.15); transform: translateY(-1px); }

  /* Briefing */
  .ag-briefing { border: 0.5px solid rgba(83,74,183,0.22); border-left: 3px solid #534AB7; border-radius: 12px; background: rgba(83,74,183,0.07); margin: 0 0 16px; flex-shrink: 0; overflow: hidden; transition: max-height 0.38s cubic-bezier(0.4,0,0.2,1), background 0.2s, border-color 0.2s; animation: agFadeUp 0.35s 0.1s both; }
  .ag-briefing--closed { max-height: 44px; }
  .ag-briefing--closed:hover { background: rgba(83,74,183,0.12); border-color: rgba(83,74,183,0.38); }
  .ag-briefing--open { max-height: 520px; }
  .ag-briefing-hd { display: flex; align-items: center; justify-content: space-between; padding: 0 14px; height: 44px; box-sizing: border-box; cursor: pointer; flex-shrink: 0; }
  .ag-briefing-left { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; overflow: hidden; }
  .ag-briefing-orb { width: 6px; height: 6px; border-radius: 50%; background: #7C6AF7; flex-shrink: 0; box-shadow: 0 0 6px rgba(124,106,247,0.7); animation: agPulse 2.4s ease-in-out infinite; }
  .ag-briefing-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(124,106,247,0.85); flex-shrink: 0; }
  .ag-briefing-preview { font-size: 12px; color: rgba(255,255,255,0.42); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .ag-briefing-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .ag-briefing-time { font-size: 10px; color: var(--text-3); font-family: 'Geist Mono', monospace; }

    /* orb: center in usable area (above bottom nav) */
    .orb-ambient { top: calc((100dvh - 56px - env(safe-area-inset-bottom, 0px)) * 0.45 + env(safe-area-inset-top, 0px)); }

    /* touch targets */
    .nav-item { width: 44px; height: 44px; }

    .chat-feed {

    .status-line { top: calc(50% + min(28vw, 130px)); }

    .mc-row { gap:8px; }
